<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="64" height="32" shape-rendering="crispEdges">
  <!-- Frame 0 -->
  <g>
    <!-- Crown spikes -->
    <rect x="8" y="0" width="2" height="4" fill="#ff4400"/>
    <rect x="15" y="0" width="2" height="3" fill="#ff4400"/>
    <rect x="22" y="0" width="2" height="4" fill="#ff4400"/>
    <!-- Head -->
    <rect x="8" y="3" width="16" height="8" fill="#cc9a00"/>
    <rect x="9" y="4" width="14" height="6" fill="#ffd43b"/>
    <!-- Eyes (glowing red) -->
    <rect x="10" y="5" width="4" height="3" fill="#ff0000"/>
    <rect x="18" y="5" width="4" height="3" fill="#ff0000"/>
    <rect x="11" y="6" width="2" height="2" fill="#ff8800"/>
    <rect x="19" y="6" width="2" height="2" fill="#ff8800"/>
    <!-- Mouth (fire) -->
    <rect x="12" y="9" width="8" height="2" fill="#ff4400"/>
    <rect x="13" y="9" width="2" height="2" fill="#ffaa00"/>
    <rect x="17" y="9" width="2" height="2" fill="#ffaa00"/>
    <!-- Body -->
    <rect x="8" y="11" width="16" height="10" fill="#cc9a00"/>
    <rect x="9" y="12" width="14" height="8" fill="#ffd43b"/>
    <!-- Core glow -->
    <rect x="13" y="14" width="6" height="4" fill="#ffee88"/>
    <rect x="14" y="15" width="4" height="2" fill="#fff"/>
    <!-- Wings -->
    <rect x="1" y="8" width="7" height="10" fill="#ff8800"/>
    <rect x="2" y="9" width="5" height="8" fill="#ffaa44"/>
    <rect x="1" y="7" width="3" height="2" fill="#ff6600"/>
    <rect x="24" y="8" width="7" height="10" fill="#ff8800"/>
    <rect x="25" y="9" width="5" height="8" fill="#ffaa44"/>
    <rect x="28" y="7" width="3" height="2" fill="#ff6600"/>
    <!-- Wing tips -->
    <rect x="0" y="6" width="2" height="3" fill="#ff4400"/>
    <rect x="30" y="6" width="2" height="3" fill="#ff4400"/>
    <!-- Legs -->
    <rect x="9" y="21" width="5" height="8" fill="#cc9a00"/>
    <rect x="18" y="21" width="5" height="8" fill="#cc9a00"/>
    <!-- Hooves -->
    <rect x="8" y="28" width="6" height="4" fill="#662200"/>
    <rect x="18" y="28" width="6" height="4" fill="#662200"/>
    <!-- Tail -->
    <rect x="23" y="18" width="4" height="2" fill="#cc9a00"/>
    <rect x="26" y="17" width="3" height="2" fill="#ffd43b"/>
    <rect x="28" y="16" width="2" height="2" fill="#ff4400"/>
  </g>
  <!-- Frame 1 -->
  <g transform="translate(32,0)">
    <!-- Crown spikes (flicker) -->
    <rect x="8" y="0" width="2" height="5" fill="#ff4400"/>
    <rect x="15" y="0" width="2" height="4" fill="#ff6600"/>
    <rect x="22" y="0" width="2" height="3" fill="#ff4400"/>
    <!-- Head -->
    <rect x="8" y="3" width="16" height="8" fill="#cc9a00"/>
    <rect x="9" y="4" width="14" height="6" fill="#ffd43b"/>
    <!-- Eyes -->
    <rect x="10" y="5" width="4" height="3" fill="#ff0000"/>
    <rect x="18" y="5" width="4" height="3" fill="#ff0000"/>
    <rect x="11" y="6" width="2" height="2" fill="#ff8800"/>
    <rect x="19" y="6" width="2" height="2" fill="#ff8800"/>
    <!-- Mouth -->
    <rect x="12" y="9" width="8" height="2" fill="#ff6600"/>
    <rect x="14" y="9" width="2" height="2" fill="#ffcc00"/>
    <!-- Body -->
    <rect x="8" y="11" width="16" height="10" fill="#cc9a00"/>
    <rect x="9" y="12" width="14" height="8" fill="#ffd43b"/>
    <!-- Core glow (pulsing) -->
    <rect x="12" y="13" width="8" height="6" fill="#ffee88"/>
    <rect x="13" y="14" width="6" height="4" fill="#fff"/>
    <!-- Wings (flapping up) -->
    <rect x="1" y="6" width="7" height="10" fill="#ff8800"/>
    <rect x="2" y="7" width="5" height="8" fill="#ffaa44"/>
    <rect x="0" y="4" width="3" height="4" fill="#ff6600"/>
    <rect x="24" y="6" width="7" height="10" fill="#ff8800"/>
    <rect x="25" y="7" width="5" height="8" fill="#ffaa44"/>
    <rect x="29" y="4" width="3" height="4" fill="#ff6600"/>
    <!-- Wing tips higher -->
    <rect x="0" y="3" width="2" height="3" fill="#ff4400"/>
    <rect x="30" y="3" width="2" height="3" fill="#ff4400"/>
    <!-- Legs (stride) -->
    <rect x="8" y="21" width="5" height="7" fill="#cc9a00"/>
    <rect x="19" y="22" width="5" height="8" fill="#cc9a00"/>
    <!-- Hooves -->
    <rect x="7" y="27" width="6" height="4" fill="#662200"/>
    <rect x="19" y="29" width="6" height="3" fill="#662200"/>
    <!-- Tail (swish) -->
    <rect x="23" y="19" width="4" height="2" fill="#cc9a00"/>
    <rect x="26" y="20" width="3" height="2" fill="#ffd43b"/>
    <rect x="28" y="19" width="2" height="2" fill="#ff4400"/>
  </g>
</svg>
