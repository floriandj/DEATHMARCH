<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 28" width="224" height="112" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="ash-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="ash-torso" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="ash-eye" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffcc02"/>
      <stop offset="60%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
    <radialGradient id="ash-ember" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
  </defs>
  <!-- Frame 0: Standing, arms at sides -->
  <g>
    <g stroke="#1a1a2e" stroke-width="1" stroke-linejoin="round">
      <!-- Shadow -->
      <ellipse cx="14" cy="27" rx="9" ry="1" fill="#000" opacity="0.25" stroke="none"/>
      <!-- Legs -->
      <path d="M9,20 Q8,24 7,27" stroke-width="3.5" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <path d="M19,20 Q20,24 21,27" stroke-width="3.5" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <!-- Feet glow -->
      <ellipse cx="7" cy="27" rx="2" ry="1" fill="#ff6d00" opacity="0.5" stroke="none"/>
      <ellipse cx="21" cy="27" rx="2" ry="1" fill="#ff6d00" opacity="0.5" stroke="none"/>
      <!-- Torso -->
      <path d="M7,10 Q6,14 7,20 Q10,22 14,22 Q18,22 21,20 Q22,14 21,10 Q18,8 14,8 Q10,8 7,10 Z" fill="url(#ash-torso)"/>
      <!-- Body crack veins -->
      <path d="M11,10 Q12,13 10,17" stroke="#ff6d00" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
      <path d="M17,11 Q16,14 18,16" stroke="#ff6d00" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
      <path d="M13,12 Q14,15 13,19" stroke="#ff9800" stroke-width="0.6" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
      <!-- Arms at sides -->
      <path d="M7,11 Q3,14 2,18" stroke-width="4" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <path d="M21,11 Q25,14 26,18" stroke-width="4" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <!-- Hand glow -->
      <circle cx="2" cy="18" r="2" fill="#ff6d00" opacity="0.6" stroke="none"/>
      <circle cx="26" cy="18" r="2" fill="#ff6d00" opacity="0.6" stroke="none"/>
      <!-- Torso highlight -->
      <ellipse cx="14" cy="12" rx="3.5" ry="2.5" fill="#616161" opacity="0.35" stroke="none"/>
      <!-- Head -->
      <ellipse cx="14" cy="6" rx="7" ry="5.5" fill="url(#ash-body)"/>
      <!-- Head cracks -->
      <path d="M11,3 Q12,5 11,8" stroke="#ff6d00" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
      <path d="M16,4 Q15,6 16,9" stroke="#ff9800" stroke-width="0.6" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
      <!-- Head highlight -->
      <ellipse cx="12" cy="4" rx="3" ry="2" fill="#616161" opacity="0.3" stroke="none"/>
      <!-- Eyes -->
      <ellipse cx="10.5" cy="6" rx="2.2" ry="2" fill="url(#ash-eye)"/>
      <ellipse cx="17.5" cy="6" rx="2.2" ry="2" fill="url(#ash-eye)"/>
      <!-- Eye inner glow -->
      <circle cx="10.5" cy="6" r="1" fill="#fff9c4" opacity="0.8" stroke="none"/>
      <circle cx="17.5" cy="6" r="1" fill="#fff9c4" opacity="0.8" stroke="none"/>
      <!-- Ember particles -->
      <circle cx="8" cy="3" r="0.8" fill="url(#ash-ember)" stroke="none" opacity="0.85"/>
      <circle cx="20" cy="2" r="0.7" fill="url(#ash-ember)" stroke="none" opacity="0.75"/>
      <circle cx="22" cy="7" r="0.6" fill="url(#ash-ember)" stroke="none" opacity="0.65"/>
      <circle cx="6" cy="9" r="0.7" fill="url(#ash-ember)" stroke="none" opacity="0.7"/>
    </g>
  </g>
  <!-- Frame 1: Subtle walk variant — legs and arms shifted 2px, body 1px down -->
  <g transform="translate(28,0)">
    <g stroke="#1a1a2e" stroke-width="1" stroke-linejoin="round">
      <!-- Shadow -->
      <ellipse cx="14" cy="27" rx="9" ry="1" fill="#000" opacity="0.25" stroke="none"/>
      <!-- Left leg shifted forward 2px -->
      <path d="M9,20 Q6,24 5,27" stroke-width="3.5" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <!-- Right leg shifted back 2px -->
      <path d="M19,20 Q22,24 23,27" stroke-width="3.5" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <!-- Feet glow -->
      <ellipse cx="5" cy="27" rx="2" ry="1" fill="#ff6d00" opacity="0.5" stroke="none"/>
      <ellipse cx="23" cy="27" rx="2" ry="1" fill="#ff6d00" opacity="0.5" stroke="none"/>
      <!-- Torso (same) -->
      <path d="M7,10 Q6,14 7,20 Q10,22 14,22 Q18,22 21,20 Q22,14 21,10 Q18,8 14,8 Q10,8 7,10 Z" fill="url(#ash-torso)"/>
      <!-- Body crack veins -->
      <path d="M11,10 Q12,13 10,17" stroke="#ff6d00" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
      <path d="M17,11 Q16,14 18,16" stroke="#ff6d00" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
      <path d="M13,12 Q14,15 13,19" stroke="#ff9800" stroke-width="0.6" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
      <!-- Left arm shifted forward 2px -->
      <path d="M7,11 Q2,13 1,17" stroke-width="4" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <!-- Right arm shifted back 2px -->
      <path d="M21,11 Q26,15 27,19" stroke-width="4" stroke="url(#ash-body)" fill="none" stroke-linecap="round"/>
      <!-- Hand glow -->
      <circle cx="1" cy="17" r="2" fill="#ff6d00" opacity="0.6" stroke="none"/>
      <circle cx="27" cy="19" r="2" fill="#ff6d00" opacity="0.6" stroke="none"/>
      <!-- Torso highlight -->
      <ellipse cx="14" cy="12" rx="3.5" ry="2.5" fill="#616161" opacity="0.35" stroke="none"/>
      <!-- Head (same position) -->
      <ellipse cx="14" cy="6" rx="7" ry="5.5" fill="url(#ash-body)"/>
      <!-- Head cracks -->
      <path d="M11,3 Q12,5 11,8" stroke="#ff6d00" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-opacity="0.9"/>
      <path d="M16,4 Q15,6 16,9" stroke="#ff9800" stroke-width="0.6" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
      <!-- Head highlight -->
      <ellipse cx="12" cy="4" rx="3" ry="2" fill="#616161" opacity="0.3" stroke="none"/>
      <!-- Eyes -->
      <ellipse cx="10.5" cy="6" rx="2.2" ry="2" fill="url(#ash-eye)"/>
      <ellipse cx="17.5" cy="6" rx="2.2" ry="2" fill="url(#ash-eye)"/>
      <!-- Eye inner glow -->
      <circle cx="10.5" cy="6" r="1" fill="#fff9c4" opacity="0.8" stroke="none"/>
      <circle cx="17.5" cy="6" r="1" fill="#fff9c4" opacity="0.8" stroke="none"/>
      <!-- Ember particles (shifted slightly) -->
      <circle cx="9" cy="2" r="0.8" fill="url(#ash-ember)" stroke="none" opacity="0.85"/>
      <circle cx="19" cy="3" r="0.7" fill="url(#ash-ember)" stroke="none" opacity="0.75"/>
      <circle cx="23" cy="8" r="0.6" fill="url(#ash-ember)" stroke="none" opacity="0.65"/>
      <circle cx="5" cy="8" r="0.7" fill="url(#ash-ember)" stroke="none" opacity="0.7"/>
    </g>
  </g>
</svg>
