<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="mgun_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="mgun_heavy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="mgun_energy" cx="8%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="50%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mgun_barrel_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5d6a7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Six barrel circles at front (rotary arrangement) -->
    <!-- Barrel shroud ring -->
    <rect x="1" y="6" width="4" height="14" rx="2" fill="url(#mgun_body)"/>
    <!-- Individual barrel tips (hexagonal arrangement) -->
    <circle cx="3" cy="9" r="1.2" fill="url(#mgun_energy)" stroke-width="1"/>
    <circle cx="3" cy="12" r="1.2" fill="#424242" stroke-width="1"/>
    <circle cx="3" cy="15" r="1.2" fill="#424242" stroke-width="1"/>
    <!-- Energy from front barrel -->
    <rect x="1" y="8" width="3" height="8" rx="1.5" fill="url(#mgun_energy)" stroke="none"/>
    <!-- Barrel cluster body (six tubes) -->
    <rect x="4" y="7" width="8" height="12" rx="1" fill="url(#mgun_body)"/>
    <!-- Barrel separator lines -->
    <line x1="4" y1="11" x2="12" y2="11" stroke="#616161" stroke-width="0.7"/>
    <line x1="4" y1="15" x2="12" y2="15" stroke="#616161" stroke-width="0.7"/>
    <line x1="7" y1="7" x2="7" y2="19" stroke="#616161" stroke-width="0.7"/>
    <line x1="10" y1="7" x2="10" y2="19" stroke="#616161" stroke-width="0.7"/>
    <!-- Motor housing (central cylinder) -->
    <rect x="11" y="8" width="6" height="10" rx="1" fill="url(#mgun_heavy)"/>
    <!-- Motor center circle -->
    <circle cx="14" cy="13" r="3" fill="#424242" stroke-width="1"/>
    <circle cx="14" cy="13" r="1.5" fill="#616161" stroke-width="0.8"/>
    <!-- Main body/receiver -->
    <rect x="16" y="6" width="9" height="14" rx="1" fill="url(#mgun_body)"/>
    <!-- Ammo chute -->
    <rect x="17" y="19" width="6" height="5" rx="0.5" fill="url(#mgun_heavy)"/>
    <rect x="18" y="20" width="4" height="3" rx="0.3" fill="#424242" stroke-width="0.8"/>
    <!-- Spade grip (dual handle) -->
    <rect x="24" y="8" width="7" height="12" rx="1" fill="url(#mgun_body)"/>
    <rect x="25" y="9" width="5" height="10" rx="0.5" fill="url(#mgun_heavy)"/>
    <!-- Left handle -->
    <rect x="24" y="9" width="2" height="10" rx="0.5" fill="#757575" stroke-width="1"/>
    <!-- Right handle -->
    <rect x="29" y="9" width="2" height="10" rx="0.5" fill="#757575" stroke-width="1"/>
    <!-- Trigger bar -->
    <rect x="25" y="13" width="5" height="2" rx="0.3" fill="#616161" stroke-width="1"/>
  </g>
</svg>
