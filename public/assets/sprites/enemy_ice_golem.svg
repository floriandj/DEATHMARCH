<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 52" width="416" height="208" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="ig-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="ig-body-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
    <radialGradient id="ig-eye" cx="0.35" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </radialGradient>
    <radialGradient id="ig-eye-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e1f5fe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#29b6f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ig-crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
  </defs>

  <!-- Frame 0: Standing with arms at sides -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="26" cy="50.5" rx="19" ry="2" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Left foot (massive) -->
    <ellipse cx="14" cy="48" rx="8.5" ry="3" fill="#01579b"/>
    <!-- Right foot -->
    <ellipse cx="38" cy="48" rx="8.5" ry="3" fill="#01579b"/>
    <!-- Left leg (blocky but rounded) -->
    <rect x="8" y="34" width="13" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M10,36 Q9,40 10,44" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Right leg -->
    <rect x="31" y="34" width="13" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M42,36 Q43,40 42,44" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Body (massive torso, blocky with rounded edges) -->
    <rect x="5" y="16" width="42" height="22" rx="6" fill="url(#ig-body)"/>
    <!-- Body front face highlight -->
    <rect x="10" y="20" width="32" height="14" rx="4" fill="url(#ig-body-mid)" opacity="0.7"/>
    <!-- Ice core (inner glow) -->
    <ellipse cx="26" cy="27" rx="9" ry="7" fill="#b3e5fc" opacity="0.5" stroke="none"/>
    <ellipse cx="26" cy="27" rx="5" ry="4" fill="#e1f5fe" opacity="0.6" stroke="none"/>
    <!-- Crystal cracks on body (white glow paths) -->
    <path d="M14,22 Q16,26 15,30" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.7"/>
    <path d="M35,20 Q37,25 36,31" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.7"/>
    <path d="M22,18 Q24,22 23,26" stroke="#e1f5fe" stroke-width="0.6" fill="none" opacity="0.5"/>
    <!-- Frost particles on body -->
    <circle cx="9" cy="24" r="1" fill="#fff" opacity="0.7" stroke="none"/>
    <circle cx="43" cy="28" r="0.8" fill="#fff" opacity="0.6" stroke="none"/>
    <circle cx="26" cy="17" r="1.2" fill="#e1f5fe" opacity="0.8" stroke="none"/>
    <!-- Left shoulder -->
    <ellipse cx="6" cy="21" rx="5.5" ry="5" fill="url(#ig-body)"/>
    <!-- Right shoulder -->
    <ellipse cx="46" cy="21" rx="5.5" ry="5" fill="url(#ig-body)"/>
    <!-- Left arm (at side) -->
    <rect x="1" y="22" width="9" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M3,24 Q2,28 3,34" stroke="#4fc3f7" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Right arm (at side) -->
    <rect x="42" y="22" width="9" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M49,24 Q50,28 49,34" stroke="#4fc3f7" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Left fist -->
    <ellipse cx="5.5" cy="39" rx="5" ry="4.5" fill="url(#ig-body)"/>
    <!-- Right fist -->
    <ellipse cx="46.5" cy="39" rx="5" ry="4.5" fill="url(#ig-body)"/>
    <!-- Neck (short, thick) -->
    <rect x="19" y="10" width="14" height="9" rx="4" fill="url(#ig-body)"/>
    <!-- Head (blocky, angular chunk with rounded edges) -->
    <rect x="10" y="2" width="32" height="14" rx="5" fill="url(#ig-body)"/>
    <!-- Crystal spikes on head crown (fixed: y=0 minimum) -->
    <path d="M14,3 L12,0 L16,2Z" fill="url(#ig-crystal)"/>
    <path d="M22,2 L21,0 L24,1Z" fill="url(#ig-crystal)"/>
    <path d="M30,2 L29,0 L32,1Z" fill="url(#ig-crystal)"/>
    <path d="M38,3 L36,0 L40,2Z" fill="url(#ig-crystal)"/>
    <!-- Head highlight -->
    <rect x="14" y="4" width="20" height="6" rx="3" fill="#b3e5fc" opacity="0.3" stroke="none"/>
    <!-- Left eye glow -->
    <ellipse cx="17" cy="10" rx="5" ry="4.5" fill="url(#ig-eye-glow)" stroke="none"/>
    <!-- Right eye glow -->
    <ellipse cx="35" cy="10" rx="5" ry="4.5" fill="url(#ig-eye-glow)" stroke="none"/>
    <!-- Left eye (glowing ice-blue) -->
    <ellipse cx="17" cy="10" rx="3.5" ry="3" fill="url(#ig-eye)"/>
    <circle cx="17.8" cy="9.3" r="0.8" fill="#fff" stroke="none"/>
    <!-- Right eye (glowing ice-blue) -->
    <ellipse cx="35" cy="10" rx="3.5" ry="3" fill="url(#ig-eye)"/>
    <circle cx="35.8" cy="9.3" r="0.8" fill="#fff" stroke="none"/>
    <!-- Mouth (stern line) -->
    <path d="M19,14 Q26,16 33,14" fill="#01579b" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- Ice teeth -->
    <path d="M20,14 L19.5,16" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M23,14 L22.5,16.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M29,14 L29.5,16.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M32,14 L32.5,16" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Frame 1: Subtle walk — slight arm shift and leg step -->
  <g transform="translate(52,0)" stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow (slightly shifted) -->
    <ellipse cx="26" cy="50.5" rx="19" ry="2" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Left foot (shifted forward 2px) -->
    <ellipse cx="12" cy="48" rx="8.5" ry="3" fill="#01579b"/>
    <!-- Right foot (shifted back 2px) -->
    <ellipse cx="40" cy="48" rx="8.5" ry="3" fill="#01579b"/>
    <!-- Left leg (shifted forward) -->
    <rect x="6" y="34" width="13" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M8,36 Q7,40 8,44" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Right leg (shifted back) -->
    <rect x="33" y="34" width="13" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M44,36 Q45,40 44,44" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Body -->
    <rect x="5" y="16" width="42" height="22" rx="6" fill="url(#ig-body)"/>
    <rect x="10" y="20" width="32" height="14" rx="4" fill="url(#ig-body-mid)" opacity="0.7"/>
    <ellipse cx="26" cy="27" rx="9" ry="7" fill="#b3e5fc" opacity="0.5" stroke="none"/>
    <ellipse cx="26" cy="27" rx="5" ry="4" fill="#e1f5fe" opacity="0.6" stroke="none"/>
    <!-- Crystal cracks -->
    <path d="M14,22 Q16,26 15,30" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.7"/>
    <path d="M35,20 Q37,25 36,31" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.7"/>
    <path d="M22,18 Q24,22 23,26" stroke="#e1f5fe" stroke-width="0.6" fill="none" opacity="0.5"/>
    <!-- Frost particles -->
    <circle cx="9" cy="24" r="1" fill="#fff" opacity="0.7" stroke="none"/>
    <circle cx="43" cy="28" r="0.8" fill="#fff" opacity="0.6" stroke="none"/>
    <circle cx="26" cy="17" r="1.2" fill="#e1f5fe" opacity="0.8" stroke="none"/>
    <!-- Left shoulder -->
    <ellipse cx="6" cy="21" rx="5.5" ry="5" fill="url(#ig-body)"/>
    <!-- Right shoulder -->
    <ellipse cx="46" cy="21" rx="5.5" ry="5" fill="url(#ig-body)"/>
    <!-- Left arm (shifted forward 2px) -->
    <rect x="1" y="20" width="9" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M3,22 Q2,26 3,32" stroke="#4fc3f7" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Right arm (shifted back 2px) -->
    <rect x="42" y="24" width="9" height="16" rx="4" fill="url(#ig-body)"/>
    <path d="M49,26 Q50,30 49,36" stroke="#4fc3f7" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Left fist (shifted forward) -->
    <ellipse cx="5.5" cy="37" rx="5" ry="4.5" fill="url(#ig-body)"/>
    <!-- Right fist (shifted back) -->
    <ellipse cx="46.5" cy="41" rx="5" ry="4.5" fill="url(#ig-body)"/>
    <!-- Neck -->
    <rect x="19" y="10" width="14" height="9" rx="4" fill="url(#ig-body)"/>
    <!-- Head -->
    <rect x="10" y="2" width="32" height="14" rx="5" fill="url(#ig-body)"/>
    <!-- Crystal spikes (fixed: y=0 minimum) -->
    <path d="M14,3 L12,0 L16,2Z" fill="url(#ig-crystal)"/>
    <path d="M22,2 L21,0 L24,1Z" fill="url(#ig-crystal)"/>
    <path d="M30,2 L29,0 L32,1Z" fill="url(#ig-crystal)"/>
    <path d="M38,3 L36,0 L40,2Z" fill="url(#ig-crystal)"/>
    <!-- Head highlight -->
    <rect x="14" y="4" width="20" height="6" rx="3" fill="#b3e5fc" opacity="0.3" stroke="none"/>
    <!-- Eye glows -->
    <ellipse cx="17" cy="10" rx="5" ry="4.5" fill="url(#ig-eye-glow)" stroke="none"/>
    <ellipse cx="35" cy="10" rx="5" ry="4.5" fill="url(#ig-eye-glow)" stroke="none"/>
    <!-- Eyes -->
    <ellipse cx="17" cy="10" rx="3.5" ry="3" fill="url(#ig-eye)"/>
    <circle cx="17.8" cy="9.3" r="0.8" fill="#fff" stroke="none"/>
    <ellipse cx="35" cy="10" rx="3.5" ry="3" fill="url(#ig-eye)"/>
    <circle cx="35.8" cy="9.3" r="0.8" fill="#fff" stroke="none"/>
    <!-- Mouth (stern line) -->
    <path d="M19,14 Q26,16 33,14" fill="#01579b" stroke="#1a1a2e" stroke-width="0.8"/>
    <path d="M20,14 L19.5,16" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M23,14 L22.5,16.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M29,14 L29.5,16.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M32,14 L32.5,16" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
</svg>
