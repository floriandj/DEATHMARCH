<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 52" width="104" height="52" shape-rendering="crispEdges">
  <!-- Frame 0: Ice Golem - massive, crystalline, slow tank -->
  <g>
    <!-- Crystal crown -->
    <rect x="12" y="0" width="3" height="5" fill="#d0ebff"/>
    <rect x="18" y="0" width="4" height="4" fill="#b0e0ff"/>
    <rect x="28" y="0" width="3" height="5" fill="#d0ebff"/>
    <rect x="34" y="0" width="4" height="3" fill="#b0e0ff"/>
    <!-- Head -->
    <rect x="10" y="4" width="32" height="12" fill="#4dabf7"/>
    <rect x="12" y="5" width="28" height="10" fill="#339af0"/>
    <!-- Eyes (glowing cold) -->
    <rect x="14" y="7" width="6" height="4" fill="#d0ebff"/>
    <rect x="15" y="8" width="4" height="3" fill="#e8f4ff"/>
    <rect x="30" y="7" width="6" height="4" fill="#d0ebff"/>
    <rect x="31" y="8" width="4" height="3" fill="#e8f4ff"/>
    <!-- Jaw -->
    <rect x="16" y="13" width="20" height="3" fill="#1971c2"/>
    <rect x="18" y="14" width="3" height="2" fill="#b0e0ff"/>
    <rect x="24" y="14" width="3" height="2" fill="#b0e0ff"/>
    <rect x="30" y="14" width="3" height="2" fill="#b0e0ff"/>
    <!-- Body (massive torso) -->
    <rect x="6" y="16" width="40" height="18" fill="#4dabf7"/>
    <rect x="8" y="18" width="36" height="14" fill="#339af0"/>
    <!-- Ice core -->
    <rect x="18" y="20" width="16" height="10" fill="#74c0fc"/>
    <rect x="20" y="22" width="12" height="6" fill="#d0ebff"/>
    <rect x="22" y="23" width="8" height="4" fill="#e8f4ff"/>
    <!-- Shoulders -->
    <rect x="2" y="16" width="8" height="8" fill="#4dabf7"/>
    <rect x="42" y="16" width="8" height="8" fill="#4dabf7"/>
    <!-- Arms -->
    <rect x="0" y="22" width="6" height="14" fill="#339af0"/>
    <rect x="46" y="22" width="6" height="14" fill="#339af0"/>
    <!-- Fists -->
    <rect x="0" y="35" width="7" height="6" fill="#1971c2"/>
    <rect x="45" y="35" width="7" height="6" fill="#1971c2"/>
    <!-- Legs -->
    <rect x="10" y="34" width="10" height="12" fill="#339af0"/>
    <rect x="32" y="34" width="10" height="12" fill="#339af0"/>
    <!-- Feet -->
    <rect x="8" y="44" width="12" height="8" fill="#1864ab"/>
    <rect x="32" y="44" width="12" height="8" fill="#1864ab"/>
  </g>
  <!-- Frame 1: Stride -->
  <g transform="translate(52,0)">
    <rect x="12" y="0" width="3" height="5" fill="#d0ebff"/>
    <rect x="18" y="0" width="4" height="4" fill="#b0e0ff"/>
    <rect x="28" y="0" width="3" height="5" fill="#d0ebff"/>
    <rect x="34" y="0" width="4" height="3" fill="#b0e0ff"/>
    <rect x="10" y="4" width="32" height="12" fill="#4dabf7"/>
    <rect x="12" y="5" width="28" height="10" fill="#339af0"/>
    <rect x="14" y="7" width="6" height="4" fill="#d0ebff"/>
    <rect x="15" y="8" width="4" height="3" fill="#e8f4ff"/>
    <rect x="30" y="7" width="6" height="4" fill="#d0ebff"/>
    <rect x="31" y="8" width="4" height="3" fill="#e8f4ff"/>
    <rect x="16" y="13" width="20" height="3" fill="#1971c2"/>
    <rect x="18" y="14" width="3" height="2" fill="#b0e0ff"/>
    <rect x="24" y="14" width="3" height="2" fill="#b0e0ff"/>
    <rect x="30" y="14" width="3" height="2" fill="#b0e0ff"/>
    <rect x="6" y="16" width="40" height="18" fill="#4dabf7"/>
    <rect x="8" y="18" width="36" height="14" fill="#339af0"/>
    <rect x="18" y="20" width="16" height="10" fill="#74c0fc"/>
    <rect x="20" y="22" width="12" height="6" fill="#d0ebff"/>
    <rect x="22" y="23" width="8" height="4" fill="#e8f4ff"/>
    <rect x="2" y="16" width="8" height="8" fill="#4dabf7"/>
    <rect x="42" y="16" width="8" height="8" fill="#4dabf7"/>
    <!-- Arms swinging -->
    <rect x="0" y="20" width="6" height="14" fill="#339af0"/>
    <rect x="46" y="24" width="6" height="14" fill="#339af0"/>
    <rect x="0" y="33" width="7" height="6" fill="#1971c2"/>
    <rect x="45" y="37" width="7" height="6" fill="#1971c2"/>
    <!-- Legs stride -->
    <rect x="8" y="34" width="10" height="10" fill="#339af0"/>
    <rect x="34" y="35" width="10" height="12" fill="#339af0"/>
    <rect x="6" y="42" width="12" height="8" fill="#1864ab"/>
    <rect x="34" y="45" width="12" height="7" fill="#1864ab"/>
  </g>
</svg>
