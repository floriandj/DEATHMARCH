<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 36" width="288" height="144" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="sk-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#000a12"/>
    </linearGradient>
    <linearGradient id="sk-armor-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="100%" stop-color="#102027"/>
    </linearGradient>
    <radialGradient id="sk-sword-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6a0080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sk-sword-blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ce93d8"/>
      <stop offset="50%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <radialGradient id="sk-visor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
    <linearGradient id="sk-cape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
  </defs>

  <!-- Frame 0: Guard stance (sword across body) -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="18" cy="34.5" rx="10" ry="1.5" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Tattered cape (behind body) -->
    <path d="M10,10 Q5,18 7,28 Q9,32 10,35 Q11,33 11,30 Q13,34 14,35 Q14,27 13,22 Q15,26 16,30 Q17,26 16,20Z" fill="url(#sk-cape)" opacity="0.85" stroke="#0a0010" stroke-width="0.7"/>
    <!-- Legs -->
    <ellipse cx="14" cy="28" rx="4" ry="5" fill="url(#sk-armor)"/>
    <ellipse cx="22" cy="28" rx="4" ry="5" fill="url(#sk-armor)"/>
    <!-- Boots -->
    <ellipse cx="13" cy="33" rx="4.5" ry="2.5" fill="#000a12"/>
    <ellipse cx="22" cy="33" rx="4.5" ry="2.5" fill="#000a12"/>
    <!-- Body armor -->
    <ellipse cx="18" cy="20" rx="9" ry="8" fill="url(#sk-armor)"/>
    <!-- Chest plate highlight -->
    <ellipse cx="16" cy="17" rx="5" ry="4" fill="url(#sk-armor-mid)" opacity="0.7" stroke="none"/>
    <!-- Energy core on chest -->
    <ellipse cx="18" cy="20" rx="2.5" ry="2.5" fill="#2d0040"/>
    <ellipse cx="18" cy="20" rx="1.5" ry="1.5" fill="#9c27b0" opacity="0.9"/>
    <ellipse cx="17.5" cy="19.5" rx="0.6" ry="0.6" fill="#e040fb" stroke="none"/>
    <!-- Left shoulder pauldron -->
    <ellipse cx="9" cy="16" rx="5" ry="4" fill="url(#sk-armor-mid)"/>
    <path d="M6,13 Q9,11 12,13" fill="#37474f" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- Right shoulder pauldron -->
    <ellipse cx="27" cy="16" rx="5" ry="4" fill="url(#sk-armor-mid)"/>
    <path d="M24,13 Q27,11 30,13" fill="#37474f" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- Left arm (holding sword across) -->
    <path d="M10,18 Q8,22 9,26" stroke="#263238" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M10,18 Q8,22 9,26" stroke="#37474f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right arm (holding sword) -->
    <path d="M26,18 Q28,22 27,26" stroke="#263238" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M26,18 Q28,22 27,26" stroke="#37474f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Sword glow aura (guard stance — diagonal) -->
    <path d="M8,24 Q14,18 26,14" stroke="#9c27b0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- Sword blade -->
    <path d="M8,24 Q14,18 26,14" stroke="url(#sk-sword-blade)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Sword crossguard -->
    <path d="M13,21 Q15,19 17,17" stroke="#ce93d8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Sword handle -->
    <path d="M7,26 Q8,25 9,24" stroke="#5d4037" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <ellipse cx="18" cy="11" rx="4" ry="3" fill="url(#sk-armor)"/>
    <!-- Helmet -->
    <ellipse cx="18" cy="7" rx="9" ry="8" fill="url(#sk-armor)"/>
    <!-- Helmet crest/top spike (fixed: y=0 minimum) -->
    <path d="M16,1 Q18,0 20,1 Q19,2 18,3 Q17,2 16,1Z" fill="#37474f"/>
    <!-- Helmet highlight -->
    <ellipse cx="15" cy="4" rx="4" ry="3" fill="#37474f" opacity="0.4" stroke="none"/>
    <!-- Visor slit (red glowing) -->
    <path d="M10,7 Q18,6 26,7" stroke="#ff1744" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M10,7 Q14,6 18,6.5 Q22,6 26,7" stroke="url(#sk-visor)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M11,7 Q15,6.5 18,7 Q21,6.5 25,7" stroke="#ff5252" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Chin guard -->
    <path d="M11,10 Q14,12 18,12 Q22,12 25,10" fill="#000a12" stroke="#1a1a2e" stroke-width="0.8"/>
  </g>

  <!-- Frame 1: Subtle walk — slight leg stride and sword position shift -->
  <g transform="translate(36,0)" stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="18" cy="34.5" rx="10" ry="1.5" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Tattered cape (slightly different flutter) -->
    <path d="M10,10 Q4,18 6,28 Q8,32 9,35 Q10,33 10,30 Q12,34 13,35 Q13,27 12,22 Q14,26 15,30 Q16,26 15,20Z" fill="url(#sk-cape)" opacity="0.85" stroke="#0a0010" stroke-width="0.7"/>
    <!-- Legs (stride — left forward, right back) -->
    <ellipse cx="12" cy="27" rx="4" ry="5" fill="url(#sk-armor)"/>
    <ellipse cx="24" cy="29" rx="4" ry="5" fill="url(#sk-armor)"/>
    <!-- Boots (shifted) -->
    <ellipse cx="11" cy="32" rx="4.5" ry="2.5" fill="#000a12"/>
    <ellipse cx="24" cy="34" rx="4.5" ry="2.5" fill="#000a12"/>
    <!-- Body armor -->
    <ellipse cx="18" cy="20" rx="9" ry="8" fill="url(#sk-armor)"/>
    <!-- Chest plate highlight -->
    <ellipse cx="16" cy="17" rx="5" ry="4" fill="url(#sk-armor-mid)" opacity="0.7" stroke="none"/>
    <!-- Energy core on chest -->
    <ellipse cx="18" cy="20" rx="2.5" ry="2.5" fill="#2d0040"/>
    <ellipse cx="18" cy="20" rx="1.5" ry="1.5" fill="#9c27b0" opacity="0.9"/>
    <ellipse cx="17.5" cy="19.5" rx="0.6" ry="0.6" fill="#e040fb" stroke="none"/>
    <!-- Left shoulder pauldron -->
    <ellipse cx="9" cy="16" rx="5" ry="4" fill="url(#sk-armor-mid)"/>
    <path d="M6,13 Q9,11 12,13" fill="#37474f" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- Right shoulder pauldron -->
    <ellipse cx="27" cy="16" rx="5" ry="4" fill="url(#sk-armor-mid)"/>
    <path d="M24,13 Q27,11 30,13" fill="#37474f" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- Left arm (shifted 2px forward) -->
    <path d="M10,18 Q7,21 8,25" stroke="#263238" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M10,18 Q7,21 8,25" stroke="#37474f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right arm (shifted 2px back) -->
    <path d="M26,18 Q29,23 28,27" stroke="#263238" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M26,18 Q29,23 28,27" stroke="#37474f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Sword glow aura (guard stance — slightly shifted angle) -->
    <path d="M7,25 Q13,19 25,15" stroke="#9c27b0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- Sword blade (subtly shifted) -->
    <path d="M7,25 Q13,19 25,15" stroke="url(#sk-sword-blade)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Sword crossguard -->
    <path d="M12,22 Q14,20 16,18" stroke="#ce93d8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Sword handle -->
    <path d="M6,27 Q7,26 8,25" stroke="#5d4037" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <ellipse cx="18" cy="11" rx="4" ry="3" fill="url(#sk-armor)"/>
    <!-- Helmet -->
    <ellipse cx="18" cy="7" rx="9" ry="8" fill="url(#sk-armor)"/>
    <!-- Helmet crest/top spike (fixed: y=0 minimum) -->
    <path d="M16,1 Q18,0 20,1 Q19,2 18,3 Q17,2 16,1Z" fill="#37474f"/>
    <!-- Helmet highlight -->
    <ellipse cx="15" cy="4" rx="4" ry="3" fill="#37474f" opacity="0.4" stroke="none"/>
    <!-- Visor slit (red glowing — same as Frame 0) -->
    <path d="M10,7 Q18,6 26,7" stroke="#ff1744" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M10,7 Q14,6 18,6.5 Q22,6 26,7" stroke="url(#sk-visor)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M11,7 Q15,6.5 18,7 Q21,6.5 25,7" stroke="#ff5252" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Chin guard -->
    <path d="M11,10 Q14,12 18,12 Q22,12 25,10" fill="#000a12" stroke="#1a1a2e" stroke-width="0.8"/>
  </g>
</svg>
