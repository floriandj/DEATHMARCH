<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 44" width="88" height="44" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="troll-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="troll-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fa3ac"/>
      <stop offset="100%" stop-color="#4a6572"/>
    </linearGradient>
    <radialGradient id="troll-eye" cx="0.35" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="70%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
    <radialGradient id="troll-highlight" cx="0.3" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#b0bec5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#546e7a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Standing, fists at sides -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="22" cy="42.5" rx="15" ry="2" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Left foot -->
    <ellipse cx="13" cy="40" rx="5.5" ry="2.5" fill="#37474f"/>
    <!-- Right foot -->
    <ellipse cx="31" cy="40" rx="5.5" ry="2.5" fill="#37474f"/>
    <!-- Left leg -->
    <rect x="9" y="30" width="9" height="12" rx="3" fill="url(#troll-body)"/>
    <!-- Right leg -->
    <rect x="26" y="30" width="9" height="12" rx="3" fill="url(#troll-body)"/>
    <!-- Body (wide, hunched) -->
    <ellipse cx="22" cy="25" rx="16" ry="10" fill="url(#troll-body)"/>
    <!-- Rocky texture patches on body -->
    <path d="M12,21 Q14,19 16,21 Q14,23 12,21Z" fill="#546e7a" stroke="none"/>
    <path d="M26,22 Q28,20 30,22 Q28,24 26,22Z" fill="#546e7a" stroke="none"/>
    <path d="M19,27 Q21,25 23,27 Q21,29 19,27Z" fill="#546e7a" stroke="none"/>
    <!-- Body highlight -->
    <ellipse cx="18" cy="21" rx="8" ry="5" fill="url(#troll-highlight)" stroke="none"/>
    <!-- Left fist (huge, at side) -->
    <ellipse cx="6" cy="30" rx="5" ry="5.5" fill="url(#troll-body)"/>
    <ellipse cx="6" cy="28" rx="3" ry="2" fill="#b0bec5" opacity="0.3" stroke="none"/>
    <!-- Right fist (huge, at side) -->
    <ellipse cx="38" cy="30" rx="5" ry="5.5" fill="url(#troll-body)"/>
    <ellipse cx="38" cy="28" rx="3" ry="2" fill="#b0bec5" opacity="0.3" stroke="none"/>
    <!-- Left arm -->
    <path d="M10,18 Q5,22 6,30" stroke="#37474f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M10,18 Q5,22 6,30" stroke="#546e7a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right arm -->
    <path d="M34,18 Q39,22 38,30" stroke="#37474f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M34,18 Q39,22 38,30" stroke="#546e7a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <rect x="17" y="13" width="10" height="7" rx="3" fill="url(#troll-head)"/>
    <!-- Head (wide, hunched) -->
    <ellipse cx="22" cy="11" rx="13" ry="10" fill="url(#troll-head)"/>
    <!-- Brow ridge (heavy) -->
    <path d="M10,8 Q22,5 34,8" fill="#37474f" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Left eye (tiny, squinting) -->
    <ellipse cx="16" cy="10" rx="3" ry="2" fill="#111"/>
    <ellipse cx="16" cy="10" rx="2" ry="1.2" fill="url(#troll-eye)"/>
    <circle cx="15.3" cy="9.5" r="0.5" fill="#fff" stroke="none"/>
    <!-- Right eye (tiny, squinting) -->
    <ellipse cx="28" cy="10" rx="3" ry="2" fill="#111"/>
    <ellipse cx="28" cy="10" rx="2" ry="1.2" fill="url(#troll-eye)"/>
    <circle cx="27.3" cy="9.5" r="0.5" fill="#fff" stroke="none"/>
    <!-- Nose (wide, flat) -->
    <ellipse cx="22" cy="13" rx="3.5" ry="2" fill="#4a6572"/>
    <circle cx="20" cy="13.5" r="1.2" fill="#37474f"/>
    <circle cx="24" cy="13.5" r="1.2" fill="#37474f"/>
    <!-- Underbite jaw -->
    <path d="M12,15 Q22,20 32,15 Q30,18 22,19 Q14,18 12,15Z" fill="#37474f"/>
    <!-- Lower teeth (big, underbite) -->
    <rect x="15" y="15" width="3.5" height="4" rx="1" fill="#fffde7"/>
    <rect x="20" y="15" width="3.5" height="5" rx="1" fill="#fffde7"/>
    <rect x="25" y="15" width="3.5" height="4" rx="1" fill="#fffde7"/>
    <!-- Head highlight -->
    <ellipse cx="18" cy="7" rx="6" ry="4" fill="#b0bec5" opacity="0.25" stroke="none"/>
    <!-- Ear lumps -->
    <ellipse cx="10" cy="10" rx="3" ry="2.5" fill="url(#troll-head)"/>
    <ellipse cx="34" cy="10" rx="3" ry="2.5" fill="url(#troll-head)"/>
  </g>

  <!-- Frame 1: Ground pound — fists raised overhead -->
  <g transform="translate(44,0)" stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow (wider — impact landing) -->
    <ellipse cx="22" cy="42.5" rx="17" ry="2.2" fill="#000" opacity="0.25" stroke="none"/>
    <!-- Left foot -->
    <ellipse cx="13" cy="40" rx="6" ry="2.5" fill="#37474f"/>
    <!-- Right foot -->
    <ellipse cx="31" cy="40" rx="6" ry="2.5" fill="#37474f"/>
    <!-- Left leg -->
    <rect x="9" y="31" width="9" height="11" rx="3" fill="url(#troll-body)"/>
    <!-- Right leg -->
    <rect x="26" y="31" width="9" height="11" rx="3" fill="url(#troll-body)"/>
    <!-- Body (leaning forward, wide) -->
    <ellipse cx="22" cy="26" rx="16" ry="10" fill="url(#troll-body)"/>
    <path d="M12,22 Q14,20 16,22 Q14,24 12,22Z" fill="#546e7a" stroke="none"/>
    <path d="M26,23 Q28,21 30,23 Q28,25 26,23Z" fill="#546e7a" stroke="none"/>
    <ellipse cx="18" cy="22" rx="8" ry="5" fill="url(#troll-highlight)" stroke="none"/>
    <!-- Left arm raised overhead -->
    <path d="M10,19 Q3,10 5,3" stroke="#37474f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M10,19 Q3,10 5,3" stroke="#546e7a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right arm raised overhead -->
    <path d="M34,19 Q41,10 39,3" stroke="#37474f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M34,19 Q41,10 39,3" stroke="#546e7a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left fist overhead -->
    <ellipse cx="5" cy="3" rx="5.5" ry="5" fill="url(#troll-body)"/>
    <ellipse cx="4" cy="1.5" rx="3" ry="1.5" fill="#b0bec5" opacity="0.3" stroke="none"/>
    <!-- Right fist overhead -->
    <ellipse cx="39" cy="3" rx="5.5" ry="5" fill="url(#troll-body)"/>
    <ellipse cx="38" cy="1.5" rx="3" ry="1.5" fill="#b0bec5" opacity="0.3" stroke="none"/>
    <!-- Neck -->
    <rect x="17" y="14" width="10" height="7" rx="3" fill="url(#troll-head)"/>
    <!-- Head (tilted forward, angry) -->
    <ellipse cx="22" cy="12" rx="13" ry="10" fill="url(#troll-head)"/>
    <!-- Brow ridge (heavy, furrowed) -->
    <path d="M10,9 Q22,5.5 34,9" fill="#37474f" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Left eye (wide angry) -->
    <ellipse cx="16" cy="11" rx="3" ry="2.5" fill="#111"/>
    <ellipse cx="16" cy="11" rx="2" ry="1.5" fill="url(#troll-eye)"/>
    <circle cx="15.3" cy="10.3" r="0.5" fill="#fff" stroke="none"/>
    <!-- Right eye (wide angry) -->
    <ellipse cx="28" cy="11" rx="3" ry="2.5" fill="#111"/>
    <ellipse cx="28" cy="11" rx="2" ry="1.5" fill="url(#troll-eye)"/>
    <circle cx="27.3" cy="10.3" r="0.5" fill="#fff" stroke="none"/>
    <!-- Nose -->
    <ellipse cx="22" cy="14" rx="3.5" ry="2" fill="#4a6572"/>
    <circle cx="20" cy="14.5" r="1.2" fill="#37474f"/>
    <circle cx="24" cy="14.5" r="1.2" fill="#37474f"/>
    <!-- Underbite jaw (wide open roar) -->
    <path d="M11,16 Q22,23 33,16 Q31,21 22,22 Q13,21 11,16Z" fill="#37474f"/>
    <!-- Lower teeth -->
    <rect x="14" y="16" width="3.5" height="5" rx="1" fill="#fffde7"/>
    <rect x="19" y="16" width="3.5" height="6" rx="1" fill="#fffde7"/>
    <rect x="24" y="16" width="3.5" height="5" rx="1" fill="#fffde7"/>
    <!-- Head highlight -->
    <ellipse cx="18" cy="8" rx="6" ry="4" fill="#b0bec5" opacity="0.25" stroke="none"/>
    <!-- Ear lumps -->
    <ellipse cx="10" cy="11" rx="3" ry="2.5" fill="url(#troll-head)"/>
    <ellipse cx="34" cy="11" rx="3" ry="2.5" fill="url(#troll-head)"/>
    <!-- Impact dust lines -->
    <path d="M6,38 Q3,36 1,37" stroke="#90a4ae" stroke-width="1" fill="none" stroke="none" opacity="0.6"/>
    <path d="M38,38 Q41,36 43,37" stroke="#90a4ae" stroke-width="1" fill="none" opacity="0.6"/>
  </g>
</svg>
