<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 44" width="88" height="44" shape-rendering="crispEdges">
  <!-- Frame 0 -->
  <g>
    <!-- Horns -->
    <rect x="8" y="0" width="4" height="6" fill="#ddd"/>
    <rect x="9" y="0" width="2" height="3" fill="#eee"/>
    <rect x="32" y="0" width="4" height="6" fill="#ddd"/>
    <rect x="33" y="0" width="2" height="3" fill="#eee"/>
    <!-- Head -->
    <rect x="12" y="2" width="20" height="12" fill="#9a3db8"/>
    <rect x="13" y="3" width="18" height="10" fill="#be4bdb"/>
    <!-- Brow -->
    <rect x="12" y="6" width="20" height="2" fill="#7a2da0"/>
    <!-- Eyes (yellow, menacing) -->
    <rect x="14" y="7" width="5" height="4" fill="#ffff00"/>
    <rect x="25" y="7" width="5" height="4" fill="#ffff00"/>
    <rect x="16" y="8" width="3" height="3" fill="#220000"/>
    <rect x="27" y="8" width="3" height="3" fill="#220000"/>
    <!-- Mouth -->
    <rect x="16" y="12" width="12" height="3" fill="#550044"/>
    <!-- Teeth (jagged) -->
    <rect x="17" y="12" width="2" height="2" fill="#eee"/>
    <rect x="20" y="12" width="2" height="3" fill="#eee"/>
    <rect x="23" y="12" width="2" height="2" fill="#eee"/>
    <rect x="26" y="12" width="2" height="3" fill="#eee"/>
    <!-- Body (massive) -->
    <rect x="6" y="14" width="32" height="18" fill="#9a3db8"/>
    <rect x="8" y="15" width="28" height="16" fill="#be4bdb"/>
    <!-- Belly scar -->
    <rect x="18" y="20" width="8" height="2" fill="#7a2da0"/>
    <!-- Arms (long, hanging) -->
    <rect x="1" y="16" width="6" height="18" fill="#be4bdb"/>
    <rect x="2" y="17" width="4" height="16" fill="#9a3db8"/>
    <rect x="37" y="16" width="6" height="18" fill="#be4bdb"/>
    <rect x="38" y="17" width="4" height="16" fill="#9a3db8"/>
    <!-- Fists (huge) -->
    <rect x="0" y="32" width="7" height="6" fill="#7a2da0"/>
    <rect x="37" y="32" width="7" height="6" fill="#7a2da0"/>
    <!-- Knuckles -->
    <rect x="1" y="33" width="2" height="2" fill="#be4bdb"/>
    <rect x="4" y="33" width="2" height="2" fill="#be4bdb"/>
    <rect x="38" y="33" width="2" height="2" fill="#be4bdb"/>
    <rect x="41" y="33" width="2" height="2" fill="#be4bdb"/>
    <!-- Legs (thick) -->
    <rect x="10" y="32" width="8" height="10" fill="#7a2da0"/>
    <rect x="26" y="32" width="8" height="10" fill="#7a2da0"/>
    <!-- Feet -->
    <rect x="8" y="40" width="10" height="4" fill="#552288"/>
    <rect x="26" y="40" width="10" height="4" fill="#552288"/>
    <!-- Toes -->
    <rect x="8" y="42" width="3" height="2" fill="#441177"/>
    <rect x="15" y="42" width="3" height="2" fill="#441177"/>
    <rect x="26" y="42" width="3" height="2" fill="#441177"/>
    <rect x="33" y="42" width="3" height="2" fill="#441177"/>
  </g>
  <!-- Frame 1 -->
  <g transform="translate(44,0)">
    <!-- Horns -->
    <rect x="8" y="0" width="4" height="6" fill="#ddd"/>
    <rect x="9" y="0" width="2" height="3" fill="#eee"/>
    <rect x="32" y="0" width="4" height="6" fill="#ddd"/>
    <rect x="33" y="0" width="2" height="3" fill="#eee"/>
    <!-- Head (tilted slightly) -->
    <rect x="12" y="3" width="20" height="12" fill="#9a3db8"/>
    <rect x="13" y="4" width="18" height="10" fill="#be4bdb"/>
    <!-- Brow -->
    <rect x="12" y="7" width="20" height="2" fill="#7a2da0"/>
    <!-- Eyes -->
    <rect x="14" y="8" width="5" height="4" fill="#ffff00"/>
    <rect x="25" y="8" width="5" height="4" fill="#ffff00"/>
    <rect x="16" y="9" width="3" height="3" fill="#220000"/>
    <rect x="27" y="9" width="3" height="3" fill="#220000"/>
    <!-- Mouth -->
    <rect x="16" y="13" width="12" height="3" fill="#550044"/>
    <rect x="17" y="13" width="2" height="2" fill="#eee"/>
    <rect x="20" y="13" width="2" height="3" fill="#eee"/>
    <rect x="23" y="13" width="2" height="2" fill="#eee"/>
    <rect x="26" y="13" width="2" height="3" fill="#eee"/>
    <!-- Body -->
    <rect x="6" y="15" width="32" height="18" fill="#9a3db8"/>
    <rect x="8" y="16" width="28" height="16" fill="#be4bdb"/>
    <rect x="18" y="21" width="8" height="2" fill="#7a2da0"/>
    <!-- Arms (swinging) -->
    <rect x="0" y="14" width="6" height="16" fill="#be4bdb"/>
    <rect x="1" y="15" width="4" height="14" fill="#9a3db8"/>
    <rect x="38" y="18" width="6" height="18" fill="#be4bdb"/>
    <rect x="39" y="19" width="4" height="16" fill="#9a3db8"/>
    <!-- Fists -->
    <rect x="0" y="28" width="7" height="6" fill="#7a2da0"/>
    <rect x="38" y="34" width="7" height="6" fill="#7a2da0"/>
    <rect x="1" y="29" width="2" height="2" fill="#be4bdb"/>
    <rect x="4" y="29" width="2" height="2" fill="#be4bdb"/>
    <rect x="39" y="35" width="2" height="2" fill="#be4bdb"/>
    <rect x="42" y="35" width="2" height="2" fill="#be4bdb"/>
    <!-- Legs (stride) -->
    <rect x="9" y="33" width="8" height="8" fill="#7a2da0"/>
    <rect x="27" y="34" width="8" height="10" fill="#7a2da0"/>
    <!-- Feet -->
    <rect x="7" y="39" width="10" height="4" fill="#552288"/>
    <rect x="27" y="42" width="10" height="2" fill="#552288"/>
    <rect x="7" y="41" width="3" height="2" fill="#441177"/>
    <rect x="14" y="41" width="3" height="2" fill="#441177"/>
  </g>
</svg>
