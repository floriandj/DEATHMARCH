<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 24" width="48" height="24" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="vw-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#12005e"/>
    </linearGradient>
    <linearGradient id="vw-body-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#2e0080"/>
    </linearGradient>
    <radialGradient id="vw-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b388ff"/>
      <stop offset="50%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#12005e"/>
    </radialGradient>
    <radialGradient id="vw-wisp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4a148c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Coiled compact form -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="12" cy="22.5" rx="7" ry="1" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Wispy tendrils at base (no legs, floats) -->
    <path d="M7,17 Q4,20 3,23" stroke="#4a148c" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M9,18 Q7,21 7,24" stroke="#4a148c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M12,19 Q11,22 11,24" stroke="#6a1b9a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M15,18 Q15,21 16,24" stroke="#4a148c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M17,17 Q19,20 20,23" stroke="#4a148c" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Void energy tendrils (semi-transparent purple) -->
    <path d="M5,12 Q1,9 0,6" stroke="#9c27b0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M4,13 Q0,12 -1,10" stroke="#7c4dff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M19,12 Q22,9 23,6" stroke="#9c27b0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M20,13 Q23,12 24,10" stroke="#7c4dff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
    <!-- Body (compact coiled orb) -->
    <ellipse cx="12" cy="12" rx="8" ry="7" fill="url(#vw-body)"/>
    <!-- Body highlight -->
    <ellipse cx="10" cy="9" rx="4" ry="3" fill="url(#vw-body-hi)" opacity="0.5" stroke="none"/>
    <!-- Void energy core (pulsing inside) -->
    <ellipse cx="12" cy="12" rx="4" ry="4" fill="url(#vw-core)" opacity="0.8"/>
    <ellipse cx="12" cy="12" rx="2" ry="2" fill="#b388ff" opacity="0.6" stroke="none"/>
    <ellipse cx="11.5" cy="11.5" rx="0.8" ry="0.8" fill="#fff" stroke="none"/>
    <!-- 5 small white eyes scattered across body -->
    <circle cx="8" cy="9" r="1.2" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="8" cy="9" r="0.8" fill="#fff" stroke="none"/>
    <circle cx="8.3" cy="8.7" r="0.3" fill="#1a1a2e" stroke="none"/>
    <circle cx="16" cy="8" r="1.4" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="16" cy="8" r="1" fill="#fff" stroke="none"/>
    <circle cx="16.3" cy="7.7" r="0.4" fill="#1a1a2e" stroke="none"/>
    <circle cx="10" cy="14" r="1" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="10" cy="14" r="0.6" fill="#fff" stroke="none"/>
    <circle cx="10.2" cy="13.8" r="0.25" fill="#1a1a2e" stroke="none"/>
    <circle cx="15" cy="15" r="1" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="15" cy="15" r="0.6" fill="#fff" stroke="none"/>
    <circle cx="15.2" cy="14.8" r="0.25" fill="#1a1a2e" stroke="none"/>
    <circle cx="12.5" cy="6" r="0.9" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="12.5" cy="6" r="0.5" fill="#fff" stroke="none"/>
    <circle cx="12.7" cy="5.8" r="0.2" fill="#1a1a2e" stroke="none"/>
    <!-- Void wisp aura around body -->
    <ellipse cx="12" cy="12" rx="10" ry="9" fill="url(#vw-wisp)" stroke="none"/>
  </g>

  <!-- Frame 1: Stretching forward elongated -->
  <g transform="translate(24,0)" stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow (elongated) -->
    <ellipse cx="14" cy="22.5" rx="9" ry="1" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Wisps at base (stretched out) -->
    <path d="M6,18 Q3,21 2,24" stroke="#4a148c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M10,19 Q9,22 9,24" stroke="#4a148c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M14,20 Q14,22 15,24" stroke="#6a1b9a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M18,19 Q19,22 20,24" stroke="#4a148c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
    <path d="M21,17 Q22,20 23,23" stroke="#4a148c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Stretched tendrils reaching forward -->
    <path d="M18,10 Q22,7 24,4" stroke="#9c27b0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M20,12 Q23,10 24,8" stroke="#7c4dff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M20,14 Q23,14 24,13" stroke="#9c27b0" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
    <!-- Rear tendrils -->
    <path d="M4,11 Q1,8 0,5" stroke="#9c27b0" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
    <path d="M4,14 Q1,13 0,11" stroke="#7c4dff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
    <!-- Body (elongated horizontally — stretching forward) -->
    <ellipse cx="12" cy="12" rx="11" ry="6" fill="url(#vw-body)"/>
    <!-- Body highlight -->
    <ellipse cx="9" cy="9" rx="5" ry="2.5" fill="url(#vw-body-hi)" opacity="0.5" stroke="none"/>
    <!-- Void core (shifted forward slightly) -->
    <ellipse cx="14" cy="12" rx="4" ry="3.5" fill="url(#vw-core)" opacity="0.8"/>
    <ellipse cx="14" cy="12" rx="2" ry="1.8" fill="#b388ff" opacity="0.6" stroke="none"/>
    <ellipse cx="13.5" cy="11.5" rx="0.8" ry="0.7" fill="#fff" stroke="none"/>
    <!-- 5 eyes (spread out along elongated body) -->
    <circle cx="6" cy="10" r="1.2" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="6" cy="10" r="0.8" fill="#fff" stroke="none"/>
    <circle cx="6.3" cy="9.7" r="0.3" fill="#1a1a2e" stroke="none"/>
    <circle cx="10" cy="8" r="1.3" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="10" cy="8" r="0.9" fill="#fff" stroke="none"/>
    <circle cx="10.3" cy="7.7" r="0.35" fill="#1a1a2e" stroke="none"/>
    <circle cx="16" cy="7" r="1.4" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="16" cy="7" r="1" fill="#fff" stroke="none"/>
    <circle cx="16.3" cy="6.7" r="0.4" fill="#1a1a2e" stroke="none"/>
    <circle cx="10" cy="15" r="1" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="10" cy="15" r="0.6" fill="#fff" stroke="none"/>
    <circle cx="10.2" cy="14.8" r="0.25" fill="#1a1a2e" stroke="none"/>
    <circle cx="18" cy="15" r="1" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>
    <circle cx="18" cy="15" r="0.6" fill="#fff" stroke="none"/>
    <circle cx="18.2" cy="14.8" r="0.25" fill="#1a1a2e" stroke="none"/>
    <!-- Void wisp aura (elongated) -->
    <ellipse cx="12" cy="12" rx="13" ry="8" fill="url(#vw-wisp)" stroke="none"/>
  </g>
</svg>
