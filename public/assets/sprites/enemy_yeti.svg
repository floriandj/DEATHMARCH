    <path d="M2.5,31.5 Q2,30 2.5,29" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M4.5,31.5 Q4.5,30 5,29" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Right huge arm (swung back 3px) -->
    <path d="M39,18 Q47,27 46,38" stroke="#78909c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M39,18 Q47,27 46,38" stroke="#eceff1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right hand/fist (back) -->
    <ellipse cx="45.5" cy="39" rx="5" ry="5.5" fill="url(#yeti-fur)"/>
    <!-- Claw marks on right hand -->
    <path d="M47,36 Q47,35 46.5,34" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M45.5,35.5 Q46,34 45.5,33" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M43.5,35.5 Q43.5,34 43,33" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Neck (thick, short) -->
    <rect x="17" y="11" width="14" height="9" rx="4" fill="url(#yeti-fur)"/>
    <!-- Head (large, rounded — same size, no change) -->
    <ellipse cx="24" cy="10" rx="16" ry="13" fill="url(#yeti-fur)"/>
    <!-- Head highlight -->
    <ellipse cx="19" cy="5" rx="8" ry="6" fill="#f5f5f5" opacity="0.35" stroke="none"/>
    <!-- Fur tufts on top of head (fixed: y=0 minimum) -->
    <path d="M13,2 Q12,0 14,1" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M19,1 Q19,0 21,0.5" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M29,1 Q29,0 27,0.5" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35,2 Q36,0 34,1" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ear tufts -->
    <ellipse cx="9" cy="8" rx="3.5" ry="4" fill="url(#yeti-fur)"/>
    <path d="M7,6 Q6,4 8,5" stroke="#cfd8dc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="39" cy="8" rx="3.5" ry="4" fill="url(#yeti-fur)"/>
    <path d="M41,6 Q42,4 40,5" stroke="#cfd8dc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Brow ridge (heavy) -->
    <path d="M11,8 Q24,5 37,8" fill="#90a4ae" stroke="#1a1a2e" stroke-width="0.9"/>
    <!-- Left eye (icy blue) -->
    <ellipse cx="17" cy="10" rx="3.5" ry="3" fill="#111"/>
    <ellipse cx="17" cy="10" rx="2.5" ry="2" fill="url(#yeti-eye)"/>
    <circle cx="16.2" cy="9.3" r="0.7" fill="#fff" stroke="none"/>
    <!-- Right eye (icy blue) -->
    <ellipse cx="31" cy="10" rx="3.5" ry="3" fill="#111"/>
    <ellipse cx="31" cy="10" rx="2.5" ry="2" fill="url(#yeti-eye)"/>
    <circle cx="30.2" cy="9.3" r="0.7" fill="#fff" stroke="none"/>
    <!-- Nose (wide, flat) -->
    <ellipse cx="24" cy="13.5" rx="3.5" ry="2.5" fill="url(#yeti-nose)"/>
    <circle cx="22.3" cy="14.2" r="1" fill="#37474f"/>
    <circle cx="25.7" cy="14.2" r="1" fill="#37474f"/>
    <!-- Mouth (closed, with visible fangs) -->
    <path d="M16,16.5 Q24,19 32,16.5 Q30,18 24,18.5 Q18,18 16,16.5Z" fill="#455a64"/>
    <!-- Fang teeth -->
    <path d="M19,16.5 L18.5,19" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M29,16.5 L29.5,19" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Fur texture on cheeks -->
    <path d="M11,12 Q10,14 11,16" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M37,12 Q38,14 37,16" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
