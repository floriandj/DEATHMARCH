<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 48" width="96" height="48" shape-rendering="crispEdges">
  <!-- Frame 0: Yeti - large, furry, white/gray beast -->
  <g>
    <!-- Horns -->
    <rect x="8" y="0" width="4" height="5" fill="#ccc"/>
    <rect x="36" y="0" width="4" height="5" fill="#ccc"/>
    <!-- Head -->
    <rect x="8" y="4" width="32" height="12" fill="#e8e8e8"/>
    <rect x="10" y="5" width="28" height="10" fill="#d0d0d0"/>
    <!-- Eyes (fierce, yellow) -->
    <rect x="12" y="7" width="5" height="4" fill="#ffff00"/>
    <rect x="13" y="8" width="3" height="2" fill="#cc8800"/>
    <rect x="31" y="7" width="5" height="4" fill="#ffff00"/>
    <rect x="32" y="8" width="3" height="2" fill="#cc8800"/>
    <!-- Nose -->
    <rect x="20" y="10" width="8" height="3" fill="#999"/>
    <!-- Jaw -->
    <rect x="14" y="13" width="20" height="3" fill="#bbb"/>
    <rect x="16" y="14" width="3" height="2" fill="#eee"/>
    <rect x="22" y="14" width="4" height="2" fill="#eee"/>
    <rect x="29" y="14" width="3" height="2" fill="#eee"/>
    <!-- Fur tufts -->
    <rect x="4" y="6" width="4" height="6" fill="#ddd"/>
    <rect x="40" y="6" width="4" height="6" fill="#ddd"/>
    <!-- Body -->
    <rect x="4" y="16" width="40" height="16" fill="#e8e8e8"/>
    <rect x="6" y="18" width="36" height="12" fill="#d0d0d0"/>
    <!-- Chest fur -->
    <rect x="16" y="18" width="16" height="8" fill="#eee"/>
    <rect x="18" y="20" width="12" height="4" fill="#f5f5f5"/>
    <!-- Arms -->
    <rect x="0" y="18" width="6" height="14" fill="#d0d0d0"/>
    <rect x="42" y="18" width="6" height="14" fill="#d0d0d0"/>
    <!-- Fists -->
    <rect x="0" y="30" width="7" height="6" fill="#bbb"/>
    <rect x="41" y="30" width="7" height="6" fill="#bbb"/>
    <!-- Legs -->
    <rect x="8" y="32" width="10" height="10" fill="#d0d0d0"/>
    <rect x="30" y="32" width="10" height="10" fill="#d0d0d0"/>
    <!-- Feet -->
    <rect x="6" y="40" width="12" height="8" fill="#999"/>
    <rect x="30" y="40" width="12" height="8" fill="#999"/>
  </g>
  <!-- Frame 1: Walking -->
  <g transform="translate(48,0)">
    <rect x="8" y="0" width="4" height="5" fill="#ccc"/>
    <rect x="36" y="0" width="4" height="5" fill="#ccc"/>
    <rect x="8" y="4" width="32" height="12" fill="#e8e8e8"/>
    <rect x="10" y="5" width="28" height="10" fill="#d0d0d0"/>
    <rect x="12" y="7" width="5" height="4" fill="#ffff00"/>
    <rect x="13" y="8" width="3" height="2" fill="#cc8800"/>
    <rect x="31" y="7" width="5" height="4" fill="#ffff00"/>
    <rect x="32" y="8" width="3" height="2" fill="#cc8800"/>
    <rect x="20" y="10" width="8" height="3" fill="#999"/>
    <rect x="14" y="13" width="20" height="3" fill="#bbb"/>
    <rect x="16" y="14" width="3" height="2" fill="#eee"/>
    <rect x="22" y="14" width="4" height="2" fill="#eee"/>
    <rect x="29" y="14" width="3" height="2" fill="#eee"/>
    <rect x="4" y="6" width="4" height="6" fill="#ddd"/>
    <rect x="40" y="6" width="4" height="6" fill="#ddd"/>
    <rect x="4" y="16" width="40" height="16" fill="#e8e8e8"/>
    <rect x="6" y="18" width="36" height="12" fill="#d0d0d0"/>
    <rect x="16" y="18" width="16" height="8" fill="#eee"/>
    <rect x="18" y="20" width="12" height="4" fill="#f5f5f5"/>
    <!-- Arms swinging -->
    <rect x="0" y="16" width="6" height="14" fill="#d0d0d0"/>
    <rect x="42" y="20" width="6" height="14" fill="#d0d0d0"/>
    <rect x="0" y="28" width="7" height="6" fill="#bbb"/>
    <rect x="41" y="32" width="7" height="6" fill="#bbb"/>
    <!-- Legs stride -->
    <rect x="6" y="32" width="10" height="9" fill="#d0d0d0"/>
    <rect x="32" y="33" width="10" height="10" fill="#d0d0d0"/>
    <rect x="4" y="39" width="12" height="8" fill="#999"/>
    <rect x="32" y="41" width="12" height="7" fill="#999"/>
  </g>
</svg>
