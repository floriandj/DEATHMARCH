    <path d="M40,20 Q41,23 40,26 Q41,29 40,32" stroke="#b0bec5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M11,17 Q10,20 11,23" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M37,17 Q38,20 37,23" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Left huge arm (swung forward 3px) -->
    <path d="M9,18 Q1,24 2,34" stroke="#78909c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M9,18 Q1,24 2,34" stroke="#eceff1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Left hand/fist (forward) -->
