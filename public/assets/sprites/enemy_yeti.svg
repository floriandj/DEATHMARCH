    <path d="M45,33.5 Q46,32 45.5,31" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M43,33.5 Q43,32 42.5,31" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
