    <path d="M19,17.5 L18.5,20" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M29,17.5 L29.5,20" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Fur texture on cheeks -->
    <path d="M11,13 Q10,15 11,17" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M37,13 Q38,15 37,17" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

