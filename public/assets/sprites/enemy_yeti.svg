    <!-- Head highlight -->
    <ellipse cx="19" cy="6" rx="8" ry="6" fill="#f5f5f5" opacity="0.35" stroke="none"/>
    <!-- Fur tufts on top of head (fixed: y=0 minimum) -->
    <path d="M13,3 Q12,1 14,2" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M19,1.5 Q19,0 21,1" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M29,1.5 Q29,0 27,1" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35,3 Q36,1 34,2" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
