<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 48" width="96" height="48" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="yeti-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#90a4ae"/>
    </linearGradient>
    <linearGradient id="yeti-fur-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="100%" stop-color="#607d8b"/>
    </linearGradient>
    <linearGradient id="yeti-arm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <radialGradient id="yeti-eye" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="60%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </radialGradient>
    <radialGradient id="yeti-nose" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#90a4ae"/>
      <stop offset="100%" stop-color="#455a64"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Standing hunched -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="24" cy="46.5" rx="17" ry="2" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Left foot -->
    <ellipse cx="13" cy="44.5" rx="8" ry="3" fill="#607d8b"/>
    <!-- Right foot -->
    <ellipse cx="35" cy="44.5" rx="8" ry="3" fill="#607d8b"/>
    <!-- Left leg (hunched posture) -->
    <rect x="8" y="31" width="11" height="15" rx="4" fill="url(#yeti-fur)"/>
    <!-- Fur texture on left leg edge -->
    <path d="M8,32 Q7,35 8,38 Q7,40 8,43" stroke="#b0bec5" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Right leg -->
    <rect x="29" y="31" width="11" height="15" rx="4" fill="url(#yeti-fur)"/>
    <path d="M40,32 Q41,35 40,38 Q41,40 40,43" stroke="#b0bec5" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Body (large, rounded, hunched) -->
    <ellipse cx="24" cy="26" rx="17" ry="12" fill="url(#yeti-fur)"/>
    <!-- Chest fur lighter -->
    <ellipse cx="21" cy="23" rx="9" ry="7" fill="#f5f5f5" opacity="0.45" stroke="none"/>
    <!-- Wavy fur texture on body sides -->
    <path d="M8,21 Q7,24 8,27 Q7,30 8,33" stroke="#b0bec5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M40,21 Q41,24 40,27 Q41,30 40,33" stroke="#b0bec5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M11,18 Q10,21 11,24" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M37,18 Q38,21 37,24" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Left huge arm (hanging down — ape-like) -->
    <path d="M9,19 Q2,26 3,36" stroke="#78909c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M9,19 Q2,26 3,36" stroke="#eceff1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Left hand/fist -->
    <ellipse cx="3.5" cy="37" rx="5" ry="5.5" fill="url(#yeti-fur)"/>
    <!-- Claw marks on left hand -->
    <path d="M1,34 Q-0.5,33 -0.5,32" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M3,33.5 Q2,32 2.5,31" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M5,33.5 Q5,32 5.5,31" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Right huge arm (hanging) -->
    <path d="M39,19 Q46,26 45,36" stroke="#78909c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M39,19 Q46,26 45,36" stroke="#eceff1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right hand/fist -->
    <ellipse cx="44.5" cy="37" rx="5" ry="5.5" fill="url(#yeti-fur)"/>
    <!-- Claw marks on right hand -->
    <path d="M47,34 Q48.5,33 48.5,32" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M45,33.5 Q46,32 45.5,31" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M43,33.5 Q43,32 42.5,31" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Neck (thick, short) -->
    <rect x="17" y="12" width="14" height="9" rx="4" fill="url(#yeti-fur)"/>
    <!-- Head (large, rounded) -->
    <ellipse cx="24" cy="11" rx="16" ry="13" fill="url(#yeti-fur)"/>
    <!-- Head highlight -->
    <ellipse cx="19" cy="6" rx="8" ry="6" fill="#f5f5f5" opacity="0.35" stroke="none"/>
    <!-- Fur tufts on top of head -->
    <path d="M13,3 Q12,0 14,2" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M19,1.5 Q19,-1 21,1" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M29,1.5 Q29,-1 27,1" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35,3 Q36,0 34,2" stroke="#cfd8dc" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Ear tufts -->
    <ellipse cx="9" cy="9" rx="3.5" ry="4" fill="url(#yeti-fur)"/>
    <path d="M7,7 Q6,5 8,6" stroke="#cfd8dc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="39" cy="9" rx="3.5" ry="4" fill="url(#yeti-fur)"/>
    <path d="M41,7 Q42,5 40,6" stroke="#cfd8dc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Brow ridge (heavy) -->
    <path d="M11,9 Q24,6 37,9" fill="#90a4ae" stroke="#1a1a2e" stroke-width="0.9"/>
    <!-- Left eye (icy blue) -->
    <ellipse cx="17" cy="11" rx="3.5" ry="3" fill="#111"/>
    <ellipse cx="17" cy="11" rx="2.5" ry="2" fill="url(#yeti-eye)"/>
    <circle cx="16.2" cy="10.3" r="0.7" fill="#fff" stroke="none"/>
    <!-- Right eye (icy blue) -->
    <ellipse cx="31" cy="11" rx="3.5" ry="3" fill="#111"/>
    <ellipse cx="31" cy="11" rx="2.5" ry="2" fill="url(#yeti-eye)"/>
    <circle cx="30.2" cy="10.3" r="0.7" fill="#fff" stroke="none"/>
    <!-- Nose (wide, flat) -->
    <ellipse cx="24" cy="14.5" rx="3.5" ry="2.5" fill="url(#yeti-nose)"/>
    <circle cx="22.3" cy="15.2" r="1" fill="#37474f"/>
    <circle cx="25.7" cy="15.2" r="1" fill="#37474f"/>
    <!-- Mouth (closed, with visible fangs) -->
    <path d="M16,17.5 Q24,20 32,17.5 Q30,19 24,19.5 Q18,19 16,17.5Z" fill="#455a64"/>
    <!-- Fang teeth -->
    <path d="M19,17.5 L18.5,20" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M29,17.5 L29.5,20" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Fur texture on cheeks -->
    <path d="M11,13 Q10,15 11,17" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M37,13 Q38,15 37,17" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Frame 1: Roaring with arms wide, mouth open showing teeth -->
  <g transform="translate(48,0)" stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="24" cy="46.5" rx="19" ry="2.2" fill="#000" opacity="0.25" stroke="none"/>
    <!-- Left foot (wide stance) -->
    <ellipse cx="11" cy="44.5" rx="8" ry="3" fill="#607d8b"/>
    <!-- Right foot -->
    <ellipse cx="37" cy="44.5" rx="8" ry="3" fill="#607d8b"/>
    <!-- Left leg -->
    <rect x="6" y="31" width="11" height="15" rx="4" fill="url(#yeti-fur)"/>
    <path d="M6,32 Q5,35 6,38 Q5,40 6,43" stroke="#b0bec5" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Right leg -->
    <rect x="31" y="31" width="11" height="15" rx="4" fill="url(#yeti-fur)"/>
    <path d="M42,32 Q43,35 42,38 Q43,40 42,43" stroke="#b0bec5" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="24" cy="26" rx="17" ry="12" fill="url(#yeti-fur)"/>
    <ellipse cx="21" cy="23" rx="9" ry="7" fill="#f5f5f5" opacity="0.45" stroke="none"/>
    <path d="M8,21 Q7,24 8,27 Q7,30 8,33" stroke="#b0bec5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M40,21 Q41,24 40,27 Q41,30 40,33" stroke="#b0bec5" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Left arm WIDE (roar pose) -->
    <path d="M8,20 Q0,16 -1,22" stroke="#78909c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M8,20 Q0,16 -1,22" stroke="#eceff1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Left hand -->
    <ellipse cx="-1.5" cy="23" rx="5.5" ry="5" fill="url(#yeti-fur)"/>
    <path d="M-4,20 Q-5.5,19 -5.5,18" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M-2,19.5 Q-3,18 -2.5,17" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M0,19.5 Q0,18 0.5,17" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Right arm WIDE (roar pose) -->
    <path d="M40,20 Q48,16 49,22" stroke="#78909c" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M40,20 Q48,16 49,22" stroke="#eceff1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Right hand -->
    <ellipse cx="49.5" cy="23" rx="5.5" ry="5" fill="url(#yeti-fur)"/>
    <path d="M52,20 Q53.5,19 53.5,18" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M50,19.5 Q51,18 50.5,17" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M48,19.5 Q48,18 47.5,17" stroke="#455a64" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <rect x="17" y="12" width="14" height="9" rx="4" fill="url(#yeti-fur)"/>
    <!-- Head (wider for roar) -->
    <ellipse cx="24" cy="10" rx="17" ry="13" fill="url(#yeti-fur)"/>
    <ellipse cx="19" cy="5.5" rx="8.5" ry="6" fill="#f5f5f5" opacity="0.35" stroke="none"/>
    <!-- Fur tufts (blown back in roar) -->
    <path d="M13,2 Q11,-1 13,1" stroke="#cfd8dc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M20,0.5 Q19,-2 21,0" stroke="#cfd8dc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M28,0.5 Q29,-2 27,0" stroke="#cfd8dc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M35,2 Q37,-1 35,1" stroke="#cfd8dc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Ear tufts -->
    <ellipse cx="8" cy="8.5" rx="3.5" ry="4" fill="url(#yeti-fur)"/>
    <path d="M6,6.5 Q5,4.5 7,5.5" stroke="#cfd8dc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="40" cy="8.5" rx="3.5" ry="4" fill="url(#yeti-fur)"/>
    <path d="M42,6.5 Q43,4.5 41,5.5" stroke="#cfd8dc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Brow ridge (furrowed in rage) -->
    <path d="M11,8.5 Q24,5 37,8.5" fill="#90a4ae" stroke="#1a1a2e" stroke-width="0.9"/>
    <!-- Left eye (wide, fierce) -->
    <ellipse cx="17" cy="10.5" rx="3.8" ry="3.5" fill="#111"/>
    <ellipse cx="17" cy="10.5" rx="2.7" ry="2.3" fill="url(#yeti-eye)"/>
    <circle cx="16.2" cy="9.7" r="0.8" fill="#fff" stroke="none"/>
    <!-- Right eye (wide, fierce) -->
    <ellipse cx="31" cy="10.5" rx="3.8" ry="3.5" fill="#111"/>
    <ellipse cx="31" cy="10.5" rx="2.7" ry="2.3" fill="url(#yeti-eye)"/>
    <circle cx="30.2" cy="9.7" r="0.8" fill="#fff" stroke="none"/>
    <!-- Nose -->
    <ellipse cx="24" cy="14" rx="3.5" ry="2.5" fill="url(#yeti-nose)"/>
    <circle cx="22.3" cy="14.7" r="1" fill="#37474f"/>
    <circle cx="25.7" cy="14.7" r="1" fill="#37474f"/>
    <!-- Mouth WIDE OPEN (roaring, showing all teeth) -->
    <path d="M14,17 Q24,25 34,17 Q32,21 24,22.5 Q16,21 14,17Z" fill="#37474f"/>
    <!-- Upper teeth -->
    <rect x="16" y="17" width="3" height="4" rx="1" fill="#fff"/>
    <rect x="21" y="17" width="3" height="5" rx="1" fill="#fff"/>
    <rect x="26" y="17" width="3" height="5" rx="1" fill="#fff"/>
    <rect x="31" y="17" width="3" height="4" rx="1" fill="#fff"/>
    <!-- Lower teeth suggestion -->
    <rect x="18" y="21" width="2.5" height="3" rx="1" fill="#e0e0e0"/>
    <rect x="23" y="22" width="2.5" height="3" rx="1" fill="#e0e0e0"/>
    <rect x="28" y="22" width="2.5" height="3" rx="1" fill="#e0e0e0"/>
    <!-- Tongue hint -->
    <ellipse cx="24" cy="22" rx="4" ry="2.5" fill="#e57373" opacity="0.7" stroke="none"/>
    <!-- Fur texture on cheeks -->
    <path d="M10,12 Q9,15 10,18" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M38,12 Q39,15 38,18" stroke="#cfd8dc" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
