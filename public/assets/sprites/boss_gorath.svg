    <rect x="20" y="86" width="4" height="2" fill="#555"/>
    <rect x="28" y="86" width="4" height="2" fill="#555"/>
    <rect x="56" y="86" width="4" height="2" fill="#555"/>
    <rect x="62" y="86" width="4" height="2" fill="#555"/>
    <rect x="70" y="86" width="4" height="2" fill="#555"/>
