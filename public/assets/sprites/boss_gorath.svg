    <path d="M52,12 Q58,8 68,12" stroke="#ff6f00" stroke-width="1.2" fill="none"/>
    <path d="M48,2 L50,-1 M58,1 L59,-2 M68,2 L70,-1" stroke="#ffca28" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    <!-- Runes -->
    <path d="M50,8 L52,6 L54,8 M62,8 L64,6 L66,8" stroke="#ff6f00" stroke-width="0.8" fill="none"/>
    <!-- Heat shimmer lines above hammer -->
    <path d="M50,-2 Q52,-6 54,-2 M60,-3 Q62,-7 64,-3 M70,-2 Q72,-6 74,-2" stroke="#ffca28" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.7"/>

    <!-- Legs (braced) -->
    <path d="M24,64 Q18,72 16,82 Q22,86 30,82 Q32,74 32,68Z" fill="url(#gorath-body)"/>
    <path d="M64,64 Q70,72 72,82 Q66,86 58,82 Q56,74 56,68Z" fill="url(#gorath-body)"/>
    <path d="M20,66 Q22,64 26,64 Q28,70 26,74 Q22,74 20,70Z" fill="url(#gorath-plate)" stroke="#546e7a" stroke-width="0.8"/>
    <path d="M68,66 Q66,64 62,64 Q60,70 62,74 Q66,74 68,70Z" fill="url(#gorath-plate)" stroke="#546e7a" stroke-width="0.8"/>
    <path d="M22,66 Q24,68 22,72" stroke="#ff6f00" stroke-width="0.8" fill="none"/>
    <path d="M66,66 Q64,68 66,72" stroke="#ff6f00" stroke-width="0.8" fill="none"/>
    <path d="M12,80 Q20,86 32,84 Q34,80 28,78Z" fill="#1b2631" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M56,78 Q62,84 76,84 Q76,80 70,78Z" fill="#1b2631" stroke="#1a1a2e" stroke-width="1"/>

    <!-- Left Arm swung back (counterbalance) -->
    <path d="M14,40 Q4,52 2,64" stroke="#1b2631" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M14,40 Q4,52 2,64" stroke="#455a64" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M10,44 Q8,50 8,58 Q12,60 14,56 Q14,48 12,44Z" fill="url(#gorath-plate)" stroke="#546e7a" stroke-width="0.8"/>
    <path d="M-2,62 Q-2,68 2,70 Q8,72 12,68 Q14,62 10,60 Q4,58 0,60Z" fill="url(#gorath-body)"/>
    <path d="M0,60 L-2,57 M4,59 L3,56 M8,59 L8,56 M12,60 L13,57" stroke="#546e7a" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Right Arm raised (holding hammer) -->
    <path d="M74,40 Q76,32 74,22" stroke="#1b2631" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M74,40 Q76,32 74,22" stroke="#455a64" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M72,30 Q74,26 74,20 Q78,20 80,26 Q78,32 74,32Z" fill="url(#gorath-plate)" stroke="#546e7a" stroke-width="0.8"/>

    <!-- Body -->
    <path d="M16,36 Q12,44 12,60 Q14,70 28,72 Q44,74 60,72 Q74,70 76,60 Q76,44 72,36 Q62,30 44,30 Q26,30 16,36Z" fill="url(#gorath-body)"/>
    <path d="M20,38 Q16,46 18,58 Q26,64 44,62 Q52,58 50,46 Q42,34 28,34Z" fill="url(#gorath-body-hi)" stroke="none"/>
    <path d="M24,40 Q22,50 24,60 Q34,66 44,66 Q54,66 64,60 Q66,50 64,40 Q54,34 44,34 Q34,34 24,40Z" fill="url(#gorath-plate)" stroke="#546e7a" stroke-width="1"/>
    <path d="M30,44 Q36,40 44,42 Q52,40 58,44" stroke="url(#gorath-molten)" stroke-width="1.2" fill="none"/>
    <path d="M28,52 Q34,48 44,50 Q54,48 60,52" stroke="#ff6f00" stroke-width="1" fill="none"/>
    <path d="M32,58 Q38,54 44,56 Q50,54 56,58" stroke="#ff6f00" stroke-width="0.8" fill="none"/>
    <path d="M10,36 Q6,30 10,40 Q12,48 18,48 Q22,44 22,38 Q18,32 14,32Z" fill="url(#gorath-plate)"/>
    <path d="M8,32 L6,28 M11,30 L10,26 M14,29 L15,25" stroke="#90a4ae" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M78,36 Q82,30 78,40 Q76,48 70,48 Q66,44 66,38 Q70,32 74,32Z" fill="url(#gorath-plate)"/>
    <path d="M80,32 L82,28 M77,30 L78,26 M74,29 L73,25" stroke="#90a4ae" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Neck -->
