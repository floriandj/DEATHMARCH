    <rect x="26" y="84" width="4" height="2" fill="#555"/>
    <rect x="58" y="86" width="4" height="2" fill="#555"/>
    <rect x="64" y="86" width="4" height="2" fill="#555"/>
    <rect x="72" y="86" width="4" height="2" fill="#555"/>
