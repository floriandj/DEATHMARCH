    <!-- HEAD -->
    <ellipse cx="44" cy="20" rx="20" ry="18" fill="url(#gorath-body)"/>
    <ellipse cx="37" cy="14" rx="9" ry="7" fill="#90a4ae" opacity="0.3" stroke="none"/>
    <path d="M24,18 Q30,14 44,16 Q58,14 64,18" fill="#37474f" stroke="none"/>

    <!-- BULL HORNS -->
    <path d="M26,12 Q16,4 14,10 Q18,16 24,14Z" fill="url(#gorath-horn)"/>
    <path d="M26,12 Q16,4 14,10" stroke="#3e2723" stroke-width="1" fill="none"/>
    <path d="M62,12 Q72,4 74,10 Q70,16 64,14Z" fill="url(#gorath-horn)"/>
    <path d="M62,12 Q72,4 74,10" stroke="#3e2723" stroke-width="1" fill="none"/>
    <ellipse cx="14" cy="10" rx="2" ry="2" fill="#78909c"/>
    <ellipse cx="74" cy="10" rx="2" ry="2" fill="#78909c"/>

    <!-- Eyes (glowing with exertion) -->
    <ellipse cx="34" cy="20" rx="6" ry="5" fill="#0a0a0a"/>
    <ellipse cx="54" cy="20" rx="6" ry="5" fill="#0a0a0a"/>
    <ellipse cx="34" cy="20" rx="4.5" ry="3.5" fill="url(#gorath-eye)"/>
    <ellipse cx="54" cy="20" rx="4.5" ry="3.5" fill="url(#gorath-eye)"/>
    <circle cx="35" cy="19.5" r="2" fill="#1a0000"/>
    <circle cx="34" cy="18.5" r="0.8" fill="#fff9c4" stroke="none"/>
    <circle cx="55" cy="19.5" r="2" fill="#1a0000"/>
    <circle cx="54" cy="18.5" r="0.8" fill="#fff9c4" stroke="none"/>
    <path d="M28,16 Q34,12 40,15" stroke="#263238" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M48,15 Q54,12 60,16" stroke="#263238" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Snout -->
    <path d="M36,24 Q40,28 44,28 Q48,28 52,24 Q50,30 44,32 Q38,30 36,24Z" fill="#37474f"/>
    <circle cx="40" cy="26" r="2" fill="#1b2631"/>
    <circle cx="48" cy="26" r="2" fill="#1b2631"/>
    <path d="M38,30 L37,34 M44,31 L44,35 M50,30 L51,34" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
