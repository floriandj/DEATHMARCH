    <rect x="26" y="0" width="8" height="12" fill="#ffcc00"/>
    <rect x="27" y="0" width="6" height="6" fill="#ffee55"/>
    <rect x="39" y="0" width="8" height="14" fill="#ffcc00"/>
    <rect x="40" y="0" width="6" height="8" fill="#ffee55"/>
    <rect x="52" y="0" width="8" height="12" fill="#ffcc00"/>
    <rect x="53" y="0" width="6" height="6" fill="#ffee55"/>
    <!-- Crown base -->
    <rect x="22" y="10" width="44" height="6" fill="#ddaa00"/>

    <!-- Head -->
