<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 20" width="40" height="20" shape-rendering="crispEdges">
  <!-- Frame 0: standing -->
  <g>
    <!-- Helmet -->
    <rect x="7" y="0" width="6" height="5" fill="#005f8a"/>
    <rect x="8" y="1" width="4" height="3" fill="#00a8e0"/>
    <rect x="9" y="0" width="2" height="1" fill="#66eeff"/>
    <!-- Visor -->
    <rect x="8" y="3" width="4" height="1" fill="#003350"/>
    <!-- Torso / armor -->
    <rect x="5" y="5" width="10" height="7" fill="#0088bb"/>
    <rect x="6" y="6" width="8" height="5" fill="#006d96"/>
    <!-- Belt -->
    <rect x="5" y="11" width="10" height="1" fill="#444"/>
    <!-- Arms -->
    <rect x="3" y="5" width="2" height="6" fill="#00a8e0"/>
    <rect x="15" y="5" width="2" height="6" fill="#00a8e0"/>
    <!-- Hands -->
    <rect x="3" y="10" width="2" height="2" fill="#dda67a"/>
    <rect x="15" y="10" width="2" height="2" fill="#dda67a"/>
    <!-- Legs -->
    <rect x="6" y="12" width="3" height="6" fill="#005070"/>
    <rect x="11" y="12" width="3" height="6" fill="#005070"/>
    <!-- Boots -->
    <rect x="5" y="17" width="4" height="3" fill="#333"/>
    <rect x="11" y="17" width="4" height="3" fill="#333"/>
    <!-- Weapon (small gun pointing up) -->
    <rect x="15" y="3" width="1" height="4" fill="#888"/>
    <rect x="16" y="2" width="1" height="2" fill="#aaa"/>
  </g>
  <!-- Frame 1: mid-step -->
  <g transform="translate(20,0)">
    <!-- Helmet -->
    <rect x="7" y="0" width="6" height="5" fill="#005f8a"/>
    <rect x="8" y="1" width="4" height="3" fill="#00a8e0"/>
    <rect x="9" y="0" width="2" height="1" fill="#66eeff"/>
    <!-- Visor -->
    <rect x="8" y="3" width="4" height="1" fill="#003350"/>
    <!-- Torso / armor -->
    <rect x="5" y="5" width="10" height="7" fill="#0088bb"/>
    <rect x="6" y="6" width="8" height="5" fill="#006d96"/>
    <!-- Belt -->
    <rect x="5" y="11" width="10" height="1" fill="#444"/>
    <!-- Arms (swinging) -->
    <rect x="2" y="6" width="3" height="5" fill="#00a8e0"/>
    <rect x="15" y="4" width="3" height="5" fill="#00a8e0"/>
    <!-- Hands -->
    <rect x="2" y="10" width="2" height="2" fill="#dda67a"/>
    <rect x="16" y="8" width="2" height="2" fill="#dda67a"/>
    <!-- Legs (stride) -->
    <rect x="5" y="12" width="3" height="5" fill="#005070"/>
    <rect x="12" y="13" width="3" height="6" fill="#005070"/>
    <!-- Boots -->
    <rect x="4" y="16" width="4" height="3" fill="#333"/>
    <rect x="12" y="18" width="4" height="2" fill="#333"/>
    <!-- Weapon -->
    <rect x="16" y="1" width="1" height="4" fill="#888"/>
    <rect x="17" y="0" width="1" height="2" fill="#aaa"/>
  </g>
</svg>
