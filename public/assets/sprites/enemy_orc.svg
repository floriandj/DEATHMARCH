<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="256" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="orc-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8bc34a"/>
      <stop offset="100%" stop-color="#33691e"/>
    </linearGradient>
    <linearGradient id="orc-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ccc65"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <linearGradient id="orc-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="orc-axe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#607d8b"/>
    </linearGradient>
    <radialGradient id="orc-eye" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffcc02"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <radialGradient id="orc-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Standing, axe at side -->
  <g stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow base -->
    <ellipse cx="16" cy="30.5" rx="10" ry="1.5" fill="url(#orc-shadow)" stroke="none"/>

    <!-- Back leg (left) -->
    <ellipse cx="11" cy="26" rx="3.5" ry="4.5" fill="#558b2f" stroke-width="0.8"/>
    <!-- Boot left -->
    <ellipse cx="11" cy="30" rx="4" ry="2" fill="#3e2723" stroke-width="0.8"/>

    <!-- Body/torso -->
    <ellipse cx="16" cy="18" rx="8" ry="7" fill="url(#orc-body)" stroke-width="1"/>
    <!-- Armor chest plate -->
    <path d="M10,14 Q16,12 22,14 L21,22 Q16,24 11,22 Z" fill="url(#orc-armor)" stroke-width="0.8"/>
    <!-- Armor highlight -->
    <path d="M12,15 Q16,13.5 20,15" fill="none" stroke="#a1887f" stroke-width="0.8"/>
    <!-- Shoulder armor left -->
    <ellipse cx="9" cy="14" rx="4" ry="3" fill="#6d4c41" stroke-width="0.8"/>
    <ellipse cx="9" cy="13" rx="2.5" ry="1.5" fill="#8d6e63" stroke="none"/>
    <!-- Shoulder armor right -->
    <ellipse cx="23" cy="14" rx="4" ry="3" fill="#6d4c41" stroke-width="0.8"/>
    <ellipse cx="23" cy="13" rx="2.5" ry="1.5" fill="#8d6e63" stroke="none"/>

    <!-- Left arm (holding axe handle) -->
    <path d="M8,15 Q5,18 4,23" stroke="url(#orc-body)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Left fist -->
    <circle cx="4" cy="24" r="2.5" fill="#558b2f" stroke-width="0.8"/>

    <!-- Axe handle -->
    <line x1="4" y1="22" x2="4" y2="10" stroke="#5d4037" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Axe head -->
    <path d="M4,10 Q1,7 2,13 Q3,15 4,14 Z" fill="url(#orc-axe)" stroke-width="0.8"/>
    <path d="M4,10 Q7,7 6,13 Q5,15 4,14 Z" fill="#90a4ae" stroke-width="0.8"/>

    <!-- Right arm (relaxed) -->
    <path d="M24,15 Q27,18 27,23" stroke="url(#orc-body)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right fist -->
    <circle cx="27" cy="24" r="2.5" fill="#558b2f" stroke-width="0.8"/>

    <!-- Front leg (right) -->
    <ellipse cx="21" cy="26" rx="3.5" ry="4.5" fill="#558b2f" stroke-width="0.8"/>
    <!-- Boot right -->
    <ellipse cx="21" cy="30" rx="4" ry="2" fill="#3e2723" stroke-width="0.8"/>

    <!-- Neck -->
    <ellipse cx="16" cy="11.5" rx="4" ry="2.5" fill="#689f38" stroke-width="0.8"/>

    <!-- Head -->
    <ellipse cx="16" cy="7" rx="7.5" ry="6.5" fill="url(#orc-head)" stroke-width="1"/>
    <!-- Head highlight -->
    <ellipse cx="14" cy="5" rx="3" ry="2" fill="#aed581" opacity="0.4" stroke="none"/>

    <!-- Brow ridge -->
    <path d="M9,6 Q12,4.5 16,5 Q20,4.5 23,6" fill="#33691e" stroke-width="0.5"/>

    <!-- Eyes -->
    <ellipse cx="12.5" cy="7" rx="2" ry="1.8" fill="url(#orc-eye)" stroke-width="0.5"/>
    <ellipse cx="12.5" cy="7" rx="1" ry="1" fill="#1a1a2e" stroke="none"/>
    <circle cx="12" cy="6.5" r="0.5" fill="white" stroke="none"/>

    <ellipse cx="19.5" cy="7" rx="2" ry="1.8" fill="url(#orc-eye)" stroke-width="0.5"/>
    <ellipse cx="19.5" cy="7" rx="1" ry="1" fill="#1a1a2e" stroke="none"/>
    <circle cx="19" cy="6.5" r="0.5" fill="white" stroke="none"/>

    <!-- Nose -->
    <ellipse cx="16" cy="9" rx="1.5" ry="1" fill="#558b2f" stroke-width="0.5"/>
    <circle cx="15.2" cy="9.1" r="0.4" fill="#1a1a2e" stroke="none"/>
    <circle cx="16.8" cy="9.1" r="0.4" fill="#1a1a2e" stroke="none"/>

    <!-- Tusks -->
    <path d="M13,10.5 Q12,12.5 13,13.5" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M19,10.5 Q20,12.5 19,13.5" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Mouth/jaw area -->
    <path d="M13.5,11 Q16,12 18.5,11" fill="none" stroke="#1a1a2e" stroke-width="0.6"/>

    <!-- Ear left -->
    <ellipse cx="8.5" cy="7" rx="1.5" ry="2.5" fill="#689f38" stroke-width="0.6"/>
    <!-- Ear right -->
    <ellipse cx="23.5" cy="7" rx="1.5" ry="2.5" fill="#689f38" stroke-width="0.6"/>
  </g>

  <!-- Frame 1: Subtle walk variant — legs shifted, arms swaying, axe at side -->
  <g transform="translate(32,0)" stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow base -->
    <ellipse cx="16" cy="30.5" rx="10" ry="1.5" fill="url(#orc-shadow)" stroke="none"/>

    <!-- Back leg shifted forward 2px -->
    <ellipse cx="9" cy="26" rx="3.5" ry="4.5" fill="#558b2f" stroke-width="0.8"/>
    <ellipse cx="9" cy="30" rx="4" ry="2" fill="#3e2723" stroke-width="0.8"/>

    <!-- Body/torso (1px down for walk bob) -->
    <ellipse cx="16" cy="19" rx="8" ry="7" fill="url(#orc-body)" stroke-width="1"/>
    <!-- Armor chest plate -->
    <path d="M10,15 Q16,13 22,15 L21,23 Q16,25 11,23 Z" fill="url(#orc-armor)" stroke-width="0.8"/>
    <path d="M12,16 Q16,14.5 20,16" fill="none" stroke="#a1887f" stroke-width="0.8"/>
    <!-- Shoulder armor left -->
    <ellipse cx="9" cy="15" rx="4" ry="3" fill="#6d4c41" stroke-width="0.8"/>
    <ellipse cx="9" cy="14" rx="2.5" ry="1.5" fill="#8d6e63" stroke="none"/>
    <!-- Shoulder armor right -->
    <ellipse cx="23" cy="15" rx="4" ry="3" fill="#6d4c41" stroke-width="0.8"/>
    <ellipse cx="23" cy="14" rx="2.5" ry="1.5" fill="#8d6e63" stroke="none"/>

    <!-- Left arm swayed forward 2px (holding axe) -->
    <path d="M8,16 Q4,18 3,23" stroke="url(#orc-body)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="3" cy="24" r="2.5" fill="#558b2f" stroke-width="0.8"/>

    <!-- Axe handle (shifted with arm) -->
    <line x1="3" y1="22" x2="3" y2="10" stroke="#5d4037" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Axe head -->
    <path d="M3,10 Q1,7 1,13 Q2,15 3,14 Z" fill="url(#orc-axe)" stroke-width="0.8"/>
    <path d="M3,10 Q6,7 5,13 Q4,15 3,14 Z" fill="#90a4ae" stroke-width="0.8"/>

    <!-- Right arm swayed back 2px -->
    <path d="M24,16 Q28,19 29,24" stroke="url(#orc-body)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="29" cy="25" r="2.5" fill="#558b2f" stroke-width="0.8"/>

    <!-- Front leg shifted back 2px -->
    <ellipse cx="23" cy="26" rx="3.5" ry="4.5" fill="#558b2f" stroke-width="0.8"/>
    <ellipse cx="23" cy="30" rx="4" ry="2" fill="#3e2723" stroke-width="0.8"/>

    <!-- Neck -->
    <ellipse cx="16" cy="12.5" rx="4" ry="2.5" fill="#689f38" stroke-width="0.8"/>

    <!-- Head (same) -->
    <ellipse cx="16" cy="7" rx="7.5" ry="6.5" fill="url(#orc-head)" stroke-width="1"/>
    <ellipse cx="14" cy="5" rx="3" ry="2" fill="#aed581" opacity="0.4" stroke="none"/>

    <!-- Brow ridge -->
    <path d="M9,6 Q12,4.5 16,5 Q20,4.5 23,6" fill="#33691e" stroke-width="0.5"/>

    <!-- Eyes -->
    <ellipse cx="12.5" cy="7" rx="2" ry="1.8" fill="url(#orc-eye)" stroke-width="0.5"/>
    <ellipse cx="12.5" cy="7" rx="1" ry="1" fill="#1a1a2e" stroke="none"/>
    <circle cx="12" cy="6.5" r="0.5" fill="white" stroke="none"/>

    <ellipse cx="19.5" cy="7" rx="2" ry="1.8" fill="url(#orc-eye)" stroke-width="0.5"/>
    <ellipse cx="19.5" cy="7" rx="1" ry="1" fill="#1a1a2e" stroke="none"/>
    <circle cx="19" cy="6.5" r="0.5" fill="white" stroke="none"/>

    <!-- Nose -->
    <ellipse cx="16" cy="9" rx="1.5" ry="1" fill="#558b2f" stroke-width="0.5"/>
    <circle cx="15.2" cy="9.1" r="0.4" fill="#1a1a2e" stroke="none"/>
    <circle cx="16.8" cy="9.1" r="0.4" fill="#1a1a2e" stroke="none"/>

    <!-- Tusks -->
    <path d="M13,10.5 Q12,12.5 13,13.5" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M19,10.5 Q20,12.5 19,13.5" fill="none" stroke="#f9a825" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Mouth/jaw area -->
    <path d="M13.5,11 Q16,12 18.5,11" fill="none" stroke="#1a1a2e" stroke-width="0.6"/>

    <!-- Ear left -->
    <ellipse cx="8.5" cy="7" rx="1.5" ry="2.5" fill="#689f38" stroke-width="0.6"/>
    <!-- Ear right -->
    <ellipse cx="23.5" cy="7" rx="1.5" ry="2.5" fill="#689f38" stroke-width="0.6"/>
  </g>
</svg>
