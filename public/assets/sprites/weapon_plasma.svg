<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="plasma_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="plasma_grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="plasma_energy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="40%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#880e4f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plasma_muzzle" cx="20%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="60%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#880e4f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Barrel with plasma conduit -->
    <rect x="2" y="12" width="8" height="4" rx="0.5" fill="url(#plasma_body)"/>
    <!-- Muzzle plasma glow -->
    <rect x="2" y="12" width="5" height="4" rx="0.5" fill="url(#plasma_muzzle)"/>
    <!-- Plasma conduit lines -->
    <line x1="4" y1="12" x2="4" y2="16" stroke="#e91e63" stroke-width="0.8" stroke-opacity="0.7"/>
    <line x1="7" y1="12" x2="7" y2="16" stroke="#e91e63" stroke-width="0.8" stroke-opacity="0.7"/>
    <!-- BULBOUS ENERGY CHAMBER (center feature) -->
    <ellipse cx="16" cy="13" rx="7" ry="7" fill="url(#plasma_body)"/>
    <!-- Chamber glow window -->
    <ellipse cx="16" cy="13" rx="5" ry="5" fill="url(#plasma_energy)"/>
    <!-- Inner bright core -->
    <ellipse cx="16" cy="13" rx="2.5" ry="2.5" fill="#fce4ec"/>
    <ellipse cx="16" cy="12" rx="1" ry="0.8" fill="#ffffff" stroke="none"/>
    <!-- Chamber struts -->
    <line x1="9" y1="13" x2="11" y2="13" stroke="#757575" stroke-width="1.2"/>
    <line x1="21" y1="13" x2="23" y2="13" stroke="#757575" stroke-width="1.2"/>
    <line x1="16" y1="6" x2="16" y2="8" stroke="#757575" stroke-width="1.2"/>
    <line x1="16" y1="18" x2="16" y2="20" stroke="#757575" stroke-width="1.2"/>
    <!-- Rear housing connecting to stock -->
    <rect x="22" y="10" width="8" height="7" rx="1" fill="url(#plasma_body)"/>
    <!-- Stock -->
    <rect x="27" y="11" width="4" height="5" rx="0.5" fill="#616161" stroke-width="1"/>
    <!-- Rear sight -->
    <rect x="23" y="8" width="3" height="2.5" rx="0.3" fill="#757575" stroke-width="1"/>
    <!-- Pistol grip -->
    <rect x="22" y="19" width="6" height="9" rx="1" fill="url(#plasma_grip)"/>
    <line x1="23.5" y1="21" x2="26" y2="21" stroke="#424242" stroke-width="0.8"/>
    <line x1="23.5" y1="23" x2="26" y2="23" stroke="#424242" stroke-width="0.8"/>
    <line x1="23.5" y1="25" x2="26" y2="25" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M10 17 L10 22 Q10 24 12 24 L22 24" fill="url(#plasma_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="11.5" y1="17" x2="11" y2="21" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Energy tap / magazine at bottom of chamber -->
    <rect x="13" y="27" width="7" height="4" rx="0.5" fill="url(#plasma_grip)"/>
    <rect x="14" y="27.5" width="5" height="3" rx="0.3" fill="#880e4f" stroke-width="0.8"/>
  </g>
</svg>
