<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="80" height="40" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="sc-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="60%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="sc-cap-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="sc-stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ccc8"/>
      <stop offset="100%" stop-color="#a1887f"/>
    </linearGradient>
    <linearGradient id="sc-leg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcaaa4"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <radialGradient id="sc-spore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff90" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#aeea00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#76ff03" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="sc-spore-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9fbe7" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#dce775" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c6e000" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="sc-eye" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <radialGradient id="sc-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══ FRAME 0: Walking ═══ -->
  <g stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="20" cy="38.5" rx="13" ry="2" fill="url(#sc-shadow)" stroke="none"/>

    <!-- Spore cloud — small semi-transparent circles around cap -->
    <circle cx="5" cy="8" r="3.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="8" cy="4" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="14" cy="2" r="3" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="22" cy="1" r="2.8" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="29" cy="3" r="3.2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="35" cy="6" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="32" cy="10" r="2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="7" cy="13" r="1.8" fill="url(#sc-spore-b)" stroke="none"/>
    <!-- Smaller inner spores -->
    <circle cx="11" cy="5" r="1.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="18" cy="3" r="1.8" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="26" cy="2.5" r="1.6" fill="url(#sc-spore-b)" stroke="none"/>

    <!-- Mushroom cap (large, dominant) -->
    <!-- Cap dome -->
    <ellipse cx="20" cy="10" rx="17" ry="10" fill="url(#sc-cap)" stroke-width="1"/>
    <!-- Cap highlight -->
    <ellipse cx="16" cy="7" rx="7" ry="4" fill="#bcaaa4" opacity="0.3" stroke="none"/>
    <!-- Spots on cap -->
    <circle cx="12" cy="8" r="2" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="19" cy="6" r="2.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="27" cy="8" r="1.8" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="23" cy="12" r="1.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>
    <circle cx="14" cy="13" r="1.2" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>

    <!-- Cap brim (wide, overhanging) -->
    <ellipse cx="20" cy="17" rx="18" ry="4" fill="url(#sc-cap-rim)" stroke-width="0.8"/>
    <!-- Brim underside (darker) -->
    <ellipse cx="20" cy="18" rx="16" ry="2.5" fill="#3e2723" opacity="0.5" stroke="none"/>
    <!-- Gill lines under brim -->
    <line x1="6" y1="17" x2="8" y2="19" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="10" y1="17" x2="11" y2="19.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="14" y1="17" x2="14.5" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="18" y1="17" x2="18" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="22" y1="17" x2="22" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="26" y1="17" x2="26" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="30" y1="17" x2="29.5" y2="19.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="17" x2="32" y2="19" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>

    <!-- Stem/body (pale, thick) -->
    <ellipse cx="20" cy="27" rx="7" ry="9" fill="url(#sc-stem)" stroke-width="1"/>
    <!-- Stem highlight -->
    <ellipse cx="18" cy="23" rx="2.5" ry="3.5" fill="white" opacity="0.2" stroke="none"/>
    <!-- Stem wrinkle lines -->
    <path d="M14,24 Q17,23 20,24 Q23,25 26,24" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>
    <path d="M13.5,28 Q17,27 20,28 Q23,29 26.5,28" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>

    <!-- Eyes (beady, under cap brim) -->
    <ellipse cx="16" cy="20" rx="1.8" ry="1.8" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="16" cy="20" r="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="15.5" cy="19.5" r="0.4" fill="white" stroke="none"/>

    <ellipse cx="24" cy="20" rx="1.8" ry="1.8" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="24" cy="20" r="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="23.5" cy="19.5" r="0.4" fill="white" stroke="none"/>

    <!-- Mouth (small, slit) -->
    <path d="M17.5,22.5 Q20,23.5 22.5,22.5" fill="none" stroke="#6d4c41" stroke-width="0.8"/>
    <!-- Small teeth -->
    <line x1="18.5" y1="22.8" x2="18.5" y2="23.8" stroke="#d7ccc8" stroke-width="0.7"/>
    <line x1="20" y1="23.2" x2="20" y2="24.2" stroke="#d7ccc8" stroke-width="0.7"/>
    <line x1="21.5" y1="22.8" x2="21.5" y2="23.8" stroke="#d7ccc8" stroke-width="0.7"/>

    <!-- Stubby left leg (back, lifted slightly) -->
    <path d="M14,33 Q12,36 11,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="10.5" cy="39" rx="3.5" ry="1.5" fill="#3e2723" stroke-width="0.7"/>
    <!-- Stubby right leg (front, planted) -->
    <path d="M26,33 Q27,36 27,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="27" cy="39" rx="3.5" ry="1.5" fill="#3e2723" stroke-width="0.7"/>
  </g>

  <!-- ═══ FRAME 1: Cap puffing wider — larger spore cloud ═══ -->
  <g transform="translate(40,0)" stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow (wider) -->
    <ellipse cx="20" cy="38.5" rx="15" ry="2" fill="url(#sc-shadow)" stroke="none"/>

    <!-- Spore cloud — larger, more spores billowing out -->
    <circle cx="3" cy="7" r="4.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="6" cy="3" r="3.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="12" cy="1" r="4" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="20" cy="-0.5" r="3.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="28" cy="1" r="4" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="34" cy="3.5" r="3.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="37" cy="8" r="4" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="35" cy="13" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="5" cy="13" r="2.5" fill="url(#sc-spore)" stroke="none"/>
    <!-- Extra puff spores -->
    <circle cx="9" cy="4" r="2.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="17" cy="2" r="2.2" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="24" cy="1.5" r="2.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="30" cy="4" r="2" fill="url(#sc-spore-b)" stroke="none"/>
    <!-- Loose drifting spores farther out -->
    <circle cx="1" cy="12" r="2" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="38" cy="11" r="2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="20" cy="3" r="1.5" fill="url(#sc-spore-b)" stroke="none"/>

    <!-- Mushroom cap (WIDER — puffed out) -->
    <ellipse cx="20" cy="10" rx="19" ry="10.5" fill="url(#sc-cap)" stroke-width="1"/>
    <!-- Cap highlight -->
    <ellipse cx="16" cy="7" rx="8" ry="4.5" fill="#bcaaa4" opacity="0.3" stroke="none"/>
    <!-- Spots (slightly enlarged) -->
    <circle cx="11" cy="8" r="2.2" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="19" cy="5.5" r="2.8" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="28" cy="8" r="2" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="24" cy="12" r="1.8" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>
    <circle cx="13" cy="13" r="1.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>

    <!-- Cap brim (WIDER) -->
    <ellipse cx="20" cy="17" rx="20" ry="4.5" fill="url(#sc-cap-rim)" stroke-width="0.8"/>
    <ellipse cx="20" cy="18.5" rx="18" ry="2.8" fill="#3e2723" opacity="0.5" stroke="none"/>
    <!-- Gill lines -->
    <line x1="4" y1="17" x2="6" y2="19" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="8" y1="17" x2="9" y2="19.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="13" y1="17" x2="13.5" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="17" y1="17" x2="17" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="20" y1="17" x2="20" y2="21" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="23" y1="17" x2="23" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="27" y1="17" x2="27" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="32" y1="17" x2="31" y2="19.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="36" y1="17" x2="34" y2="19" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>

    <!-- Stem/body (slightly compressed from puff) -->
    <ellipse cx="20" cy="27" rx="7.5" ry="8.5" fill="url(#sc-stem)" stroke-width="1"/>
    <ellipse cx="18" cy="23" rx="2.5" ry="3.5" fill="white" opacity="0.2" stroke="none"/>
    <path d="M13.5,24 Q17,23 20,24 Q23,25 26.5,24" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>
    <path d="M13,28 Q17,27 20,28 Q23,29 27,28" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>

    <!-- Eyes (slightly squinting from puff effort) -->
    <ellipse cx="16" cy="20.5" rx="1.8" ry="1.4" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="16" cy="20.5" r="0.7" fill="#1a1a2e" stroke="none"/>
    <circle cx="15.5" cy="20.1" r="0.35" fill="white" stroke="none"/>

    <ellipse cx="24" cy="20.5" rx="1.8" ry="1.4" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="24" cy="20.5" r="0.7" fill="#1a1a2e" stroke="none"/>
    <circle cx="23.5" cy="20.1" r="0.35" fill="white" stroke="none"/>

    <!-- Mouth (open puffing — wider grin) -->
    <path d="M16.5,22.5 Q20,25 23.5,22.5" fill="#6d4c41" stroke-width="0.8"/>
    <path d="M17,23 Q20,24.5 23,23" fill="#3e2723" stroke="none"/>
    <!-- Teeth puffing spores -->
    <line x1="18" y1="23" x2="18" y2="24.2" stroke="#d7ccc8" stroke-width="0.8"/>
    <line x1="20" y1="23.5" x2="20" y2="24.8" stroke="#d7ccc8" stroke-width="0.8"/>
    <line x1="22" y1="23" x2="22" y2="24.2" stroke="#d7ccc8" stroke-width="0.8"/>
    <!-- Spore puff from mouth -->
    <circle cx="19" cy="26" r="1.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="21.5" cy="25.5" r="1.2" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="20" cy="28" r="1" fill="url(#sc-spore)" stroke="none"/>

    <!-- Stubby legs (both down — planted for puff effort) -->
    <path d="M14,33 Q13,36 13,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="13" cy="39" rx="3.5" ry="1.5" fill="#3e2723" stroke-width="0.7"/>
    <path d="M26,33 Q27,36 26.5,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="26.5" cy="39" rx="3.5" ry="1.5" fill="#3e2723" stroke-width="0.7"/>
  </g>
</svg>
