<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="320" height="160" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="sc-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="60%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="sc-cap-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="sc-stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ccc8"/>
      <stop offset="100%" stop-color="#a1887f"/>
    </linearGradient>
    <linearGradient id="sc-leg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcaaa4"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <radialGradient id="sc-spore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff90" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#aeea00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#76ff03" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="sc-spore-b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9fbe7" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#dce775" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c6e000" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="sc-eye" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <radialGradient id="sc-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Walking -->
  <g stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="20" cy="38.5" rx="13" ry="1.5" fill="url(#sc-shadow)" stroke="none"/>

    <!-- Spore cloud — small semi-transparent circles around cap -->
    <circle cx="5" cy="8" r="3.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="8" cy="4" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="14" cy="2" r="3" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="22" cy="1" r="2.8" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="29" cy="3" r="3.2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="35" cy="6" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="32" cy="10" r="2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="7" cy="13" r="1.8" fill="url(#sc-spore-b)" stroke="none"/>
    <!-- Smaller inner spores -->
    <circle cx="11" cy="5" r="1.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="18" cy="3" r="1.8" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="26" cy="2.5" r="1.6" fill="url(#sc-spore-b)" stroke="none"/>

    <!-- Mushroom cap (large, dominant) -->
    <!-- Cap dome -->
    <ellipse cx="20" cy="10" rx="17" ry="10" fill="url(#sc-cap)" stroke-width="1"/>
    <!-- Cap highlight -->
    <ellipse cx="16" cy="7" rx="7" ry="4" fill="#bcaaa4" opacity="0.3" stroke="none"/>
    <!-- Spots on cap -->
    <circle cx="12" cy="8" r="2" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="19" cy="6" r="2.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="27" cy="8" r="1.8" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="23" cy="12" r="1.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>
    <circle cx="14" cy="13" r="1.2" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>

    <!-- Cap brim (wide, overhanging) -->
    <ellipse cx="20" cy="17" rx="18" ry="4" fill="url(#sc-cap-rim)" stroke-width="0.8"/>
    <!-- Brim underside (darker) -->
    <ellipse cx="20" cy="18" rx="16" ry="2.5" fill="#3e2723" opacity="0.5" stroke="none"/>
    <!-- Gill lines under brim -->
    <line x1="6" y1="17" x2="8" y2="19" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="10" y1="17" x2="11" y2="19.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="14" y1="17" x2="14.5" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="18" y1="17" x2="18" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="22" y1="17" x2="22" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="26" y1="17" x2="26" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="30" y1="17" x2="29.5" y2="19.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="17" x2="32" y2="19" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>

    <!-- Stem/body (pale, thick) -->
    <ellipse cx="20" cy="27" rx="7" ry="9" fill="url(#sc-stem)" stroke-width="1"/>
    <!-- Stem highlight -->
    <ellipse cx="18" cy="23" rx="2.5" ry="3.5" fill="white" opacity="0.2" stroke="none"/>
    <!-- Stem wrinkle lines -->
    <path d="M14,24 Q17,23 20,24 Q23,25 26,24" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>
    <path d="M13.5,28 Q17,27 20,28 Q23,29 26.5,28" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>

    <!-- Eyes (beady, under cap brim) -->
    <ellipse cx="16" cy="20" rx="1.8" ry="1.8" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="16" cy="20" r="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="15.5" cy="19.5" r="0.4" fill="white" stroke="none"/>

    <ellipse cx="24" cy="20" rx="1.8" ry="1.8" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="24" cy="20" r="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="23.5" cy="19.5" r="0.4" fill="white" stroke="none"/>

    <!-- Mouth (small, slit) -->
    <path d="M17.5,22.5 Q20,23.5 22.5,22.5" fill="none" stroke="#6d4c41" stroke-width="0.8"/>
    <!-- Small teeth -->
    <line x1="18.5" y1="22.8" x2="18.5" y2="23.8" stroke="#d7ccc8" stroke-width="0.7"/>
    <line x1="20" y1="23.2" x2="20" y2="24.2" stroke="#d7ccc8" stroke-width="0.7"/>
    <line x1="21.5" y1="22.8" x2="21.5" y2="23.8" stroke="#d7ccc8" stroke-width="0.7"/>

    <!-- Stubby left leg (back, lifted slightly) -->
    <path d="M14,33 Q12,36 11,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="10.5" cy="39" rx="3.5" ry="1" fill="#3e2723" stroke-width="0.7"/>
    <!-- Stubby right leg (front, planted) -->
    <path d="M26,33 Q27,36 27,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="27" cy="39" rx="3.5" ry="1" fill="#3e2723" stroke-width="0.7"/>
  </g>

  <!-- Frame 1: Subtle walk variant — legs shifted, body 1px down, spores repositioned slightly -->
  <g transform="translate(40,0)" stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="20" cy="38.5" rx="13" ry="1.5" fill="url(#sc-shadow)" stroke="none"/>

    <!-- Spore cloud (slightly shifted positions for subtle animation) -->
    <circle cx="6" cy="9" r="3.5" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="9" cy="5" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="15" cy="3" r="3" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="21" cy="2" r="2.8" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="28" cy="4" r="3.2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="34" cy="7" r="2.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="33" cy="11" r="2" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="6" cy="14" r="1.8" fill="url(#sc-spore-b)" stroke="none"/>
    <!-- Smaller inner spores -->
    <circle cx="12" cy="6" r="1.5" fill="url(#sc-spore-b)" stroke="none"/>
    <circle cx="19" cy="4" r="1.8" fill="url(#sc-spore)" stroke="none"/>
    <circle cx="25" cy="3.5" r="1.6" fill="url(#sc-spore-b)" stroke="none"/>

    <!-- Mushroom cap (same size) -->
    <ellipse cx="20" cy="11" rx="17" ry="10" fill="url(#sc-cap)" stroke-width="1"/>
    <!-- Cap highlight -->
    <ellipse cx="16" cy="8" rx="7" ry="4" fill="#bcaaa4" opacity="0.3" stroke="none"/>
    <!-- Spots on cap -->
    <circle cx="12" cy="9" r="2" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="19" cy="7" r="2.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="27" cy="9" r="1.8" fill="#d7ccc8" stroke-width="0.5" opacity="0.7"/>
    <circle cx="23" cy="13" r="1.5" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>
    <circle cx="14" cy="14" r="1.2" fill="#d7ccc8" stroke-width="0.5" opacity="0.6"/>

    <!-- Cap brim (same size, 1px down) -->
    <ellipse cx="20" cy="18" rx="18" ry="4" fill="url(#sc-cap-rim)" stroke-width="0.8"/>
    <ellipse cx="20" cy="19" rx="16" ry="2.5" fill="#3e2723" opacity="0.5" stroke="none"/>
    <!-- Gill lines -->
    <line x1="6" y1="18" x2="8" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="10" y1="18" x2="11" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="14" y1="18" x2="14.5" y2="21" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="18" y1="18" x2="18" y2="21.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="22" y1="18" x2="22" y2="21.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="26" y1="18" x2="26" y2="21" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="30" y1="18" x2="29.5" y2="20.5" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>
    <line x1="34" y1="18" x2="32" y2="20" stroke="#6d4c41" stroke-width="0.5" opacity="0.6"/>

    <!-- Stem/body (1px down) -->
    <ellipse cx="20" cy="28" rx="7" ry="9" fill="url(#sc-stem)" stroke-width="1"/>
    <ellipse cx="18" cy="24" rx="2.5" ry="3.5" fill="white" opacity="0.2" stroke="none"/>
    <path d="M14,25 Q17,24 20,25 Q23,26 26,25" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>
    <path d="M13.5,29 Q17,28 20,29 Q23,30 26.5,29" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.5"/>

    <!-- Eyes (1px down) -->
    <ellipse cx="16" cy="21" rx="1.8" ry="1.8" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="16" cy="21" r="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="15.5" cy="20.5" r="0.4" fill="white" stroke="none"/>

    <ellipse cx="24" cy="21" rx="1.8" ry="1.8" fill="url(#sc-eye)" stroke-width="0.6"/>
    <circle cx="24" cy="21" r="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="23.5" cy="20.5" r="0.4" fill="white" stroke="none"/>

    <!-- Mouth (1px down) -->
    <path d="M17.5,23.5 Q20,24.5 22.5,23.5" fill="none" stroke="#6d4c41" stroke-width="0.8"/>
    <line x1="18.5" y1="23.8" x2="18.5" y2="24.8" stroke="#d7ccc8" stroke-width="0.7"/>
    <line x1="20" y1="24.2" x2="20" y2="25.2" stroke="#d7ccc8" stroke-width="0.7"/>
    <line x1="21.5" y1="23.8" x2="21.5" y2="24.8" stroke="#d7ccc8" stroke-width="0.7"/>

    <!-- Left leg shifted forward 2px (was back) -->
    <path d="M14,34 Q11,37 10,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="10" cy="39" rx="3.5" ry="1" fill="#3e2723" stroke-width="0.7"/>
    <!-- Right leg shifted back 2px (was front) -->
    <path d="M26,34 Q28,37 29,39" stroke="url(#sc-leg)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="29" cy="39" rx="3.5" ry="1" fill="#3e2723" stroke-width="0.7"/>
  </g>
</svg>
