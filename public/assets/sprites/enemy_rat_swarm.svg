<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 20" width="40" height="20" shape-rendering="crispEdges">
  <!-- Frame 0: Rat Swarm - cluster of small rats -->
  <g>
    <!-- Rat 1 (center-left) -->
    <rect x="2" y="4" width="6" height="4" fill="#a0522d"/>
    <rect x="3" y="5" width="4" height="2" fill="#8b4513"/>
    <rect x="0" y="5" width="3" height="2" fill="#8b4513"/>
    <rect x="1" y="5" width="1" height="1" fill="#ff3333"/>
    <rect x="8" y="6" width="2" height="1" fill="#cc9977"/>
    <!-- Rat 2 (center) -->
    <rect x="8" y="6" width="6" height="4" fill="#a0522d"/>
    <rect x="9" y="7" width="4" height="2" fill="#8b4513"/>
    <rect x="6" y="7" width="3" height="2" fill="#8b4513"/>
    <rect x="7" y="7" width="1" height="1" fill="#ff3333"/>
    <rect x="14" y="8" width="2" height="1" fill="#cc9977"/>
    <!-- Rat 3 (right) -->
    <rect x="13" y="3" width="5" height="3" fill="#a0522d"/>
    <rect x="14" y="4" width="3" height="1" fill="#8b4513"/>
    <rect x="11" y="4" width="3" height="2" fill="#8b4513"/>
    <rect x="12" y="4" width="1" height="1" fill="#ff3333"/>
    <rect x="18" y="4" width="2" height="1" fill="#cc9977"/>
    <!-- Rat 4 (bottom) -->
    <rect x="5" y="11" width="6" height="4" fill="#a0522d"/>
    <rect x="6" y="12" width="4" height="2" fill="#8b4513"/>
    <rect x="3" y="12" width="3" height="2" fill="#8b4513"/>
    <rect x="4" y="12" width="1" height="1" fill="#ff3333"/>
    <rect x="11" y="13" width="2" height="1" fill="#cc9977"/>
    <!-- Legs (tiny, scattered) -->
    <rect x="3" y="8" width="1" height="2" fill="#6b3410"/>
    <rect x="6" y="8" width="1" height="2" fill="#6b3410"/>
    <rect x="9" y="10" width="1" height="2" fill="#6b3410"/>
    <rect x="12" y="10" width="1" height="2" fill="#6b3410"/>
    <rect x="14" y="6" width="1" height="2" fill="#6b3410"/>
    <rect x="6" y="15" width="1" height="2" fill="#6b3410"/>
    <rect x="9" y="15" width="1" height="2" fill="#6b3410"/>
  </g>
  <!-- Frame 1: Scurrying -->
  <g transform="translate(20,0)">
    <rect x="3" y="5" width="6" height="4" fill="#a0522d"/>
    <rect x="4" y="6" width="4" height="2" fill="#8b4513"/>
    <rect x="1" y="6" width="3" height="2" fill="#8b4513"/>
    <rect x="2" y="6" width="1" height="1" fill="#ff3333"/>
    <rect x="9" y="7" width="2" height="1" fill="#cc9977"/>
    <rect x="7" y="7" width="6" height="4" fill="#a0522d"/>
    <rect x="8" y="8" width="4" height="2" fill="#8b4513"/>
    <rect x="5" y="8" width="3" height="2" fill="#8b4513"/>
    <rect x="6" y="8" width="1" height="1" fill="#ff3333"/>
    <rect x="13" y="9" width="2" height="1" fill="#cc9977"/>
    <rect x="12" y="2" width="5" height="3" fill="#a0522d"/>
    <rect x="13" y="3" width="3" height="1" fill="#8b4513"/>
    <rect x="10" y="3" width="3" height="2" fill="#8b4513"/>
    <rect x="11" y="3" width="1" height="1" fill="#ff3333"/>
    <rect x="17" y="3" width="2" height="1" fill="#cc9977"/>
    <rect x="4" y="12" width="6" height="4" fill="#a0522d"/>
    <rect x="5" y="13" width="4" height="2" fill="#8b4513"/>
    <rect x="2" y="13" width="3" height="2" fill="#8b4513"/>
    <rect x="3" y="13" width="1" height="1" fill="#ff3333"/>
    <rect x="10" y="14" width="2" height="1" fill="#cc9977"/>
    <!-- Legs shifted -->
    <rect x="4" y="9" width="1" height="2" fill="#6b3410"/>
    <rect x="7" y="9" width="1" height="2" fill="#6b3410"/>
    <rect x="8" y="11" width="1" height="2" fill="#6b3410"/>
    <rect x="11" y="11" width="1" height="2" fill="#6b3410"/>
    <rect x="13" y="5" width="1" height="2" fill="#6b3410"/>
    <rect x="5" y="16" width="1" height="2" fill="#6b3410"/>
    <rect x="8" y="16" width="1" height="2" fill="#6b3410"/>
  </g>
</svg>
