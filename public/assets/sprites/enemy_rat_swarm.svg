<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 20" width="40" height="20" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="rat-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="rat-belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcaaa4"/>
      <stop offset="100%" stop-color="#8d6e63"/>
    </linearGradient>
    <radialGradient id="rat-nose" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </radialGradient>
  </defs>
  <!-- Frame 0: Clustered together -->
  <g>
    <g stroke="#1a1a2e" stroke-width="0.8" stroke-linejoin="round">
      <!-- Shadow -->
      <ellipse cx="10" cy="19" rx="9" ry="1.2" fill="#000" opacity="0.2" stroke="none"/>
      <!-- Rat 1 (back-left) -->
      <path d="M1,12 Q0,9 3,8 Q7,7 8,10 Q9,13 6,14 Q3,15 1,12 Z" fill="url(#rat-body)"/>
      <ellipse cx="4.5" cy="11" rx="1.5" ry="1" fill="url(#rat-belly)" opacity="0.6" stroke="none"/>
      <!-- Rat 1 head -->
      <ellipse cx="8" cy="9" rx="2.5" ry="2" fill="url(#rat-body)"/>
      <!-- Rat 1 ear -->
      <ellipse cx="6.8" cy="7.5" rx="1.2" ry="1" fill="#bcaaa4"/>
      <ellipse cx="6.8" cy="7.5" rx="0.7" ry="0.6" fill="#f48fb1" stroke="none"/>
      <!-- Rat 1 eye -->
      <circle cx="9.2" cy="8.5" r="0.9" fill="#f44336"/>
      <circle cx="9.4" cy="8.3" r="0.3" fill="#fff" stroke="none"/>
      <!-- Rat 1 nose -->
      <circle cx="10.2" cy="9.3" r="0.5" fill="url(#rat-nose)"/>
      <!-- Rat 1 tail -->
      <path d="M1.5,13 Q-1,14 -0.5,16" stroke="#e91e63" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Rat 1 legs -->
      <line x1="3" y1="14" x2="2" y2="16" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="5" y1="14.5" x2="4.5" y2="16.5" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>

      <!-- Rat 2 (center) -->
      <path d="M6,14 Q5,11 8,10 Q13,9 14,12 Q15,15 11,16 Q7,17 6,14 Z" fill="url(#rat-body)"/>
      <ellipse cx="10" cy="13.5" rx="2" ry="1.2" fill="url(#rat-belly)" opacity="0.6" stroke="none"/>
      <!-- Rat 2 head -->
      <ellipse cx="14" cy="11.5" rx="3" ry="2.2" fill="url(#rat-body)"/>
      <!-- Rat 2 ear -->
      <ellipse cx="12.5" cy="9.8" rx="1.4" ry="1.2" fill="#bcaaa4"/>
      <ellipse cx="12.5" cy="9.8" rx="0.8" ry="0.7" fill="#f48fb1" stroke="none"/>
      <!-- Rat 2 eye -->
      <circle cx="15.5" cy="11" r="1" fill="#f44336"/>
      <circle cx="15.8" cy="10.7" r="0.35" fill="#fff" stroke="none"/>
      <!-- Rat 2 nose -->
      <circle cx="16.7" cy="12" r="0.6" fill="url(#rat-nose)"/>
      <!-- Rat 2 tail -->
      <path d="M6.5,15 Q3,16 3.5,18.5" stroke="#e91e63" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Rat 2 legs -->
      <line x1="8" y1="16" x2="7" y2="18" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="11" y1="16.5" x2="10.5" y2="18.5" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>

      <!-- Rat 3 (top-right, small) -->
      <path d="M12,8 Q11,5 14,4 Q17,3 18,6 Q19,9 16,9.5 Q13,10 12,8 Z" fill="url(#rat-body)"/>
      <ellipse cx="15" cy="7" rx="1.5" ry="1" fill="url(#rat-belly)" opacity="0.6" stroke="none"/>
      <!-- Rat 3 head -->
      <ellipse cx="18" cy="5.5" rx="2.2" ry="1.8" fill="url(#rat-body)"/>
      <!-- Rat 3 ear -->
      <ellipse cx="16.8" cy="4.2" rx="1.1" ry="0.9" fill="#bcaaa4"/>
      <ellipse cx="16.8" cy="4.2" rx="0.6" ry="0.5" fill="#f48fb1" stroke="none"/>
      <!-- Rat 3 eye -->
      <circle cx="19" cy="5" r="0.8" fill="#f44336"/>
      <circle cx="19.2" cy="4.8" r="0.28" fill="#fff" stroke="none"/>
      <!-- Rat 3 nose -->
      <circle cx="19.9" cy="5.9" r="0.45" fill="url(#rat-nose)"/>
      <!-- Rat 3 tail -->
      <path d="M12.5,9 Q10,10 10.5,12" stroke="#e91e63" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <!-- Rat 3 legs -->
      <line x1="13.5" y1="9.5" x2="13" y2="11.5" stroke="#4e342e" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="16" y1="9.5" x2="15.5" y2="11.5" stroke="#4e342e" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </g>
  <!-- Frame 1: Scattered/moving -->
  <g transform="translate(20,0)">
    <g stroke="#1a1a2e" stroke-width="0.8" stroke-linejoin="round">
      <!-- Shadow -->
      <ellipse cx="10" cy="19" rx="9" ry="1.2" fill="#000" opacity="0.2" stroke="none"/>
      <!-- Rat 1 (shifted left, running) -->
      <path d="M0,13 Q-0.5,10 2.5,9 Q6.5,8 7.5,11 Q8,14 5,15 Q2,16 0,13 Z" fill="url(#rat-body)"/>
      <ellipse cx="3.5" cy="12" rx="1.5" ry="1" fill="url(#rat-belly)" opacity="0.6" stroke="none"/>
      <ellipse cx="7.5" cy="10.2" rx="2.5" ry="2" fill="url(#rat-body)"/>
      <ellipse cx="6" cy="8.6" rx="1.2" ry="1" fill="#bcaaa4"/>
      <ellipse cx="6" cy="8.6" rx="0.7" ry="0.6" fill="#f48fb1" stroke="none"/>
      <circle cx="8.8" cy="9.5" r="0.9" fill="#f44336"/>
      <circle cx="9.0" cy="9.2" r="0.3" fill="#fff" stroke="none"/>
      <circle cx="9.8" cy="10.4" r="0.5" fill="url(#rat-nose)"/>
      <path d="M0.5,14.5 Q-2,15.5 -1.5,18" stroke="#e91e63" stroke-width="1" fill="none" stroke-linecap="round"/>
      <!-- Legs spread wide (running) -->
      <line x1="2" y1="15" x2="0.5" y2="17.5" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="5" y1="15.5" x2="6" y2="17.5" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>

      <!-- Rat 2 (shifted right, lunging) -->
      <path d="M7,13.5 Q7,10.5 10,10 Q14.5,9.5 15,12.5 Q15.5,15.5 12,16 Q8.5,16.5 7,13.5 Z" fill="url(#rat-body)"/>
      <ellipse cx="11" cy="13" rx="2" ry="1.2" fill="url(#rat-belly)" opacity="0.6" stroke="none"/>
      <ellipse cx="15" cy="11.2" rx="3" ry="2.2" fill="url(#rat-body)"/>
      <ellipse cx="13.5" cy="9.5" rx="1.4" ry="1.2" fill="#bcaaa4"/>
      <ellipse cx="13.5" cy="9.5" rx="0.8" ry="0.7" fill="#f48fb1" stroke="none"/>
      <circle cx="16.5" cy="10.5" r="1" fill="#f44336"/>
      <circle cx="16.8" cy="10.2" r="0.35" fill="#fff" stroke="none"/>
      <circle cx="17.5" cy="11.5" r="0.6" fill="url(#rat-nose)"/>
      <path d="M7.5,15 Q5,17 5.5,19" stroke="#e91e63" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Legs mid-stride -->
      <line x1="9" y1="16" x2="8" y2="18.5" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>
      <line x1="12" y1="16.5" x2="13" y2="18.5" stroke="#4e342e" stroke-width="0.9" stroke-linecap="round"/>

      <!-- Rat 3 (repositioned upper-right) -->
      <path d="M13,6.5 Q13,3.5 16,3 Q19,2.5 19.5,5.5 Q20,8 17,8.5 Q14,9 13,6.5 Z" fill="url(#rat-body)"/>
      <ellipse cx="16" cy="6" rx="1.5" ry="1" fill="url(#rat-belly)" opacity="0.6" stroke="none"/>
      <ellipse cx="19.5" cy="5" rx="2.2" ry="1.8" fill="url(#rat-body)"/>
      <ellipse cx="18.2" cy="3.7" rx="1.1" ry="0.9" fill="#bcaaa4"/>
      <ellipse cx="18.2" cy="3.7" rx="0.6" ry="0.5" fill="#f48fb1" stroke="none"/>
      <circle cx="20.5" cy="4.5" r="0.8" fill="#f44336"/>
      <circle cx="20.7" cy="4.2" r="0.28" fill="#fff" stroke="none"/>
      <circle cx="21.3" cy="5.4" r="0.45" fill="url(#rat-nose)"/>
      <path d="M13.5,8 Q11,9.5 11.5,12" stroke="#e91e63" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <line x1="15" y1="8.5" x2="14" y2="11" stroke="#4e342e" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="17.5" y1="8.5" x2="18.5" y2="11" stroke="#4e342e" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
