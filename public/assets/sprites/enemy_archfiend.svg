    <path d="M10,16 Q0,8 -1,20 Q1,32 9,36 Q11,28 12,20Z" fill="url(#af-wing)"/>
    <path d="M10,16 Q2,10 1,18" stroke="#7f0000" stroke-width="1" fill="none"/>
    <path d="M10,22 Q4,24 2,30" stroke="#7f0000" stroke-width="0.8" fill="none"/>
    <path d="M10,27 Q5,30 3,34" stroke="#7f0000" stroke-width="0.7" fill="none"/>
    <path d="M46,16 Q56,8 57,20 Q55,32 47,36 Q45,28 44,20Z" fill="url(#af-wing)"/>
    <path d="M46,16 Q54,10 55,18" stroke="#7f0000" stroke-width="1" fill="none"/>
    <path d="M46,22 Q52,24 54,30" stroke="#7f0000" stroke-width="0.8" fill="none"/>
    <path d="M46,27 Q51,30 53,34" stroke="#7f0000" stroke-width="0.7" fill="none"/>
    <!-- Legs (wider stance) -->
    <ellipse cx="18" cy="44" rx="7" ry="8" fill="url(#af-body)"/>
    <ellipse cx="38" cy="44" rx="7" ry="8" fill="url(#af-body)"/>
    <!-- Leg armor -->
    <ellipse cx="18" cy="40" rx="6" ry="4" fill="url(#af-armor)"/>
    <path d="M13,39 Q18,37 23,39" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <ellipse cx="38" cy="40" rx="6" ry="4" fill="url(#af-armor)"/>
    <path d="M33,39 Q38,37 43,39" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Hooves -->
    <path d="M12,51 Q16,54 18,54 Q20,54 20,52 Q18,53 16,53 Q14,52 12,51Z" fill="#1a1a2e"/>
    <path d="M32,51 Q36,54 38,54 Q40,54 40,52 Q38,53 36,53 Q34,52 32,51Z" fill="#1a1a2e"/>
    <!-- Body -->
    <ellipse cx="28" cy="30" rx="16" ry="14" fill="url(#af-body)"/>
    <ellipse cx="24" cy="24" rx="9" ry="7" fill="url(#af-body-hi)" opacity="0.35" stroke="none"/>
    <!-- Armor chest plate -->
    <path d="M16,24 Q20,20 28,20 Q36,20 40,24 Q38,34 28,36 Q18,34 16,24Z" fill="url(#af-armor)"/>
    <path d="M16,24 Q20,20 28,20 Q36,20 40,24" stroke="#ffd700" stroke-width="0.8" fill="none" opacity="0.9"/>
    <path d="M18,30 Q22,28 28,28 Q34,28 38,30" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <path d="M20,34 Q24,33 28,33 Q32,33 36,34" stroke="#ffd700" stroke-width="0.5" fill="none" opacity="0.6"/>
    <!-- Shoulders -->
    <ellipse cx="12" cy="22" rx="7" ry="6" fill="url(#af-armor)"/>
    <path d="M6,19 Q12,16 18,19" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <ellipse cx="44" cy="22" rx="7" ry="6" fill="url(#af-armor)"/>
    <path d="M38,19 Q44,16 50,19" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Left arm raised with claws -->
    <path d="M8,24 Q2,18 1,12" stroke="#7f0000" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M8,24 Q2,18 1,12" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Left claws extended up-out -->
    <path d="M1,12 Q-2,9 -3,7" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M1,12 Q-1,9 0,6" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M1,12 Q1,9 3,7" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M1,12 Q3,10 5,8" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Right arm raised with claws -->
    <path d="M48,24 Q54,18 55,12" stroke="#7f0000" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M48,24 Q54,18 55,12" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right claws extended up-out -->
    <path d="M55,12 Q58,9 59,7" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M55,12 Q57,9 56,6" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M55,12 Q55,9 53,7" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M55,12 Q53,10 51,8" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <ellipse cx="28" cy="15" rx="7" ry="5" fill="url(#af-body)"/>
    <!-- Head -->
    <ellipse cx="28" cy="9" rx="14" ry="11" fill="url(#af-body)"/>
    <ellipse cx="24" cy="5" rx="7" ry="5" fill="url(#af-body-hi)" opacity="0.3" stroke="none"/>
    <!-- Horns (more upright, aggressive) -->
    <path d="M14,4 Q5,-4 8,6 Q10,10 14,8Z" fill="url(#af-horn)"/>
    <path d="M13,4 Q6,-2 9,6" stroke="#424242" stroke-width="0.8" fill="none"/>
    <path d="M42,4 Q51,-4 48,6 Q46,10 42,8Z" fill="url(#af-horn)"/>
    <path d="M43,4 Q50,-2 47,6" stroke="#424242" stroke-width="0.8" fill="none"/>
    <!-- Eye glow halos (brighter in combat) -->
    <ellipse cx="21" cy="9" rx="6" ry="5" fill="url(#af-eye-glow)" stroke="none"/>
    <ellipse cx="35" cy="9" rx="6" ry="5" fill="url(#af-eye-glow)" stroke="none"/>
    <!-- Burning eyes (wider) -->
    <ellipse cx="21" cy="9" rx="4" ry="3.5" fill="url(#af-eye)"/>
    <circle cx="22" cy="9" r="1.5" fill="#1a0000"/>
    <circle cx="21.3" cy="8.4" r="0.7" fill="#fff" stroke="none"/>
    <ellipse cx="35" cy="9" rx="4" ry="3.5" fill="url(#af-eye)"/>
    <circle cx="36" cy="9" r="1.5" fill="#1a0000"/>
    <circle cx="35.3" cy="8.4" r="0.7" fill="#fff" stroke="none"/>
    <!-- Heavy brow -->
