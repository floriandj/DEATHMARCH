    <path d="M8,26 Q5,32 6,40" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Left clawed hand -->
    <path d="M6,40 Q3,43 2,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6,40 Q5,44 5,47" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6,40 Q7,44 8,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6,40 Q9,43 10,45" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Right arm (clawed, hanging) -->
    <path d="M48,26 Q51,32 50,40" stroke="#7f0000" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M48,26 Q51,32 50,40" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right clawed hand -->
    <path d="M50,40 Q47,43 46,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M50,40 Q49,44 49,47" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
