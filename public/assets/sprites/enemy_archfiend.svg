    <path d="M20,14 L18,17" stroke="#e8e8e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M24,14 L23,17" stroke="#e8e8e8" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M36,14 L38,17" stroke="#e8e8e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M32,14 L33,17" stroke="#e8e8e8" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Frame 1: Wings flared outward, claws raised -->
