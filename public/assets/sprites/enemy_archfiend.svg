    <ellipse cx="28" cy="54" rx="18" ry="2" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Bat wings folded behind (behind body) -->
    <path d="M8,18 Q2,12 1,22 Q3,30 8,34 Q10,28 10,22Z" fill="url(#af-wing)"/>
    <path d="M8,18 Q4,14 3,20" stroke="#7f0000" stroke-width="1" fill="none"/>
    <path d="M8,22 Q5,24 4,28" stroke="#7f0000" stroke-width="0.8" fill="none"/>
    <path d="M48,18 Q54,12 55,22 Q53,30 48,34 Q46,28 46,22Z" fill="url(#af-wing)"/>
    <path d="M48,18 Q52,14 53,20" stroke="#7f0000" stroke-width="1" fill="none"/>
    <path d="M48,22 Q51,24 52,28" stroke="#7f0000" stroke-width="0.8" fill="none"/>
    <!-- Legs -->
    <ellipse cx="20" cy="44" rx="7" ry="8" fill="url(#af-body)"/>
    <ellipse cx="36" cy="44" rx="7" ry="8" fill="url(#af-body)"/>
    <!-- Leg armor plates -->
    <ellipse cx="20" cy="40" rx="6" ry="4" fill="url(#af-armor)"/>
    <path d="M15,39 Q20,37 25,39" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <ellipse cx="36" cy="40" rx="6" ry="4" fill="url(#af-armor)"/>
    <path d="M31,39 Q36,37 41,39" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Hooves / cloven feet -->
    <path d="M14,51 Q18,54 20,54 Q22,54 22,52 Q20,53 18,53 Q16,52 14,51Z" fill="#1a1a2e"/>
    <path d="M30,51 Q34,54 36,54 Q38,54 38,52 Q36,53 34,53 Q32,52 30,51Z" fill="#1a1a2e"/>
    <!-- Body -->
    <ellipse cx="28" cy="30" rx="16" ry="14" fill="url(#af-body)"/>
    <!-- Body highlight -->
    <ellipse cx="24" cy="24" rx="9" ry="7" fill="url(#af-body-hi)" opacity="0.35" stroke="none"/>
    <!-- Heavy armor chest plate -->
    <path d="M16,24 Q20,20 28,20 Q36,20 40,24 Q38,34 28,36 Q18,34 16,24Z" fill="url(#af-armor)"/>
    <!-- Gold trim on armor -->
    <path d="M16,24 Q20,20 28,20 Q36,20 40,24" stroke="#ffd700" stroke-width="0.8" fill="none" opacity="0.9"/>
    <path d="M18,30 Q22,28 28,28 Q34,28 38,30" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <path d="M20,34 Q24,33 28,33 Q32,33 36,34" stroke="#ffd700" stroke-width="0.5" fill="none" opacity="0.6"/>
