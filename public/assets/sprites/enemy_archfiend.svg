    <path d="M30,5 Q35,3 41,5" stroke="#1a0000" stroke-width="2.5" fill="none"/>
    <!-- Roaring mouth (wide open) -->
    <path d="M16,13 Q28,19 40,13" fill="#4e0000" stroke="#1a1a2e" stroke-width="0.8"/>
    <path d="M18,13 L16,17" stroke="#e8e8e8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M22,13 L21,17" stroke="#e8e8e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M38,13 L40,17" stroke="#e8e8e8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M34,13 L35,17" stroke="#e8e8e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M28,13 L28,17" stroke="#e8e8e8" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
