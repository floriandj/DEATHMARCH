<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 56" width="112" height="56" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="af-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#4e0000"/>
    </linearGradient>
    <linearGradient id="af-body-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="af-horn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <radialGradient id="af-eye" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="40%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
    <radialGradient id="af-eye-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffcc80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6d00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="af-wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#4e0000"/>
    </linearGradient>
    <linearGradient id="af-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
  </defs>

  <!-- Frame 0: Standing menacingly, wings folded behind -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="28" cy="54" rx="18" ry="2" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Bat wings folded behind (behind body) -->
    <path d="M8,18 Q2,12 1,22 Q3,30 8,34 Q10,28 10,22Z" fill="url(#af-wing)"/>
    <path d="M8,18 Q4,14 3,20" stroke="#7f0000" stroke-width="1" fill="none"/>
    <path d="M8,22 Q5,24 4,28" stroke="#7f0000" stroke-width="0.8" fill="none"/>
    <path d="M48,18 Q54,12 55,22 Q53,30 48,34 Q46,28 46,22Z" fill="url(#af-wing)"/>
    <path d="M48,18 Q52,14 53,20" stroke="#7f0000" stroke-width="1" fill="none"/>
    <path d="M48,22 Q51,24 52,28" stroke="#7f0000" stroke-width="0.8" fill="none"/>
    <!-- Legs -->
    <ellipse cx="20" cy="44" rx="7" ry="8" fill="url(#af-body)"/>
    <ellipse cx="36" cy="44" rx="7" ry="8" fill="url(#af-body)"/>
    <!-- Leg armor plates -->
    <ellipse cx="20" cy="40" rx="6" ry="4" fill="url(#af-armor)"/>
    <path d="M15,39 Q20,37 25,39" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <ellipse cx="36" cy="40" rx="6" ry="4" fill="url(#af-armor)"/>
    <path d="M31,39 Q36,37 41,39" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Hooves / cloven feet -->
    <path d="M14,51 Q18,54 20,54 Q22,54 22,52 Q20,53 18,53 Q16,52 14,51Z" fill="#1a1a2e"/>
    <path d="M30,51 Q34,54 36,54 Q38,54 38,52 Q36,53 34,53 Q32,52 30,51Z" fill="#1a1a2e"/>
    <!-- Body -->
    <ellipse cx="28" cy="30" rx="16" ry="14" fill="url(#af-body)"/>
    <!-- Body highlight -->
    <ellipse cx="24" cy="24" rx="9" ry="7" fill="url(#af-body-hi)" opacity="0.35" stroke="none"/>
    <!-- Heavy armor chest plate -->
    <path d="M16,24 Q20,20 28,20 Q36,20 40,24 Q38,34 28,36 Q18,34 16,24Z" fill="url(#af-armor)"/>
    <!-- Gold trim on armor -->
    <path d="M16,24 Q20,20 28,20 Q36,20 40,24" stroke="#ffd700" stroke-width="0.8" fill="none" opacity="0.9"/>
    <path d="M18,30 Q22,28 28,28 Q34,28 38,30" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <path d="M20,34 Q24,33 28,33 Q32,33 36,34" stroke="#ffd700" stroke-width="0.5" fill="none" opacity="0.6"/>
    <!-- Left shoulder armor -->
    <ellipse cx="12" cy="24" rx="7" ry="6" fill="url(#af-armor)"/>
    <path d="M6,21 Q12,18 18,21" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Right shoulder armor -->
    <ellipse cx="44" cy="24" rx="7" ry="6" fill="url(#af-armor)"/>
    <path d="M38,21 Q44,18 50,21" stroke="#ffd700" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Left arm (clawed, hanging) -->
    <path d="M8,26 Q5,32 6,40" stroke="#7f0000" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M8,26 Q5,32 6,40" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Left clawed hand -->
    <path d="M6,40 Q3,43 2,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6,40 Q5,44 5,47" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6,40 Q7,44 8,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M6,40 Q9,43 10,45" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Right arm (clawed, hanging) -->
    <path d="M48,26 Q51,32 50,40" stroke="#7f0000" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M48,26 Q51,32 50,40" stroke="#c62828" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right clawed hand -->
    <path d="M50,40 Q47,43 46,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M50,40 Q49,44 49,47" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M50,40 Q51,44 52,46" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M50,40 Q53,43 54,45" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <ellipse cx="28" cy="15" rx="7" ry="5" fill="url(#af-body)"/>
    <!-- Head -->
    <ellipse cx="28" cy="9" rx="14" ry="11" fill="url(#af-body)"/>
    <!-- Head highlight -->
    <ellipse cx="24" cy="5" rx="7" ry="5" fill="url(#af-body-hi)" opacity="0.3" stroke="none"/>
    <!-- Large curved horns -->
    <path d="M14,4 Q6,-2 9,6 Q11,10 14,8Z" fill="url(#af-horn)"/>
    <path d="M13,4 Q7,0 10,6" stroke="#424242" stroke-width="0.8" fill="none"/>
    <path d="M42,4 Q50,-2 47,6 Q45,10 42,8Z" fill="url(#af-horn)"/>
    <path d="M43,4 Q49,0 46,6" stroke="#424242" stroke-width="0.8" fill="none"/>
    <!-- Eye glow halos -->
    <ellipse cx="21" cy="9" rx="5" ry="4" fill="url(#af-eye-glow)" stroke="none"/>
    <ellipse cx="35" cy="9" rx="5" ry="4" fill="url(#af-eye-glow)" stroke="none"/>
    <!-- Burning eyes -->
    <ellipse cx="21" cy="9" rx="3.5" ry="3" fill="url(#af-eye)"/>
    <circle cx="22" cy="9" r="1.5" fill="#1a0000"/>
    <circle cx="21.3" cy="8.4" r="0.7" fill="#fff" stroke="none"/>
    <ellipse cx="35" cy="9" rx="3.5" ry="3" fill="url(#af-eye)"/>
    <circle cx="36" cy="9" r="1.5" fill="#1a0000"/>
    <circle cx="35.3" cy="8.4" r="0.7" fill="#fff" stroke="none"/>
