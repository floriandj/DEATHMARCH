    <rect x="6" y="4" width="12" height="10" fill="#27ae60"/>
    <rect x="6" y="6" width="4" height="4" fill="#111"/>
    <rect x="7" y="7" width="2" height="2" fill="#ff0"/>
    <rect x="14" y="6" width="4" height="4" fill="#111"/>
    <rect x="15" y="7" width="2" height="2" fill="#ff0"/>
    <rect x="8" y="12" width="8" height="4" fill="#1a7a3a"/>
    <rect x="9" y="12" width="2" height="3" fill="#ddd"/>
    <rect x="13" y="12" width="2" height="3" fill="#ddd"/>

    <!-- Center head (slightly up) -->
    <rect x="28" y="0" width="32" height="18" fill="#2ecc71"/>
    <rect x="30" y="2" width="28" height="14" fill="#27ae60"/>
    <rect x="32" y="4" width="8" height="6" fill="#111"/>
    <rect x="34" y="5" width="4" height="4" fill="#ff0"/>
    <rect x="48" y="4" width="8" height="6" fill="#111"/>
    <rect x="50" y="5" width="4" height="4" fill="#ff0"/>
    <rect x="34" y="12" width="20" height="8" fill="#1a7a3a"/>
    <rect x="36" y="12" width="3" height="5" fill="#ddd"/>
    <rect x="41" y="12" width="3" height="6" fill="#ddd"/>
    <rect x="46" y="12" width="3" height="5" fill="#ddd"/>
    <rect x="51" y="12" width="3" height="6" fill="#ddd"/>

    <!-- Right head (swayed right) -->
