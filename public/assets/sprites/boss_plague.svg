<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 88" width="704" height="352" shape-rendering="geometricPrecision">
  <defs>
    <!-- Bloated sickly body -->
    <linearGradient id="plague-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ccc65"/>
      <stop offset="50%" stop-color="#689f38"/>
      <stop offset="100%" stop-color="#33691e"/>
    </linearGradient>
    <linearGradient id="plague-body-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#558b2f"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="plague-body-hi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcedc8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#689f38" stop-opacity="0"/>
