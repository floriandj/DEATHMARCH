    <!-- Distended belly -->
    <radialGradient id="plague-belly" cx="0.4" cy="0.4" r="0.65">
      <stop offset="0%" stop-color="#c5e1a5"/>
      <stop offset="50%" stop-color="#8bc34a"/>
      <stop offset="100%" stop-color="#33691e"/>
    </radialGradient>
    <!-- Pustules -->
    <radialGradient id="plague-pustule" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#f9fbe7"/>
      <stop offset="50%" stop-color="#cddc39"/>
      <stop offset="100%" stop-color="#827717"/>
    </radialGradient>
    <radialGradient id="plague-pustule2" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="50%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </radialGradient>
    <!-- Toxic cloud -->
    <radialGradient id="plague-toxic" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#76ff03" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#64dd17" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0"/>
    </radialGradient>
    <!-- Rib bones -->
