    <path d="M28,40 Q22,44 24,50 Q28,52 32,48 Q32,44 28,40Z" fill="url(#plague-bone)" stroke="#8d6e63" stroke-width="0.8"/>
    <path d="M28,48 Q22,52 24,58 Q28,60 32,56 Q32,52 28,48Z" fill="url(#plague-bone)" stroke="#8d6e63" stroke-width="0.8"/>
    <path d="M28,56 Q22,60 24,66 Q28,68 32,64 Q32,60 28,56Z" fill="url(#plague-bone)" stroke="#8d6e63" stroke-width="0.8"/>
    <path d="M60,40 Q66,44 64,50 Q60,52 56,48 Q56,44 60,40Z" fill="url(#plague-bone)" stroke="#8d6e63" stroke-width="0.8"/>
