  <g>
    <!-- Left head -->
    <rect x="8" y="0" width="16" height="14" fill="#2ecc71"/>
    <rect x="10" y="2" width="12" height="10" fill="#27ae60"/>
    <rect x="10" y="4" width="4" height="4" fill="#111"/>
    <rect x="11" y="5" width="2" height="2" fill="#ff0"/>
    <rect x="18" y="4" width="4" height="4" fill="#111"/>
    <rect x="19" y="5" width="2" height="2" fill="#ff0"/>
    <rect x="12" y="10" width="8" height="4" fill="#1a7a3a"/>
    <rect x="13" y="10" width="2" height="3" fill="#ddd"/>
    <rect x="17" y="10" width="2" height="3" fill="#ddd"/>

    <!-- Center head (main, bigger) -->
    <rect x="28" y="0" width="32" height="20" fill="#2ecc71"/>
    <rect x="30" y="2" width="28" height="16" fill="#27ae60"/>
    <rect x="32" y="6" width="8" height="6" fill="#111"/>
    <rect x="34" y="7" width="4" height="4" fill="#ff0"/>
    <rect x="48" y="6" width="8" height="6" fill="#111"/>
