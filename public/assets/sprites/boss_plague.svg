    <rect x="60" y="44" width="4" height="10" fill="#1a7a3a"/>

    <!-- Stubby arms -->
    <rect x="2" y="30" width="10" height="16" fill="#2ecc71"/>
    <rect x="4" y="32" width="6" height="12" fill="#27ae60"/>
    <rect x="2" y="44" width="8" height="6" fill="#1a7a3a"/>
    <rect x="76" y="30" width="10" height="16" fill="#2ecc71"/>
    <rect x="78" y="32" width="6" height="12" fill="#27ae60"/>
    <rect x="78" y="44" width="8" height="6" fill="#1a7a3a"/>

