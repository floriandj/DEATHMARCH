    <rect x="66" y="4" width="4" height="4" fill="#111"/>
    <rect x="67" y="5" width="2" height="2" fill="#ff0"/>
    <rect x="74" y="4" width="4" height="4" fill="#111"/>
    <rect x="75" y="5" width="2" height="2" fill="#ff0"/>
    <rect x="68" y="10" width="8" height="4" fill="#1a7a3a"/>
    <rect x="69" y="10" width="2" height="3" fill="#ddd"/>
    <rect x="73" y="10" width="2" height="3" fill="#ddd"/>

    <!-- Necks -->
    <rect x="12" y="12" width="8" height="14" fill="#27ae60"/>
