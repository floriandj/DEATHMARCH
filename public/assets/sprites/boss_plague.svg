    <rect x="70" y="4" width="12" height="10" fill="#27ae60"/>
    <rect x="70" y="6" width="4" height="4" fill="#111"/>
    <rect x="71" y="7" width="2" height="2" fill="#ff0"/>
    <rect x="78" y="6" width="4" height="4" fill="#111"/>
    <rect x="79" y="7" width="2" height="2" fill="#ff0"/>
    <rect x="72" y="12" width="8" height="4" fill="#1a7a3a"/>
    <rect x="73" y="12" width="2" height="3" fill="#ddd"/>
    <rect x="77" y="12" width="2" height="3" fill="#ddd"/>

    <!-- Necks -->
    <rect x="10" y="14" width="8" height="14" fill="#27ae60"/>
    <rect x="36" y="16" width="16" height="10" fill="#27ae60"/>
    <rect x="70" y="14" width="8" height="14" fill="#27ae60"/>

    <!-- Body -->
    <rect x="8" y="26" width="72" height="34" fill="#27ae60"/>
    <rect x="12" y="28" width="64" height="30" fill="#2ecc71"/>
    <!-- Pustules (brighter pulse) -->
    <rect x="18" y="32" width="10" height="10" fill="#f1c40f"/>
    <rect x="20" y="34" width="6" height="6" fill="#e67e22"/>
    <rect x="22" y="36" width="2" height="2" fill="#fff"/>
    <rect x="38" y="30" width="12" height="12" fill="#f1c40f"/>
    <rect x="40" y="32" width="8" height="8" fill="#e67e22"/>
    <rect x="42" y="34" width="4" height="4" fill="#fff"/>
    <rect x="58" y="34" width="10" height="10" fill="#f1c40f"/>
    <rect x="60" y="36" width="6" height="6" fill="#e67e22"/>

    <!-- Arms -->
    <rect x="2" y="32" width="10" height="14" fill="#2ecc71"/>
    <rect x="4" y="34" width="6" height="10" fill="#27ae60"/>
    <rect x="76" y="32" width="10" height="14" fill="#2ecc71"/>
    <rect x="78" y="34" width="6" height="10" fill="#27ae60"/>

    <!-- Legs -->
    <rect x="12" y="58" width="18" height="16" fill="#1a7a3a"/>
    <rect x="14" y="60" width="14" height="12" fill="#27ae60"/>
    <rect x="58" y="59" width="18" height="16" fill="#1a7a3a"/>
    <rect x="60" y="61" width="14" height="12" fill="#27ae60"/>
    <rect x="8" y="72" width="22" height="6" fill="#145a2a"/>
    <rect x="54" y="73" width="22" height="6" fill="#145a2a"/>
