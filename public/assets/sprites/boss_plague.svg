    <rect x="20" y="30" width="8" height="8" fill="#f39c12"/>
    <rect x="22" y="32" width="4" height="4" fill="#e67e22"/>
    <rect x="40" y="28" width="10" height="10" fill="#f39c12"/>
    <rect x="42" y="30" width="6" height="6" fill="#e67e22"/>
    <rect x="44" y="32" width="2" height="2" fill="#fff"/>
    <rect x="58" y="32" width="8" height="8" fill="#f39c12"/>
    <rect x="60" y="34" width="4" height="4" fill="#e67e22"/>
