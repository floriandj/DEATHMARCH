<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 28" width="224" height="112" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bsrk-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="bsrk-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="bsrk-blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
    <radialGradient id="bsrk-eye" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffcc02"/>
      <stop offset="40%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <radialGradient id="bsrk-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Crouched ready stance -->
  <g stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow base -->
    <ellipse cx="14" cy="26.5" rx="9" ry="1.5" fill="url(#bsrk-shadow)" stroke="none"/>

    <!-- Legs (crouched/wide stance) -->
    <!-- Left leg bent -->
    <path d="M10,18 Q7,22 8,27" stroke="#c62828" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="8" cy="27" rx="3.5" ry="1" fill="#4e342e" stroke-width="0.7"/>
    <!-- Right leg bent -->
    <path d="M18,18 Q21,22 20,27" stroke="#c62828" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="20" cy="27" rx="3.5" ry="1" fill="#4e342e" stroke-width="0.7"/>

    <!-- Body (lean, muscular) -->
    <ellipse cx="14" cy="15" rx="6.5" ry="6" fill="url(#bsrk-body)" stroke-width="1"/>
    <!-- Muscle definition: chest lines -->
    <path d="M10,13 Q14,11.5 18,13" fill="none" stroke="#b71c1c" stroke-width="0.7"/>
    <line x1="14" y1="12" x2="14" y2="18" stroke="#b71c1c" stroke-width="0.6"/>
    <!-- Vein on arms -->
    <path d="M7,14 Q6,16 7,18" fill="none" stroke="#ef9a9a" stroke-width="0.5" opacity="0.7"/>
    <path d="M21,14 Q22,16 21,18" fill="none" stroke="#ef9a9a" stroke-width="0.5" opacity="0.7"/>

    <!-- Left arm (blade extended outward) -->
    <path d="M8,13 Q4,14 2,17" stroke="#c62828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="2" cy="17.5" r="2" fill="#c62828" stroke-width="0.7"/>
    <!-- Left blade -->
    <path d="M2,16 Q1,14 1,18 Q1.5,20 2,19 Z" fill="url(#bsrk-blade)" stroke-width="0.7"/>
    <line x1="1" y1="15" x2="2" y2="19" stroke="#bdbdbd" stroke-width="0.4"/>

    <!-- Right arm (blade angled up) -->
    <path d="M20,13 Q24,12 26,10" stroke="#c62828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="26" cy="10" r="2" fill="#c62828" stroke-width="0.7"/>
    <!-- Right blade -->
    <path d="M26,9 Q27,6 26,11 Q25.5,13 25,12 Z" fill="url(#bsrk-blade)" stroke-width="0.7"/>
    <line x1="27" y1="7" x2="25.5" y2="12" stroke="#bdbdbd" stroke-width="0.4"/>

    <!-- Neck -->
    <ellipse cx="14" cy="9.5" rx="3" ry="2" fill="#c62828" stroke-width="0.7"/>

    <!-- Head -->
    <ellipse cx="14" cy="6" rx="6" ry="5.5" fill="url(#bsrk-head)" stroke-width="1"/>
    <!-- Head highlight -->
    <ellipse cx="12" cy="4" rx="2.5" ry="1.8" fill="#ef5350" opacity="0.4" stroke="none"/>

    <!-- Wild spiky hair (darker red paths) -->
    <path d="M9,4 Q8,1 10,1 Q10,2.5 11,3" fill="#7f0000" stroke-width="0.6"/>
    <path d="M12,2 Q12,1 13,1 Q13.5,2 13,3" fill="#7f0000" stroke-width="0.6"/>
    <path d="M14,1.5 Q15,1 16,1 Q15.5,2 15,3" fill="#7f0000" stroke-width="0.6"/>
    <path d="M17,2.5 Q18,1 19,1.5 Q18,2.5 17,3.5" fill="#7f0000" stroke-width="0.6"/>
    <path d="M19,4 Q20,2.5 20,4 Q19.5,5 19,5" fill="#7f0000" stroke-width="0.6"/>

    <!-- War paint (diagonal stripes) -->
    <line x1="9" y1="5" x2="11" y2="7" stroke="#7f0000" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="17" y1="5" x2="19" y2="7" stroke="#7f0000" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Eyes (glowing orange) -->
    <ellipse cx="11.5" cy="6" rx="1.8" ry="1.6" fill="url(#bsrk-eye)" stroke-width="0.5"/>
    <ellipse cx="11.5" cy="6" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="11.1" cy="5.6" r="0.4" fill="white" stroke="none"/>

    <ellipse cx="16.5" cy="6" rx="1.8" ry="1.6" fill="url(#bsrk-eye)" stroke-width="0.5"/>
    <ellipse cx="16.5" cy="6" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="16.1" cy="5.6" r="0.4" fill="white" stroke="none"/>

    <!-- Nose -->
    <path d="M13.2,7.5 Q14,8.5 14.8,7.5" fill="none" stroke="#1a1a2e" stroke-width="0.6"/>

    <!-- Snarling mouth with teeth -->
    <path d="M11,8.5 Q14,10 17,8.5" fill="#7f0000" stroke-width="0.7"/>
    <path d="M11.5,9 Q14,10.5 16.5,9" fill="#1a1a2e" stroke="none"/>
    <line x1="12.5" y1="9" x2="12.5" y2="10" stroke="white" stroke-width="0.7"/>
    <line x1="14" y1="9.2" x2="14" y2="10.3" stroke="white" stroke-width="0.7"/>
    <line x1="15.5" y1="9" x2="15.5" y2="10" stroke="white" stroke-width="0.7"/>
  </g>

  <!-- Frame 1: Subtle walk variant — legs shifted, arms swayed slightly -->
  <g transform="translate(28,0)" stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow base -->
    <ellipse cx="14" cy="26.5" rx="9" ry="1.5" fill="url(#bsrk-shadow)" stroke="none"/>

    <!-- Left leg shifted forward 2px -->
    <path d="M10,18 Q6,22 6,27" stroke="#c62828" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="6" cy="27" rx="3.5" ry="1" fill="#4e342e" stroke-width="0.7"/>
    <!-- Right leg shifted back 2px -->
    <path d="M18,18 Q22,22 22,27" stroke="#c62828" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="22" cy="27" rx="3.5" ry="1" fill="#4e342e" stroke-width="0.7"/>

    <!-- Body (1px lower for walk bob) -->
    <ellipse cx="14" cy="16" rx="6.5" ry="6" fill="url(#bsrk-body)" stroke-width="1"/>
    <path d="M10,14 Q14,12.5 18,14" fill="none" stroke="#b71c1c" stroke-width="0.7"/>
    <line x1="14" y1="13" x2="14" y2="19" stroke="#b71c1c" stroke-width="0.6"/>
    <path d="M7,15 Q6,17 7,19" fill="none" stroke="#ef9a9a" stroke-width="0.5" opacity="0.7"/>
    <path d="M21,15 Q22,17 21,19" fill="none" stroke="#ef9a9a" stroke-width="0.5" opacity="0.7"/>

    <!-- Left arm swayed forward 2px -->
    <path d="M8,14 Q3,14 1,16" stroke="#c62828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="1" cy="16.5" r="2" fill="#c62828" stroke-width="0.7"/>
    <!-- Left blade -->
    <path d="M1,15 Q1,13 1,17 Q1.5,19 2,18 Z" fill="url(#bsrk-blade)" stroke-width="0.7"/>
    <line x1="1" y1="14" x2="2" y2="18" stroke="#bdbdbd" stroke-width="0.4"/>

    <!-- Right arm swayed back 2px -->
    <path d="M20,14 Q25,14 27,12" stroke="#c62828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="27" cy="12" r="2" fill="#c62828" stroke-width="0.7"/>
    <!-- Right blade -->
    <path d="M27,11 Q27,8 27,13 Q26.5,15 26,14 Z" fill="url(#bsrk-blade)" stroke-width="0.7"/>
    <line x1="27" y1="9" x2="26.5" y2="14" stroke="#bdbdbd" stroke-width="0.4"/>

    <!-- Neck -->
    <ellipse cx="14" cy="9.5" rx="3" ry="2" fill="#c62828" stroke-width="0.7"/>

    <!-- Head (same position) -->
    <ellipse cx="14" cy="6" rx="6" ry="5.5" fill="url(#bsrk-head)" stroke-width="1"/>
    <ellipse cx="12" cy="4" rx="2.5" ry="1.8" fill="#ef5350" opacity="0.4" stroke="none"/>

    <!-- Wild spiky hair -->
    <path d="M9,4 Q8,1 10,1 Q10,2.5 11,3" fill="#7f0000" stroke-width="0.6"/>
    <path d="M12,2 Q12,1 13,1 Q13.5,2 13,3" fill="#7f0000" stroke-width="0.6"/>
    <path d="M14,1.5 Q15,1 16,1 Q15.5,2 15,3" fill="#7f0000" stroke-width="0.6"/>
    <path d="M17,2.5 Q18,1 19,1.5 Q18,2.5 17,3.5" fill="#7f0000" stroke-width="0.6"/>
    <path d="M19,4 Q20,2.5 20,4 Q19.5,5 19,5" fill="#7f0000" stroke-width="0.6"/>

    <!-- War paint -->
    <line x1="9" y1="5" x2="11" y2="7" stroke="#7f0000" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="17" y1="5" x2="19" y2="7" stroke="#7f0000" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="11.5" cy="6" rx="1.8" ry="1.6" fill="url(#bsrk-eye)" stroke-width="0.5"/>
    <ellipse cx="11.5" cy="6" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="11.1" cy="5.6" r="0.4" fill="white" stroke="none"/>

    <ellipse cx="16.5" cy="6" rx="1.8" ry="1.6" fill="url(#bsrk-eye)" stroke-width="0.5"/>
    <ellipse cx="16.5" cy="6" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="16.1" cy="5.6" r="0.4" fill="white" stroke="none"/>

    <!-- Nose -->
    <path d="M13.2,7.5 Q14,8.5 14.8,7.5" fill="none" stroke="#1a1a2e" stroke-width="0.6"/>

    <!-- Snarling mouth with teeth -->
    <path d="M11,8.5 Q14,10 17,8.5" fill="#7f0000" stroke-width="0.7"/>
    <path d="M11.5,9 Q14,10.5 16.5,9" fill="#1a1a2e" stroke="none"/>
    <line x1="12.5" y1="9" x2="12.5" y2="10" stroke="white" stroke-width="0.7"/>
    <line x1="14" y1="9.2" x2="14" y2="10.3" stroke="white" stroke-width="0.7"/>
    <line x1="15.5" y1="9" x2="15.5" y2="10" stroke="white" stroke-width="0.7"/>
  </g>
</svg>
