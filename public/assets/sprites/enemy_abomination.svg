    <path d="M51,34 Q49,38 48,41" stroke="#1a1a2e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M53,35 Q53,39 53,42" stroke="#1a1a2e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M55,34 Q55,38 55,40" stroke="#1a1a2e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Third small vestigial arm (slightly different angle) -->
