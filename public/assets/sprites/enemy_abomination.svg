    <circle cx="20.5" cy="9" r="2" fill="#f44336"/>
    <circle cx="21" cy="9" r="1" fill="#1a0000"/>
    <circle cx="20.4" cy="8.5" r="0.5" fill="#fff" stroke="none"/>
    <!-- Right eye (smaller, yellow-green) -->
