    <!-- Medium right arm (shifted back 2px) -->
    <path d="M45,19 Q51,24 53,32" stroke="#4a148c" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M45,19 Q51,24 53,32" stroke="#8e24aa" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right hand/claws -->
