    <circle cx="30.3" cy="7.5" r="1.5" fill="#f57f17"/>
    <circle cx="30.5" cy="8" r="0.8" fill="#1a0000"/>
    <circle cx="30" cy="7.2" r="0.4" fill="#fff" stroke="none"/>
