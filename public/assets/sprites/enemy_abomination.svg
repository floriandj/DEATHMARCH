  </defs>

  <!-- Frame 0: Lurching to one side (asymmetric, grotesque) -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow (irregular) -->
    <ellipse cx="26" cy="53" rx="20" ry="2.5" fill="#000" opacity="0.2" stroke="none"/>
    <!-- Massive asymmetric body (lurching left) -->
    <!-- Left thick leg -->
    <ellipse cx="16" cy="44" rx="9" ry="10" fill="url(#ab-flesh)"/>
    <!-- Right thinner leg -->
    <ellipse cx="34" cy="46" rx="6" ry="8" fill="url(#ab-flesh)"/>
    <!-- Foot lumps -->
    <ellipse cx="13" cy="53" rx="11" ry="3.5" fill="url(#ab-flesh-dark)"/>
    <ellipse cx="33" cy="53" rx="7" ry="3" fill="url(#ab-flesh-dark)"/>
    <!-- Main torso (massive, lopsided) -->
    <path d="M4,18 Q4,10 14,8 Q24,6 36,10 Q46,14 46,22 Q46,36 38,42 Q28,46 16,44 Q4,40 4,30 Q4,24 4,18Z" fill="url(#ab-flesh)"/>
    <!-- Body highlight (mottled) -->
    <ellipse cx="18" cy="22" rx="12" ry="10" fill="url(#ab-flesh-hi)" opacity="0.3" stroke="none"/>
    <!-- Exposed bone patches -->
    <path d="M8,28 Q10,24 14,26 Q12,30 8,28Z" fill="url(#ab-bone)" stroke="#ccc" stroke-width="0.6"/>
    <path d="M36,20 Q40,18 42,22 Q40,24 36,22 Q36,20 36,20Z" fill="url(#ab-bone)" stroke="#ccc" stroke-width="0.6"/>
