<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 56" width="448" height="224" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="ab-flesh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8e24aa"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <linearGradient id="ab-flesh-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ba68c8"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <linearGradient id="ab-flesh-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#2d0050"/>
    </linearGradient>
    <radialGradient id="ab-drool" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ccff90"/>
      <stop offset="100%" stop-color="#33691e"/>
    </radialGradient>
    <linearGradient id="ab-bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffff0"/>
      <stop offset="100%" stop-color="#e0e0d0"/>
