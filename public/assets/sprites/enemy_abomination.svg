<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 56" width="112" height="56" shape-rendering="crispEdges">
  <!-- Frame 0: Abomination - massive stitched-together horror -->
  <g>
    <!-- Head (tiny for body) -->
    <rect x="18" y="2" width="20" height="10" fill="#8e44ad"/>
    <rect x="20" y="3" width="16" height="8" fill="#6c3483"/>
    <!-- Eyes (mismatched) -->
    <rect x="22" y="5" width="4" height="3" fill="#ff0000"/>
    <rect x="23" y="6" width="2" height="1" fill="#ff6666"/>
    <rect x="32" y="4" width="3" height="4" fill="#ffe100"/>
    <rect x="33" y="5" width="1" height="2" fill="#000"/>
    <!-- Mouth (stitched) -->
    <rect x="24" y="9" width="10" height="2" fill="#441155"/>
    <rect x="25" y="9" width="1" height="2" fill="#888"/>
    <rect x="28" y="9" width="1" height="2" fill="#888"/>
    <rect x="31" y="9" width="1" height="2" fill="#888"/>
    <!-- Massive body -->
    <rect x="6" y="12" width="44" height="24" fill="#8e44ad"/>
    <rect x="8" y="14" width="40" height="20" fill="#6c3483"/>
    <!-- Stitches across body -->
    <rect x="26" y="14" width="2" height="20" fill="#555"/>
    <rect x="12" y="22" width="32" height="2" fill="#555"/>
    <!-- Exposed innards -->
    <rect x="14" y="16" width="10" height="8" fill="#aa3377"/>
    <rect x="16" y="18" width="6" height="4" fill="#cc4488"/>
    <rect x="32" y="18" width="8" height="6" fill="#aa3377"/>
    <rect x="34" y="20" width="4" height="2" fill="#cc4488"/>
    <!-- Left arm (huge) -->
    <rect x="0" y="14" width="8" height="18" fill="#6c3483"/>
    <rect x="0" y="30" width="10" height="8" fill="#5b2c6f"/>
    <!-- Right arm (different size - asymmetric) -->
    <rect x="48" y="16" width="6" height="14" fill="#6c3483"/>
    <rect x="47" y="28" width="8" height="6" fill="#5b2c6f"/>
    <!-- Legs (thick) -->
    <rect x="10" y="36" width="12" height="12" fill="#6c3483"/>
    <rect x="34" y="36" width="12" height="12" fill="#6c3483"/>
    <!-- Feet -->
    <rect x="8" y="46" width="14" height="10" fill="#4a235a"/>
    <rect x="34" y="46" width="14" height="10" fill="#4a235a"/>
  </g>
  <!-- Frame 1: Lumbering -->
  <g transform="translate(56,0)">
    <rect x="19" y="2" width="20" height="10" fill="#8e44ad"/>
    <rect x="21" y="3" width="16" height="8" fill="#6c3483"/>
    <rect x="23" y="5" width="4" height="3" fill="#ff0000"/>
    <rect x="24" y="6" width="2" height="1" fill="#ff6666"/>
    <rect x="33" y="4" width="3" height="4" fill="#ffe100"/>
    <rect x="34" y="5" width="1" height="2" fill="#000"/>
    <rect x="25" y="9" width="10" height="2" fill="#441155"/>
    <rect x="26" y="9" width="1" height="2" fill="#888"/>
    <rect x="29" y="9" width="1" height="2" fill="#888"/>
    <rect x="32" y="9" width="1" height="2" fill="#888"/>
    <rect x="6" y="12" width="44" height="24" fill="#8e44ad"/>
    <rect x="8" y="14" width="40" height="20" fill="#6c3483"/>
    <rect x="26" y="14" width="2" height="20" fill="#555"/>
    <rect x="12" y="22" width="32" height="2" fill="#555"/>
    <rect x="14" y="16" width="10" height="8" fill="#aa3377"/>
    <rect x="16" y="18" width="6" height="4" fill="#cc4488"/>
    <rect x="32" y="18" width="8" height="6" fill="#aa3377"/>
    <rect x="34" y="20" width="4" height="2" fill="#cc4488"/>
    <!-- Arms swinging -->
    <rect x="0" y="12" width="8" height="18" fill="#6c3483"/>
    <rect x="0" y="28" width="10" height="8" fill="#5b2c6f"/>
    <rect x="48" y="18" width="6" height="14" fill="#6c3483"/>
    <rect x="47" y="30" width="8" height="6" fill="#5b2c6f"/>
    <!-- Legs stride -->
    <rect x="8" y="36" width="12" height="11" fill="#6c3483"/>
    <rect x="36" y="37" width="12" height="12" fill="#6c3483"/>
    <rect x="6" y="45" width="14" height="10" fill="#4a235a"/>
    <rect x="36" y="47" width="14" height="9" fill="#4a235a"/>
  </g>
</svg>
