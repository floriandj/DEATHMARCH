    <path d="M6,24 Q16,22 26,24 Q36,26 44,24" stroke="#555" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <path d="M10,34 Q18,32 28,34 Q36,36 42,34" stroke="#444" stroke-width="0.8" fill="none" stroke-dasharray="1.5,2"/>
    <!-- Large left arm (primary, massive) — kept within bounds -->
    <path d="M5,22 Q2,26 2,34" stroke="#4a148c" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M5,22 Q2,26 2,34" stroke="#8e24aa" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Left fist/claws (within bounds) -->
