    <path d="M31,13 Q35,9 37,5" stroke="#7b1fa2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Tiny clawed end -->
    <path d="M37,5 Q39,3 40,2" stroke="#1a1a2e" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M37,5 Q38,3 37,2" stroke="#1a1a2e" stroke-width="1" fill="none" stroke-linecap="round"/>
