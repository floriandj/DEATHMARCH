<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 24" width="48" height="24" shape-rendering="crispEdges">
  <!-- Frame 0 -->
  <g>
    <!-- Ears -->
    <rect x="1" y="3" width="3" height="4" fill="#cc4444"/>
    <rect x="20" y="3" width="3" height="4" fill="#cc4444"/>
    <!-- Head -->
    <rect x="5" y="1" width="14" height="8" fill="#ff6b6b"/>
    <rect x="6" y="2" width="12" height="6" fill="#e05555"/>
    <!-- Eyes (big, white, beady) -->
    <rect x="7" y="3" width="3" height="3" fill="#fff"/>
    <rect x="14" y="3" width="3" height="3" fill="#fff"/>
    <rect x="8" y="4" width="2" height="2" fill="#111"/>
    <rect x="15" y="4" width="2" height="2" fill="#111"/>
    <!-- Mouth -->
    <rect x="9" y="7" width="6" height="1" fill="#880000"/>
    <rect x="10" y="7" width="1" height="1" fill="#fff"/>
    <rect x="13" y="7" width="1" height="1" fill="#fff"/>
    <!-- Body (hunched) -->
    <rect x="5" y="9" width="14" height="7" fill="#ff6b6b"/>
    <rect x="7" y="10" width="10" height="5" fill="#cc4444"/>
    <!-- Arms (scrawny) -->
    <rect x="2" y="10" width="3" height="5" fill="#e05555"/>
    <rect x="19" y="10" width="3" height="5" fill="#e05555"/>
    <!-- Claws -->
    <rect x="2" y="14" width="2" height="2" fill="#aa3333"/>
    <rect x="20" y="14" width="2" height="2" fill="#aa3333"/>
    <!-- Legs -->
    <rect x="6" y="16" width="4" height="6" fill="#cc4444"/>
    <rect x="14" y="16" width="4" height="6" fill="#cc4444"/>
    <!-- Feet -->
    <rect x="5" y="21" width="5" height="3" fill="#993333"/>
    <rect x="14" y="21" width="5" height="3" fill="#993333"/>
  </g>
  <!-- Frame 1 -->
  <g transform="translate(24,0)">
    <!-- Ears -->
    <rect x="1" y="3" width="3" height="4" fill="#cc4444"/>
    <rect x="20" y="3" width="3" height="4" fill="#cc4444"/>
    <!-- Head -->
    <rect x="5" y="1" width="14" height="8" fill="#ff6b6b"/>
    <rect x="6" y="2" width="12" height="6" fill="#e05555"/>
    <!-- Eyes -->
    <rect x="7" y="3" width="3" height="3" fill="#fff"/>
    <rect x="14" y="3" width="3" height="3" fill="#fff"/>
    <rect x="8" y="4" width="2" height="2" fill="#111"/>
    <rect x="15" y="4" width="2" height="2" fill="#111"/>
    <!-- Mouth -->
    <rect x="9" y="7" width="6" height="1" fill="#880000"/>
    <rect x="10" y="7" width="1" height="1" fill="#fff"/>
    <rect x="13" y="7" width="1" height="1" fill="#fff"/>
    <!-- Body -->
    <rect x="5" y="9" width="14" height="7" fill="#ff6b6b"/>
    <rect x="7" y="10" width="10" height="5" fill="#cc4444"/>
    <!-- Arms (swinging) -->
    <rect x="1" y="11" width="4" height="4" fill="#e05555"/>
    <rect x="19" y="9" width="4" height="4" fill="#e05555"/>
    <!-- Claws -->
    <rect x="1" y="14" width="2" height="2" fill="#aa3333"/>
    <rect x="21" y="12" width="2" height="2" fill="#aa3333"/>
    <!-- Legs (stride) -->
    <rect x="5" y="16" width="4" height="5" fill="#cc4444"/>
    <rect x="15" y="17" width="4" height="6" fill="#cc4444"/>
    <!-- Feet -->
    <rect x="4" y="20" width="5" height="3" fill="#993333"/>
    <rect x="15" y="22" width="5" height="2" fill="#993333"/>
  </g>
</svg>
