<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="cryo_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="cryo_tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#455a64"/>
    </linearGradient>
    <linearGradient id="cryo_grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="cryo_energy" cx="20%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="50%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#006064" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Wide angular nozzle -->
    <rect x="1" y="9" width="8" height="7" rx="0.5" fill="url(#cryo_body)"/>
    <!-- Energy ice glow from nozzle -->
    <rect x="1" y="9" width="5" height="7" rx="0.5" fill="url(#cryo_energy)"/>
    <!-- Ice crystal spikes at tip -->
    <polygon points="1,9 3,7 2,9" fill="#b2ebf2" stroke="#1a1a2e" stroke-width="1"/>
    <polygon points="1,16 3,18 2,16" fill="#b2ebf2" stroke="#1a1a2e" stroke-width="1"/>
    <polygon points="1,12 0,11 0,14" fill="#e0f7fa" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Nozzle grating lines -->
    <line x1="4" y1="9" x2="4" y2="16" stroke="#424242" stroke-width="0.8"/>
    <line x1="6" y1="9" x2="6" y2="16" stroke="#424242" stroke-width="0.8"/>
    <!-- Boxy main body -->
    <rect x="8" y="7" width="14" height="11" rx="1" fill="url(#cryo_tank)"/>
    <!-- Pressure window/gauge -->
    <rect x="10" y="9" width="5" height="5" rx="0.5" fill="#212121" stroke-width="1"/>
    <circle cx="12.5" cy="11.5" r="2" fill="#004d40" stroke-width="0.8"/>
    <circle cx="12.5" cy="11.5" r="1" fill="#00bcd4" stroke="#1a1a2e" stroke-width="0.8"/>
    <!-- Cryo cell vents (angular slits) -->
    <line x1="16" y1="8" x2="21" y2="8" stroke="#616161" stroke-width="0.8"/>
    <line x1="16" y1="10" x2="21" y2="10" stroke="#616161" stroke-width="0.8"/>
    <line x1="16" y1="12" x2="21" y2="12" stroke="#616161" stroke-width="0.8"/>
    <line x1="16" y1="14" x2="21" y2="14" stroke="#616161" stroke-width="0.8"/>
    <line x1="16" y1="16" x2="21" y2="16" stroke="#616161" stroke-width="0.8"/>
    <!-- Rectangular stock tube -->
    <rect x="21" y="9" width="10" height="6" rx="0.5" fill="url(#cryo_body)"/>
    <rect x="27" y="10" width="4" height="4" rx="0.3" fill="#616161" stroke-width="1"/>
    <!-- Grip -->
    <rect x="18" y="18" width="6" height="9" rx="1" fill="url(#cryo_grip)"/>
    <line x1="19.5" y1="20" x2="22.5" y2="20" stroke="#424242" stroke-width="0.8"/>
    <line x1="19.5" y1="22" x2="22.5" y2="22" stroke="#424242" stroke-width="0.8"/>
    <line x1="19.5" y1="24" x2="22.5" y2="24" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M10 18 L10 23 Q10 25 12 25 L18 25" fill="url(#cryo_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="11.5" y1="18" x2="11" y2="22" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Cryo canister (under body) -->
    <rect x="9" y="27" width="10" height="4" rx="1" fill="#455a64" stroke-width="1"/>
    <rect x="10" y="28" width="8" height="2" rx="0.5" fill="#546e7a" stroke-width="0.8"/>
  </g>
</svg>
