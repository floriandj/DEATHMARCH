<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 88" width="176" height="88" shape-rendering="crispEdges">
  <!-- Frame 0: Frost Wyrm - icy serpentine dragon -->
  <g>
    <!-- Ice horns -->
    <rect x="20" y="0" width="4" height="12" fill="#88ddff"/>
    <rect x="21" y="0" width="2" height="6" fill="#ccffff"/>
    <rect x="34" y="0" width="6" height="8" fill="#88ddff"/>
    <rect x="48" y="0" width="6" height="10" fill="#88ddff"/>
    <rect x="60" y="0" width="4" height="12" fill="#88ddff"/>
    <rect x="61" y="0" width="2" height="6" fill="#ccffff"/>

    <!-- Head (dragon-like, angular) -->
    <rect x="16" y="8" width="56" height="22" fill="#4488bb"/>
    <rect x="18" y="10" width="52" height="18" fill="#5599cc"/>
    <!-- Ice scales -->
    <rect x="22" y="10" width="4" height="4" fill="#88ccee"/>
    <rect x="30" y="10" width="4" height="4" fill="#88ccee"/>
    <rect x="50" y="10" width="4" height="4" fill="#88ccee"/>
    <rect x="58" y="10" width="4" height="4" fill="#88ccee"/>

    <!-- Eyes (cold blue glow) -->
    <rect x="22" y="16" width="14" height="8" fill="#112233"/>
    <rect x="52" y="16" width="14" height="8" fill="#112233"/>
    <rect x="24" y="17" width="10" height="6" fill="#00aaff"/>
    <rect x="54" y="17" width="10" height="6" fill="#00aaff"/>
    <rect x="28" y="18" width="4" height="4" fill="#ccffff"/>
    <rect x="58" y="18" width="4" height="4" fill="#ccffff"/>

    <!-- Snout -->
    <rect x="30" y="26" width="28" height="8" fill="#4488bb"/>
    <rect x="32" y="27" width="24" height="6" fill="#5599cc"/>
    <!-- Teeth (icicle-like) -->
    <rect x="32" y="26" width="3" height="6" fill="#eeffff"/>
    <rect x="38" y="26" width="3" height="7" fill="#eeffff"/>
    <rect x="44" y="26" width="3" height="6" fill="#eeffff"/>
    <rect x="50" y="26" width="3" height="7" fill="#eeffff"/>

    <!-- Neck/Body (serpentine, scaled) -->
    <rect x="10" y="32" width="68" height="32" fill="#4488bb"/>
    <rect x="14" y="34" width="60" height="28" fill="#5599cc"/>
    <!-- Frost core -->
    <rect x="26" y="38" width="36" height="20" fill="#2266aa"/>
    <rect x="30" y="40" width="28" height="16" fill="#3388cc"/>
    <rect x="34" y="44" width="20" height="8" fill="#88ddff"/>
    <rect x="38" y="46" width="12" height="4" fill="#ccffff"/>
    <!-- Scale pattern -->
    <rect x="16" y="36" width="6" height="6" fill="#6699bb"/>
    <rect x="16" y="46" width="6" height="6" fill="#6699bb"/>
    <rect x="66" y="36" width="6" height="6" fill="#6699bb"/>
    <rect x="66" y="46" width="6" height="6" fill="#6699bb"/>

    <!-- Wings (folded, icy) -->
    <rect x="0" y="30" width="16" height="20" fill="#3377aa"/>
    <rect x="2" y="32" width="12" height="16" fill="#4488bb"/>
    <rect x="4" y="34" width="2" height="12" fill="#88ddff"/>
    <rect x="72" y="30" width="16" height="20" fill="#3377aa"/>
    <rect x="74" y="32" width="12" height="16" fill="#4488bb"/>
    <rect x="82" y="34" width="2" height="12" fill="#88ddff"/>

    <!-- Tail/Legs -->
    <rect x="0" y="48" width="10" height="14" fill="#4488bb"/>
    <rect x="78" y="48" width="10" height="14" fill="#4488bb"/>
    <rect x="18" y="64" width="14" height="16" fill="#3377aa"/>
    <rect x="20" y="66" width="10" height="12" fill="#4488bb"/>
    <rect x="56" y="64" width="14" height="16" fill="#3377aa"/>
    <rect x="58" y="66" width="10" height="12" fill="#4488bb"/>
    <!-- Claws -->
    <rect x="16" y="78" width="16" height="6" fill="#2266aa"/>
    <rect x="16" y="82" width="4" height="4" fill="#88ddff"/>
    <rect x="24" y="82" width="4" height="4" fill="#88ddff"/>
    <rect x="54" y="78" width="16" height="6" fill="#2266aa"/>
    <rect x="58" y="82" width="4" height="4" fill="#88ddff"/>
    <rect x="66" y="82" width="4" height="4" fill="#88ddff"/>
  </g>

  <!-- Frame 1 (wings slightly spread, mouth open) -->
  <g transform="translate(88,0)">
    <!-- Ice horns -->
    <rect x="20" y="0" width="4" height="14" fill="#88ddff"/>
    <rect x="21" y="0" width="2" height="8" fill="#ccffff"/>
    <rect x="34" y="0" width="6" height="10" fill="#88ddff"/>
    <rect x="48" y="0" width="6" height="12" fill="#88ddff"/>
    <rect x="60" y="0" width="4" height="14" fill="#88ddff"/>
    <rect x="61" y="0" width="2" height="8" fill="#ccffff"/>

    <!-- Head -->
    <rect x="16" y="10" width="56" height="22" fill="#4488bb"/>
    <rect x="18" y="12" width="52" height="18" fill="#5599cc"/>
    <rect x="22" y="12" width="4" height="4" fill="#88ccee"/>
    <rect x="58" y="12" width="4" height="4" fill="#88ccee"/>

    <!-- Eyes (brighter) -->
    <rect x="22" y="18" width="14" height="6" fill="#112233"/>
    <rect x="52" y="18" width="14" height="6" fill="#112233"/>
    <rect x="24" y="19" width="10" height="4" fill="#44ccff"/>
    <rect x="54" y="19" width="10" height="4" fill="#44ccff"/>
    <rect x="28" y="19" width="4" height="4" fill="#eeffff"/>
    <rect x="58" y="19" width="4" height="4" fill="#eeffff"/>

    <!-- Snout (open wider) -->
    <rect x="28" y="26" width="32" height="10" fill="#4488bb"/>
    <rect x="30" y="27" width="28" height="8" fill="#223355"/>
    <rect x="30" y="26" width="3" height="5" fill="#eeffff"/>
    <rect x="36" y="26" width="3" height="6" fill="#eeffff"/>
    <rect x="42" y="26" width="3" height="5" fill="#eeffff"/>
    <rect x="48" y="26" width="3" height="6" fill="#eeffff"/>
    <rect x="54" y="26" width="3" height="5" fill="#eeffff"/>

    <!-- Body -->
    <rect x="10" y="34" width="68" height="30" fill="#4488bb"/>
    <rect x="14" y="36" width="60" height="26" fill="#5599cc"/>
    <rect x="26" y="40" width="36" height="18" fill="#2266aa"/>
    <rect x="30" y="42" width="28" height="14" fill="#3388cc"/>
    <rect x="32" y="44" width="24" height="10" fill="#88ddff"/>
    <rect x="36" y="46" width="16" height="6" fill="#ccffff"/>

    <!-- Wings (more spread) -->
    <rect x="0" y="28" width="18" height="22" fill="#3377aa"/>
    <rect x="2" y="30" width="14" height="18" fill="#4488bb"/>
    <rect x="4" y="32" width="2" height="14" fill="#88ddff"/>
    <rect x="8" y="34" width="2" height="10" fill="#88ddff"/>
    <rect x="70" y="28" width="18" height="22" fill="#3377aa"/>
    <rect x="72" y="30" width="14" height="18" fill="#4488bb"/>
    <rect x="82" y="32" width="2" height="14" fill="#88ddff"/>
    <rect x="78" y="34" width="2" height="10" fill="#88ddff"/>

    <!-- Legs -->
    <rect x="16" y="64" width="14" height="16" fill="#3377aa"/>
    <rect x="18" y="66" width="10" height="12" fill="#4488bb"/>
    <rect x="58" y="65" width="14" height="16" fill="#3377aa"/>
    <rect x="60" y="67" width="10" height="12" fill="#4488bb"/>
    <rect x="14" y="78" width="16" height="6" fill="#2266aa"/>
    <rect x="58" y="79" width="16" height="6" fill="#2266aa"/>
  </g>
</svg>
