    <linearGradient id="frost-body-hi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
