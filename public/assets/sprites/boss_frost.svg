    <linearGradient id="frost-crystal2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.4"/>
