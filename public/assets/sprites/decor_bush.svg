<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 16" width="88" height="64" shape-rendering="geometricPrecision">
  <defs>
    <radialGradient id="bush-main" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </radialGradient>
    <radialGradient id="bush-left" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </radialGradient>
    <radialGradient id="bush-right" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </radialGradient>
  </defs>
  <!-- Left mound -->
  <ellipse cx="7" cy="11" rx="6" ry="4.5" fill="url(#bush-left)"/>
  <!-- Right mound -->
  <ellipse cx="16" cy="11.5" rx="5.5" ry="4" fill="url(#bush-right)"/>
  <!-- Center mound (tallest, on top) -->
  <ellipse cx="11" cy="9" rx="7" ry="5.5" fill="url(#bush-main)"/>
  <!-- Subtle highlight on center -->
  <ellipse cx="9.5" cy="7" rx="3" ry="1.8" fill="#a1887f" opacity="0.35"/>
</svg>
