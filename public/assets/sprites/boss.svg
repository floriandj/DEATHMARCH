<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 88" width="176" height="88" shape-rendering="geometricPrecision">
  <defs>
    <!-- Demon King body gradient -->
    <linearGradient id="boss-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="60%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </linearGradient>
    <linearGradient id="boss-body-hi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef9a9a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e53935" stop-opacity="0"/>
    </linearGradient>
    <!-- Golden crown -->
    <linearGradient id="boss-crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
    <linearGradient id="boss-crown-gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <!-- Purple energy core (idle) -->
    <radialGradient id="boss-core-idle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ea80fc"/>
      <stop offset="40%" stop-color="#ce93d8"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </radialGradient>
    <!-- Purple energy core (active) -->
    <radialGradient id="boss-core-active" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#ea80fc"/>
      <stop offset="65%" stop-color="#ab47bc"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </radialGradient>
    <!-- Core outer glow -->
    <radialGradient id="boss-core-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0"/>
    </radialGradient>
    <!-- Core outer glow bright -->
    <radialGradient id="boss-core-glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0"/>
    </radialGradient>
    <!-- Shoulder armor -->
    <linearGradient id="boss-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#616161"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <!-- Eye glow -->
