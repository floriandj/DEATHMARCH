    <!-- CROWN -->
    <path d="M22,10 Q22,6 44,5 Q66,6 66,10 L64,14 Q44,12 24,14Z" fill="url(#boss-crown)"/>
    <path d="M26,10 Q28,2 30,10" fill="url(#boss-crown)" stroke="#f57f17" stroke-width="0.8"/>
    <path d="M36,9 Q40,0 44,9" fill="url(#boss-crown)" stroke="#f57f17" stroke-width="0.8"/>
