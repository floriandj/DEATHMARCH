    <circle cx="34" cy="21" r="0.8" fill="#fff" stroke="none"/>
    <circle cx="55" cy="22" r="2" fill="#1a0000"/>
    <circle cx="54" cy="21" r="0.8" fill="#fff" stroke="none"/>
    <!-- Angry brows (more severe) -->
