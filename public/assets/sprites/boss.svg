    <ellipse cx="54" cy="22" rx="6" ry="5" fill="#000"/>
    <ellipse cx="34" cy="22" rx="4.5" ry="3.5" fill="url(#boss-eye)"/>
    <ellipse cx="54" cy="22" rx="4.5" ry="3.5" fill="url(#boss-eye)"/>
    <circle cx="35" cy="21.5" r="2" fill="#1a0000"/>
