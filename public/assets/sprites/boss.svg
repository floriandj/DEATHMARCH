    <path d="M28,68 Q24,72 22,80 Q26,82 30,80 Q32,74 34,70Z" fill="url(#boss-body)"/>
    <path d="M60,68 Q64,72 66,80 Q62,82 58,80 Q56,74 54,70Z" fill="url(#boss-body)"/>
    <!-- Feet / boots -->
    <path d="M18,78 Q22,82 32,82 Q34,80 30,78Z" fill="#4a0000" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M56,78 Q60,82 70,82 Q68,80 64,78Z" fill="#4a0000" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Boot spikes -->
    <path d="M18,80 L15,83" stroke="#424242" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M21,82 L19,86" stroke="#424242" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M70,80 L73,83" stroke="#424242" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M67,82 L69,86" stroke="#424242" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Left Shoulder Pauldron -->
    <path d="M8,34 Q4,30 6,38 Q8,44 12,46 Q16,44 18,40 Q16,34 12,32Z" fill="url(#boss-armor)"/>
    <path d="M6,32 L4,28 M8,30 L7,26 M11,29 L11,25" stroke="#757575" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Right Shoulder Pauldron -->
    <path d="M80,34 Q84,30 82,38 Q80,44 76,46 Q72,44 70,40 Q72,34 76,32Z" fill="url(#boss-armor)"/>
    <path d="M82,32 L84,28 M80,30 L81,26 M77,29 L77,25" stroke="#757575" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Left Arm -->
    <path d="M14,42 Q8,50 6,62" stroke="#b71c1c" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M14,42 Q8,50 6,62" stroke="#e53935" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left Fist -->
    <ellipse cx="6" cy="65" rx="7" ry="6" fill="url(#boss-body)"/>
    <path d="M2,63 Q1,65 2,67" stroke="#7f0000" stroke-width="1.2" fill="none"/>
    <path d="M5,62 Q4,64 5,67" stroke="#7f0000" stroke-width="1.2" fill="none"/>
    <path d="M9,62 Q10,64 9,67" stroke="#7f0000" stroke-width="1.2" fill="none"/>

    <!-- Right Arm -->
    <path d="M74,42 Q80,50 82,62" stroke="#b71c1c" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M74,42 Q80,50 82,62" stroke="#e53935" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right Fist -->
    <ellipse cx="82" cy="65" rx="7" ry="6" fill="url(#boss-body)"/>
    <path d="M78,63 Q77,65 78,67" stroke="#7f0000" stroke-width="1.2" fill="none"/>
    <path d="M82,62 Q81,64 82,67" stroke="#7f0000" stroke-width="1.2" fill="none"/>
    <path d="M86,63 Q87,65 86,67" stroke="#7f0000" stroke-width="1.2" fill="none"/>

    <!-- Body -->
    <path d="M18,36 Q14,40 14,58 Q14,68 28,70 Q44,72 60,70 Q74,68 74,58 Q74,40 70,36 Q62,32 44,32 Q26,32 18,36Z" fill="url(#boss-body)"/>
    <!-- Body highlight -->
    <path d="M22,38 Q18,44 20,56 Q26,60 44,60 Q52,56 50,44 Q44,36 30,36Z" fill="url(#boss-body-hi)" stroke="none"/>
    <!-- Chest armor plate -->
    <path d="M28,42 Q26,48 28,56 Q36,60 44,60 Q52,60 60,56 Q62,48 60,42 Q52,38 44,38 Q36,38 28,42Z" fill="#9c1111" stroke="#7f0000" stroke-width="1"/>

    <!-- Energy Core (idle - dimly glowing) -->
    <ellipse cx="44" cy="50" rx="14" ry="12" fill="url(#boss-core-glow)" stroke="none"/>
    <ellipse cx="44" cy="50" rx="10" ry="9" fill="url(#boss-core-idle)"/>
    <!-- Core details -->
    <path d="M38,46 Q44,42 50,46 Q52,50 50,54 Q44,58 38,54 Q36,50 38,46Z" fill="none" stroke="#ea80fc" stroke-width="0.8" stroke-dasharray="2,2"/>
    <path d="M40,49 L44,44 L48,49 L44,54Z" fill="none" stroke="#ce93d8" stroke-width="0.8"/>

