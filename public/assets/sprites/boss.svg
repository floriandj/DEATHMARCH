    <circle cx="44" cy="11" r="1" fill="#fff176" stroke="none"/>
    <circle cx="54" cy="11" r="1" fill="#fff176" stroke="none"/>
    <circle cx="64" cy="11" r="1" fill="#fff176" stroke="none"/>
