    <path d="M76,38 Q84,44 86,56" stroke="#e53935" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="86" cy="59" rx="7" ry="6" fill="url(#boss-body)"/>

    <!-- Body -->
    <path d="M18,36 Q14,40 14,58 Q14,68 28,70 Q44,72 60,70 Q74,68 74,58 Q74,40 70,36 Q62,32 44,32 Q26,32 18,36Z" fill="url(#boss-body)"/>
    <path d="M22,38 Q18,44 20,56 Q26,60 44,60 Q52,56 50,44 Q44,36 30,36Z" fill="url(#boss-body-hi)" stroke="none"/>
    <path d="M28,42 Q26,48 28,56 Q36,60 44,60 Q52,60 60,56 Q62,48 60,42 Q52,38 44,38 Q36,38 28,42Z" fill="#9c1111" stroke="#7f0000" stroke-width="1"/>

    <!-- Energy Core (PULSING BRIGHT) -->
    <ellipse cx="44" cy="50" rx="18" ry="16" fill="url(#boss-core-glow2)" stroke="none"/>
    <ellipse cx="44" cy="50" rx="10" ry="9" fill="url(#boss-core-active)"/>
    <!-- Core energy tendrils -->
    <path d="M34,50 Q36,44 44,42 Q52,44 54,50 Q52,56 44,58 Q36,56 34,50Z" fill="none" stroke="#ea80fc" stroke-width="1.2"/>
    <path d="M40,49 L44,44 L48,49 L44,54Z" fill="#ce93d8" opacity="0.5" stroke="#fff" stroke-width="0.5"/>
    <!-- Energy sparks -->
    <path d="M30,48 L26,46 M58,48 L62,46" stroke="#ea80fc" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M32,42 L28,39 M56,42 L60,39" stroke="#ce93d8" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M32,58 L28,61 M56,58 L60,61" stroke="#ce93d8" stroke-width="1" stroke-linecap="round" fill="none"/>

    <!-- Neck -->
