    <ellipse cx="38" cy="16" rx="10" ry="8" fill="#ef9a9a" opacity="0.3" stroke="none"/>
    <path d="M22,18 Q32,14 44,16 Q56,14 66,18" fill="#7f0000" stroke="none"/>

    <!-- Eyes (squinting with rage) -->
