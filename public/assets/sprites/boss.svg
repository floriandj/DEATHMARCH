    <path d="M84,28 L86,24 M82,26 L83,22 M79,25 L79,21" stroke="#757575" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Left Arm (raised aggressively) -->
    <path d="M12,38 Q4,44 2,56" stroke="#b71c1c" stroke-width="8" fill="none" stroke-linecap="round"/>
