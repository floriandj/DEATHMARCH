<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="smg_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="smg_grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="smg_energy" cx="15%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="50%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Barrel -->
    <rect x="2" y="11" width="8" height="3" rx="0.5" fill="url(#smg_body)"/>
    <!-- Muzzle energy -->
    <rect x="2" y="11" width="4" height="3" rx="0.5" fill="url(#smg_energy)"/>
    <!-- Suppressor rings -->
    <rect x="4" y="10.5" width="1.5" height="4" rx="0.3" fill="#616161" stroke-width="1"/>
    <rect x="6.5" y="10.5" width="1.5" height="4" rx="0.3" fill="#616161" stroke-width="1"/>
    <!-- Handguard -->
    <rect x="8" y="10" width="5" height="5" rx="0.5" fill="url(#smg_body)"/>
    <!-- Forward grip -->
    <rect x="9" y="15" width="3" height="5" rx="0.5" fill="url(#smg_grip)"/>
    <!-- Receiver -->
    <rect x="12" y="9" width="11" height="7" rx="1" fill="url(#smg_body)"/>
    <!-- Slot/window -->
    <rect x="14" y="10" width="6" height="2.5" rx="0.3" fill="#212121" stroke-width="1"/>
    <!-- Folded stock nub -->
    <rect x="22" y="10" width="5" height="5" rx="0.5" fill="url(#smg_body)"/>
    <rect x="25" y="11" width="2" height="3" rx="0.3" fill="#616161" stroke-width="1"/>
    <!-- Sight -->
    <rect x="18" y="7.5" width="2" height="2.5" rx="0.3" fill="#616161" stroke-width="1"/>
    <!-- Pistol grip -->
    <rect x="18" y="16" width="6" height="9" rx="1" fill="url(#smg_grip)"/>
    <line x1="20" y1="18" x2="22" y2="18" stroke="#424242" stroke-width="0.8"/>
    <line x1="20" y1="20" x2="22" y2="20" stroke="#424242" stroke-width="0.8"/>
    <line x1="20" y1="22" x2="22" y2="22" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M14 16 L14 21 Q14 23 16 23 L18 23" fill="url(#smg_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="15.5" y1="16" x2="15" y2="20" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Magazine -->
    <rect x="14" y="23" width="5" height="7" rx="0.5" fill="url(#smg_grip)"/>
    <rect x="15" y="24" width="3" height="5" rx="0.3" fill="#424242" stroke-width="0.8"/>
  </g>
</svg>
