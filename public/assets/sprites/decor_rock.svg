  <ellipse cx="4.5" cy="8.8" rx="2" ry="1" fill="#b0bec5" opacity="0.5"/>
  <!-- Small front rock -->
  <ellipse cx="14" cy="13" rx="3.5" ry="2.2" fill="url(#rock-c)"/>
