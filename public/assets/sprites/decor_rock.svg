  </defs>
  <!-- Back rock -->
  <ellipse cx="13" cy="10" rx="6" ry="4.5" fill="url(#rock-b)"/>
  <ellipse cx="11.5" cy="7.5" rx="2.5" ry="1.2" fill="#90a4ae" opacity="0.5"/>
  <!-- Left rock -->
