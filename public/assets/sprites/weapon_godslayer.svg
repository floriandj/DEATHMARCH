<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Godslayer icon - ornate golden weapon -->
  <!-- Barrel (ornate, wide) -->
  <rect x="0" y="7" width="12" height="6" fill="#fbbf24"/>
  <rect x="2" y="8" width="8" height="4" fill="#f59e0b"/>
  <!-- Barrel glow -->
  <rect x="0" y="9" width="3" height="2" fill="#fef3c7"/>
  <!-- Crown/halo accent -->
  <rect x="0" y="5" width="3" height="3" fill="#fcd34d"/>
  <rect x="0" y="12" width="3" height="3" fill="#fcd34d"/>
  <!-- Body (ornate) -->
  <rect x="10" y="3" width="14" height="14" fill="#f59e0b"/>
  <rect x="12" y="4" width="10" height="12" fill="#d97706"/>
  <!-- Divine core -->
  <rect x="13" y="5" width="8" height="8" fill="#fbbf24"/>
  <rect x="14" y="6" width="6" height="6" fill="#fcd34d"/>
  <rect x="15" y="7" width="4" height="4" fill="#fef3c7"/>
  <rect x="16" y="8" width="2" height="2" fill="#fff"/>
  <!-- Wings/ornaments -->
  <rect x="10" y="1" width="2" height="4" fill="#fcd34d"/>
  <rect x="22" y="1" width="2" height="4" fill="#fcd34d"/>
  <rect x="10" y="15" width="2" height="4" fill="#fcd34d"/>
  <rect x="22" y="15" width="2" height="4" fill="#fcd34d"/>
  <!-- Stock -->
  <rect x="22" y="5" width="10" height="6" fill="#d97706"/>
  <rect x="24" y="6" width="6" height="4" fill="#b45309"/>
  <rect x="30" y="6" width="2" height="4" fill="#fcd34d"/>
  <!-- Grip -->
  <rect x="20" y="16" width="6" height="10" fill="#b45309"/>
  <rect x="22" y="17" width="2" height="8" fill="#92400e"/>
  <!-- Holy runes -->
  <rect x="14" y="14" width="2" height="2" fill="#fef3c7"/>
  <rect x="18" y="14" width="2" height="2" fill="#fef3c7"/>
</svg>
