<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="60" height="30" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="wl-robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <linearGradient id="wl-robe-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a1b9a"/>
      <stop offset="100%" stop-color="#38006b"/>
    </linearGradient>
    <radialGradient id="wl-orb" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ccff90"/>
      <stop offset="40%" stop-color="#76ff03"/>
      <stop offset="100%" stop-color="#33691e"/>
    </radialGradient>
    <radialGradient id="wl-orb-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ccff90" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#76ff03" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wl-eye" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ea80fc"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </radialGradient>
    <linearGradient id="wl-staff" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
  </defs>

  <!-- Frame 0: Floating with staff held upright -->
  <g stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow (floating, faint) -->
    <ellipse cx="15" cy="28.5" rx="7" ry="1.2" fill="#000" opacity="0.15" stroke="none"/>
    <!-- Robe lower hem (wide, floating) -->
    <path d="M6,22 Q8,28 15,29 Q22,28 24,22 Q21,25 15,25 Q9,25 6,22Z" fill="url(#wl-robe-dark)"/>
    <!-- Robe folds -->
    <path d="M9,23 Q10,26 11,28" stroke="#38006b" stroke-width="0.8" fill="none"/>
    <path d="M15,24 Q15,27 15,29" stroke="#38006b" stroke-width="0.8" fill="none"/>
    <path d="M19,23 Q20,26 21,28" stroke="#38006b" stroke-width="0.8" fill="none"/>
    <!-- Robe body -->
    <ellipse cx="15" cy="19" rx="9" ry="7" fill="url(#wl-robe)"/>
    <!-- Robe highlight -->
    <ellipse cx="13" cy="16" rx="4.5" ry="3.5" fill="#ab47bc" opacity="0.3" stroke="none"/>
    <!-- Staff (left side, tall) -->
    <path d="M5,24 Q5,16 6,8 Q6,4 7,1" stroke="url(#wl-staff)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Staff knob detail -->
    <ellipse cx="6" cy="12" rx="1.2" ry="1.2" fill="#6a1b9a"/>
    <!-- Orb glow aura at staff tip -->
    <circle cx="7" cy="1" r="4" fill="url(#wl-orb-glow)" stroke="none"/>
    <!-- Arcane circle hints near orb -->
    <circle cx="7" cy="1" r="5" fill="none" stroke="#76ff03" stroke-width="0.4" opacity="0.4"/>
    <circle cx="7" cy="1" r="6.5" fill="none" stroke="#76ff03" stroke-width="0.3" opacity="0.2"/>
    <!-- Staff orb -->
    <circle cx="7" cy="1" r="3" fill="url(#wl-orb)"/>
    <circle cx="6" cy="0.5" r="1" fill="#f1ff82" stroke="none"/>
    <!-- Left arm (holding staff) -->
    <path d="M8,17 Q7,14 6,10" stroke="#4a148c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M8,17 Q7,14 6,10" stroke="#7b1fa2" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Right arm (gesturing outward) -->
    <path d="M22,17 Q24,15 25,12" stroke="#4a148c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M22,17 Q24,15 25,12" stroke="#7b1fa2" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arcane circle near right hand -->
    <circle cx="25" cy="11" r="3" fill="none" stroke="#9c27b0" stroke-width="0.5" opacity="0.6"/>
    <circle cx="25" cy="11" r="1.5" fill="none" stroke="#ce93d8" stroke-width="0.4" opacity="0.5"/>
    <!-- Neck -->
    <ellipse cx="15" cy="11" rx="3.5" ry="2.5" fill="url(#wl-robe)"/>
    <!-- Hood base -->
    <path d="M8,9 Q8,3 15,2 Q22,3 22,9 Q22,14 15,14 Q8,14 8,9Z" fill="url(#wl-robe-dark)"/>
    <!-- Hood shadow inside (face darkness) -->
    <ellipse cx="15" cy="10" rx="5" ry="4" fill="#2d0050" opacity="0.5" stroke="none"/>
    <!-- Hood top point -->
    <path d="M12,3 Q15,-1 18,3 Q17,5 15,5 Q13,5 12,3Z" fill="url(#wl-robe-dark)"/>
    <!-- Glowing purple eyes under hood -->
    <ellipse cx="12" cy="9" rx="2" ry="1.5" fill="url(#wl-eye)"/>
    <circle cx="12.5" cy="9" r="0.7" fill="#2d0040"/>
    <circle cx="12" cy="8.5" r="0.4" fill="#fff" stroke="none"/>
    <ellipse cx="18" cy="9" rx="2" ry="1.5" fill="url(#wl-eye)"/>
    <circle cx="18.5" cy="9" r="0.7" fill="#2d0040"/>
    <circle cx="18" cy="8.5" r="0.4" fill="#fff" stroke="none"/>
    <!-- Eye glow emanation -->
    <ellipse cx="12" cy="9" rx="3" ry="2.5" fill="#9c27b0" opacity="0.2" stroke="none"/>
    <ellipse cx="18" cy="9" rx="3" ry="2.5" fill="#9c27b0" opacity="0.2" stroke="none"/>
    <!-- Mouth (thin grimace) -->
    <path d="M12.5,12 Q15,13 17.5,12" fill="none" stroke="#2d0050" stroke-width="0.8"/>
  </g>

  <!-- Frame 1: Casting — arms raised, orb brighter/larger -->
  <g transform="translate(30,0)" stroke="#1a1a2e" stroke-width="1.2" stroke-linejoin="round">
    <!-- Shadow (smaller, more floating during cast) -->
    <ellipse cx="15" cy="28.5" rx="5" ry="1" fill="#000" opacity="0.12" stroke="none"/>
    <!-- Robe lower hem (billowing during cast) -->
    <path d="M4,21 Q7,28 15,29 Q23,28 26,21 Q22,25 15,25 Q8,25 4,21Z" fill="url(#wl-robe-dark)"/>
    <!-- Robe folds -->
    <path d="M7,22 Q8,26 9,29" stroke="#38006b" stroke-width="0.8" fill="none"/>
    <path d="M15,24 Q15,27 15,29" stroke="#38006b" stroke-width="0.8" fill="none"/>
    <path d="M21,22 Q22,26 23,29" stroke="#38006b" stroke-width="0.8" fill="none"/>
    <!-- Robe body -->
    <ellipse cx="15" cy="18" rx="9" ry="7" fill="url(#wl-robe)"/>
    <!-- Robe highlight -->
    <ellipse cx="13" cy="15" rx="4.5" ry="3.5" fill="#ab47bc" opacity="0.3" stroke="none"/>
    <!-- Staff (raised dramatically) -->
    <path d="M4,22 Q3,14 4,6 Q4,3 5,0" stroke="url(#wl-staff)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="4" cy="11" rx="1.2" ry="1.2" fill="#6a1b9a"/>
    <!-- Larger orb glow (brighter during cast) -->
    <circle cx="5" cy="0" r="6" fill="url(#wl-orb-glow)" stroke="none"/>
    <!-- Arcane circles (active, larger during cast) -->
    <circle cx="5" cy="0" r="7" fill="none" stroke="#76ff03" stroke-width="0.6" opacity="0.5"/>
    <circle cx="5" cy="0" r="9" fill="none" stroke="#76ff03" stroke-width="0.4" opacity="0.3"/>
    <circle cx="5" cy="0" r="11" fill="none" stroke="#aeea00" stroke-width="0.3" opacity="0.15"/>
    <!-- Orb (larger, brighter) -->
    <circle cx="5" cy="0" r="4" fill="url(#wl-orb)"/>
    <circle cx="3.5" cy="-0.8" r="1.5" fill="#f1ff82" stroke="none"/>
    <!-- Left arm (raised with staff) -->
    <path d="M7,16 Q5,11 4,7" stroke="#4a148c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M7,16 Q5,11 4,7" stroke="#7b1fa2" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Right arm raised (casting) -->
    <path d="M23,16 Q26,11 28,6" stroke="#4a148c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M23,16 Q26,11 28,6" stroke="#7b1fa2" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Arcane energy at right hand -->
    <circle cx="28" cy="5" r="5" fill="url(#wl-orb-glow)" stroke="none"/>
    <circle cx="28" cy="5" r="3" fill="none" stroke="#76ff03" stroke-width="0.5" opacity="0.6"/>
    <circle cx="28" cy="5" r="2" fill="#76ff03" opacity="0.5" stroke="none"/>
    <circle cx="27.5" cy="4.5" r="0.8" fill="#fff" stroke="none"/>
    <!-- Energy beam between hands -->
    <path d="M5,0 Q15,5 28,5" stroke="#76ff03" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- Neck -->
    <ellipse cx="15" cy="10" rx="3.5" ry="2.5" fill="url(#wl-robe)"/>
    <!-- Hood -->
    <path d="M8,8 Q8,2 15,1 Q22,2 22,8 Q22,13 15,13 Q8,13 8,8Z" fill="url(#wl-robe-dark)"/>
    <ellipse cx="15" cy="9" rx="5" ry="4" fill="#2d0050" opacity="0.5" stroke="none"/>
    <!-- Hood top point -->
    <path d="M12,2 Q15,-2 18,2 Q17,4 15,4 Q13,4 12,2Z" fill="url(#wl-robe-dark)"/>
    <!-- Eyes (brighter during cast) -->
    <ellipse cx="12" cy="8" rx="2.2" ry="1.8" fill="url(#wl-eye)"/>
    <circle cx="12.5" cy="8" r="0.7" fill="#2d0040"/>
    <circle cx="12" cy="7.5" r="0.5" fill="#fff" stroke="none"/>
    <ellipse cx="18" cy="8" rx="2.2" ry="1.8" fill="url(#wl-eye)"/>
    <circle cx="18.5" cy="8" r="0.7" fill="#2d0040"/>
    <circle cx="18" cy="7.5" r="0.5" fill="#fff" stroke="none"/>
    <!-- Eye glow (intense during cast) -->
    <ellipse cx="12" cy="8" rx="4" ry="3" fill="#ce93d8" opacity="0.25" stroke="none"/>
    <ellipse cx="18" cy="8" rx="4" ry="3" fill="#ce93d8" opacity="0.25" stroke="none"/>
    <!-- Mouth open during cast -->
    <path d="M12,11 Q15,13 18,11" fill="#2d0050" stroke="#1a1a2e" stroke-width="0.7"/>
  </g>
</svg>
