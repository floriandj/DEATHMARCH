<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="60" height="30" shape-rendering="crispEdges">
  <!-- Frame 0: Warlock - hooded mage with staff and purple energy -->
  <g>
    <!-- Hood -->
    <rect x="7" y="0" width="16" height="4" fill="#4a235a"/>
    <rect x="5" y="3" width="20" height="6" fill="#6c3483"/>
    <rect x="6" y="4" width="18" height="4" fill="#4a235a"/>
    <!-- Face (shadowed) -->
    <rect x="9" y="5" width="12" height="4" fill="#2c2c2c"/>
    <!-- Eyes (glowing purple) -->
    <rect x="10" y="6" width="3" height="2" fill="#d580ff"/>
    <rect x="17" y="6" width="3" height="2" fill="#d580ff"/>
    <rect x="11" y="6" width="1" height="1" fill="#ffffff"/>
    <rect x="18" y="6" width="1" height="1" fill="#ffffff"/>
    <!-- Robes -->
    <rect x="6" y="9" width="18" height="12" fill="#6c3483"/>
    <rect x="7" y="10" width="16" height="10" fill="#4a235a"/>
    <!-- Robe trim -->
    <rect x="6" y="20" width="18" height="2" fill="#9b59b6"/>
    <!-- Belt -->
    <rect x="8" y="14" width="14" height="2" fill="#7d3c98"/>
    <rect x="13" y="13" width="4" height="4" fill="#d580ff"/>
    <!-- Staff (right hand) -->
    <rect x="24" y="2" width="2" height="22" fill="#5d3a1a"/>
    <rect x="23" y="0" width="4" height="4" fill="#9b59b6"/>
    <rect x="24" y="0" width="2" height="2" fill="#d580ff"/>
    <!-- Left arm (casting) -->
    <rect x="2" y="10" width="4" height="6" fill="#4a235a"/>
    <!-- Magic orb -->
    <rect x="1" y="9" width="3" height="3" fill="#9b59b6"/>
    <rect x="1" y="10" width="1" height="1" fill="#d580ff"/>
    <!-- Robe bottom -->
    <rect x="8" y="22" width="6" height="6" fill="#4a235a"/>
    <rect x="16" y="22" width="6" height="6" fill="#4a235a"/>
    <!-- Feet barely visible -->
    <rect x="9" y="27" width="4" height="3" fill="#333"/>
    <rect x="17" y="27" width="4" height="3" fill="#333"/>
  </g>
  <!-- Frame 1: Casting pose -->
  <g transform="translate(30,0)">
    <rect x="7" y="0" width="16" height="4" fill="#4a235a"/>
    <rect x="5" y="3" width="20" height="6" fill="#6c3483"/>
    <rect x="6" y="4" width="18" height="4" fill="#4a235a"/>
    <rect x="9" y="5" width="12" height="4" fill="#2c2c2c"/>
    <!-- Eyes brighter -->
    <rect x="10" y="6" width="3" height="2" fill="#e8b0ff"/>
    <rect x="17" y="6" width="3" height="2" fill="#e8b0ff"/>
    <rect x="11" y="6" width="1" height="1" fill="#ffffff"/>
    <rect x="18" y="6" width="1" height="1" fill="#ffffff"/>
    <rect x="6" y="9" width="18" height="12" fill="#6c3483"/>
    <rect x="7" y="10" width="16" height="10" fill="#4a235a"/>
    <rect x="6" y="20" width="18" height="2" fill="#9b59b6"/>
    <rect x="8" y="14" width="14" height="2" fill="#7d3c98"/>
    <rect x="13" y="13" width="4" height="4" fill="#d580ff"/>
    <!-- Staff tilted -->
    <rect x="24" y="3" width="2" height="20" fill="#5d3a1a"/>
    <rect x="23" y="1" width="4" height="4" fill="#9b59b6"/>
    <rect x="24" y="1" width="2" height="2" fill="#e8b0ff"/>
    <!-- Left arm raised (casting) -->
    <rect x="1" y="8" width="5" height="5" fill="#4a235a"/>
    <!-- Magic orb bigger, pulsing -->
    <rect x="0" y="6" width="4" height="4" fill="#9b59b6"/>
    <rect x="1" y="7" width="2" height="2" fill="#e8b0ff"/>
    <rect x="8" y="22" width="6" height="6" fill="#4a235a"/>
    <rect x="16" y="22" width="6" height="6" fill="#4a235a"/>
    <rect x="9" y="27" width="4" height="3" fill="#333"/>
    <rect x="17" y="27" width="4" height="3" fill="#333"/>
  </g>
</svg>
