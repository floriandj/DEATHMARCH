<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 36" width="72" height="36" shape-rendering="crispEdges">
  <!-- Frame 0: Blighted - rotting plague zombie, oozing green -->
  <g>
    <!-- Head (misshapen) -->
    <rect x="9" y="1" width="18" height="10" fill="#2ecc71"/>
    <rect x="10" y="2" width="16" height="8" fill="#1a9e4e"/>
    <!-- Exposed skull patches -->
    <rect x="11" y="2" width="5" height="3" fill="#c8c8a0"/>
    <!-- Eyes (uneven, glowing) -->
    <rect x="12" y="4" width="4" height="3" fill="#ffe100"/>
    <rect x="13" y="5" width="2" height="1" fill="#ff6600"/>
    <rect x="20" y="5" width="3" height="2" fill="#ffe100"/>
    <rect x="21" y="5" width="1" height="1" fill="#ff6600"/>
    <!-- Mouth (drooling) -->
    <rect x="14" y="8" width="8" height="3" fill="#0d6e3b"/>
    <rect x="15" y="9" width="2" height="1" fill="#c8c8a0"/>
    <rect x="19" y="9" width="2" height="1" fill="#c8c8a0"/>
    <!-- Drool -->
    <rect x="16" y="11" width="2" height="2" fill="#7ddf64"/>
    <!-- Body (bloated) -->
    <rect x="6" y="11" width="24" height="12" fill="#2ecc71"/>
    <rect x="8" y="12" width="20" height="10" fill="#1a9e4e"/>
    <!-- Boils/pustules -->
    <rect x="10" y="14" width="3" height="3" fill="#7ddf64"/>
    <rect x="11" y="15" width="1" height="1" fill="#ffe100"/>
    <rect x="22" y="13" width="3" height="3" fill="#7ddf64"/>
    <rect x="23" y="14" width="1" height="1" fill="#ffe100"/>
    <!-- Arms (dangling) -->
    <rect x="2" y="12" width="4" height="10" fill="#1a9e4e"/>
    <rect x="30" y="12" width="4" height="10" fill="#1a9e4e"/>
    <!-- Claws -->
    <rect x="1" y="21" width="4" height="3" fill="#0d6e3b"/>
    <rect x="31" y="21" width="4" height="3" fill="#0d6e3b"/>
    <!-- Legs -->
    <rect x="9" y="23" width="6" height="8" fill="#1a9e4e"/>
    <rect x="21" y="23" width="6" height="8" fill="#1a9e4e"/>
    <!-- Feet -->
    <rect x="8" y="30" width="7" height="6" fill="#0d6e3b"/>
    <rect x="21" y="30" width="7" height="6" fill="#0d6e3b"/>
  </g>
  <!-- Frame 1: Shambling -->
  <g transform="translate(36,0)">
    <rect x="10" y="1" width="18" height="10" fill="#2ecc71"/>
    <rect x="11" y="2" width="16" height="8" fill="#1a9e4e"/>
    <rect x="12" y="2" width="5" height="3" fill="#c8c8a0"/>
    <rect x="13" y="4" width="4" height="3" fill="#ffe100"/>
    <rect x="14" y="5" width="2" height="1" fill="#ff6600"/>
    <rect x="21" y="5" width="3" height="2" fill="#ffe100"/>
    <rect x="22" y="5" width="1" height="1" fill="#ff6600"/>
    <rect x="15" y="8" width="8" height="3" fill="#0d6e3b"/>
    <rect x="16" y="9" width="2" height="1" fill="#c8c8a0"/>
    <rect x="20" y="9" width="2" height="1" fill="#c8c8a0"/>
    <rect x="17" y="11" width="2" height="3" fill="#7ddf64"/>
    <rect x="6" y="11" width="24" height="12" fill="#2ecc71"/>
    <rect x="8" y="12" width="20" height="10" fill="#1a9e4e"/>
    <rect x="10" y="14" width="3" height="3" fill="#7ddf64"/>
    <rect x="11" y="15" width="1" height="1" fill="#ffe100"/>
    <rect x="22" y="13" width="3" height="3" fill="#7ddf64"/>
    <rect x="23" y="14" width="1" height="1" fill="#ffe100"/>
    <!-- Arms swing -->
    <rect x="1" y="13" width="5" height="8" fill="#1a9e4e"/>
    <rect x="30" y="11" width="5" height="9" fill="#1a9e4e"/>
    <rect x="0" y="20" width="4" height="3" fill="#0d6e3b"/>
    <rect x="32" y="19" width="4" height="3" fill="#0d6e3b"/>
    <!-- Legs stagger -->
    <rect x="8" y="23" width="6" height="7" fill="#1a9e4e"/>
    <rect x="22" y="24" width="6" height="8" fill="#1a9e4e"/>
    <rect x="7" y="29" width="7" height="6" fill="#0d6e3b"/>
    <rect x="22" y="31" width="7" height="5" fill="#0d6e3b"/>
  </g>
</svg>
