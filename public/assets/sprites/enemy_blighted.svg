<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 36" width="288" height="144" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bl-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8bc34a"/>
      <stop offset="50%" stop-color="#558b2f"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <linearGradient id="bl-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ccc65"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <linearGradient id="bl-arm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cb342"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <linearGradient id="bl-slime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#76ff03"/>
      <stop offset="100%" stop-color="#69f0ae" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bl-shroom-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <radialGradient id="bl-eye" cx="30%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#b9f6ca"/>
      <stop offset="50%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00695c"/>
    </radialGradient>
    <radialGradient id="bl-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Shambling walk -->
  <g stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="18" cy="34.5" rx="12" ry="1.5" fill="url(#bl-shadow)" stroke="none"/>

    <!-- Dripping slime teardrops (decorative, behind body) -->
    <ellipse cx="6" cy="20" rx="1.5" ry="2.5" fill="url(#bl-slime)" stroke="none" opacity="0.7"/>
    <ellipse cx="30" cy="18" rx="1.2" ry="2" fill="url(#bl-slime)" stroke="none" opacity="0.6"/>
    <ellipse cx="10" cy="28" rx="1" ry="1.8" fill="url(#bl-slime)" stroke="none" opacity="0.5"/>
    <ellipse cx="26" cy="26" rx="1.2" ry="2" fill="url(#bl-slime)" stroke="none" opacity="0.65"/>
    <!-- Drips from hands -->
    <path d="M4,28 Q3.5,30 4,32" fill="none" stroke="#76ff03" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <path d="M30,28 Q30.5,30 30,32" fill="none" stroke="#76ff03" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

    <!-- Back leg (shuffling) -->
    <path d="M12,26 Q10,30 10,35" stroke="#558b2f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="10" cy="35" rx="4.5" ry="1" fill="#3e2723" stroke-width="0.8"/>

    <!-- Body (bloated, corrupted) -->
    <ellipse cx="18" cy="20" rx="11" ry="10" fill="url(#bl-body)" stroke-width="1.2"/>
    <!-- Body highlight -->
    <ellipse cx="16" cy="16" rx="5" ry="3.5" fill="#aed581" opacity="0.2" stroke="none"/>
    <!-- Corrupted veins/markings on body -->
    <path d="M12,18 Q15,16 18,18 Q21,20 24,18" fill="none" stroke="#4a148c" stroke-width="0.7" opacity="0.6"/>
    <path d="M13,22 Q16,21 19,22 Q22,23 25,21" fill="none" stroke="#4a148c" stroke-width="0.6" opacity="0.5"/>
    <!-- Boils/pustules -->
    <circle cx="12" cy="19" r="2" fill="#aed581" stroke-width="0.6"/>
    <circle cx="12" cy="19" r="0.8" fill="#76ff03" stroke="none"/>
    <circle cx="24" cy="17" r="1.8" fill="#aed581" stroke-width="0.6"/>
    <circle cx="24" cy="17" r="0.7" fill="#76ff03" stroke="none"/>
    <circle cx="20" cy="23" r="1.5" fill="#aed581" stroke-width="0.5"/>
    <circle cx="20" cy="23" r="0.6" fill="#76ff03" stroke="none"/>

    <!-- Mushroom growth left shoulder -->
    <ellipse cx="8" cy="15" rx="4" ry="2.5" fill="url(#bl-shroom-cap)" stroke-width="0.8"/>
    <ellipse cx="8" cy="15" rx="2.5" ry="1.5" fill="#bcaaa4" opacity="0.4" stroke="none"/>
    <path d="M8,15 L8,19" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Mushroom growth right shoulder -->
    <ellipse cx="28" cy="14" rx="3.5" ry="2" fill="url(#bl-shroom-cap)" stroke-width="0.8"/>
    <ellipse cx="28" cy="14" rx="2" ry="1.2" fill="#bcaaa4" opacity="0.4" stroke="none"/>
    <path d="M28,14 L28,18" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Left arm (dangling low) -->
    <path d="M8,18 Q5,22 4,27" stroke="url(#bl-arm)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left claw -->
    <circle cx="4" cy="28" r="3" fill="#558b2f" stroke-width="0.8"/>
    <path d="M2,27 L1,29 M4,28 L3,31 M6,27 L7,30" fill="none" stroke="#1a1a2e" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Right arm (hanging back, shamble) -->
    <path d="M28,18 Q31,22 30,27" stroke="url(#bl-arm)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right claw -->
    <circle cx="30" cy="28" r="3" fill="#558b2f" stroke-width="0.8"/>
    <path d="M28,27 L27,29 M30,28 L29,31 M32,27 L33,30" fill="none" stroke="#1a1a2e" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Front leg (stride forward) -->
    <path d="M24,26 Q26,30 26,35" stroke="#558b2f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="26" cy="35" rx="4.5" ry="1" fill="#3e2723" stroke-width="0.8"/>

    <!-- Neck (thick, stubby) -->
    <ellipse cx="18" cy="10.5" rx="5" ry="3.5" fill="#7cb342" stroke-width="0.8"/>

    <!-- Head (misshapen, corrupted) -->
    <ellipse cx="18" cy="6.5" rx="9" ry="6" fill="url(#bl-head)" stroke-width="1.2"/>
    <!-- Head highlight -->
    <ellipse cx="15" cy="4" rx="4" ry="2.5" fill="#ccff90" opacity="0.3" stroke="none"/>
    <!-- Skull patches (exposed bone) -->
    <ellipse cx="22" cy="3.5" rx="2.5" ry="2" fill="#e0e0ce" opacity="0.6" stroke-width="0.4"/>
    <!-- Corrupted markings -->
    <path d="M12,6 Q15,5 18,6 Q21,7 24,6" fill="none" stroke="#4a148c" stroke-width="0.6" opacity="0.5"/>

    <!-- Eyes (hollow glowing green) -->
    <ellipse cx="13.5" cy="6.5" rx="2.5" ry="2.5" fill="#1a1a2e" stroke-width="0.6"/>
    <ellipse cx="13.5" cy="6.5" rx="1.8" ry="1.8" fill="url(#bl-eye)" stroke="none"/>
    <ellipse cx="13.5" cy="6.5" rx="0.8" ry="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="13" cy="6" r="0.5" fill="#b9f6ca" stroke="none" opacity="0.8"/>

    <ellipse cx="22" cy="6.5" rx="2.2" ry="2.5" fill="#1a1a2e" stroke-width="0.6"/>
    <ellipse cx="22" cy="6.5" rx="1.6" ry="1.8" fill="url(#bl-eye)" stroke="none"/>
    <ellipse cx="22" cy="6.5" rx="0.7" ry="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="21.5" cy="6" r="0.45" fill="#b9f6ca" stroke="none" opacity="0.8"/>

    <!-- Nose (rotted, exposed) -->
    <path d="M17,9 Q18,10 19,9" fill="none" stroke="#1a1a2e" stroke-width="0.7"/>
    <circle cx="17.5" cy="9.2" r="0.5" fill="#4a148c" stroke="none"/>
    <circle cx="18.5" cy="9.2" r="0.5" fill="#4a148c" stroke="none"/>

    <!-- Mouth (drooling slime) -->
    <path d="M13.5,10.5 Q18,13.5 22.5,10.5" fill="#1a1a2e" stroke-width="0.8"/>
    <path d="M14,11 Q18,13.5 22,11" fill="#2e7d32" stroke="none"/>
    <!-- Drool drip from mouth -->
    <path d="M17,13 Q17,15 16.5,17" fill="none" stroke="url(#bl-slime)" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="16.5" cy="17.5" rx="1" ry="1.5" fill="url(#bl-slime)" stroke="none" opacity="0.8"/>
    <!-- Teeth (few, rotten) -->
    <line x1="15.5" y1="11" x2="15.5" y2="12.5" stroke="#c8c8a0" stroke-width="0.9"/>
    <line x1="18" y1="11.5" x2="18" y2="13" stroke="#c8c8a0" stroke-width="0.9"/>
    <line x1="20.5" y1="11" x2="20.5" y2="12.5" stroke="#c8c8a0" stroke-width="0.9"/>
  </g>

  <!-- Frame 1: Subtle shamble variant — legs and arms shifted 2px, body 1px down -->
  <g transform="translate(36,0)" stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="18" cy="34.5" rx="12" ry="1.5" fill="url(#bl-shadow)" stroke="none"/>

    <!-- Slime drips (same positions, slightly shifted) -->
    <ellipse cx="7" cy="20" rx="1.5" ry="2.5" fill="url(#bl-slime)" stroke="none" opacity="0.7"/>
    <ellipse cx="29" cy="18" rx="1.2" ry="2" fill="url(#bl-slime)" stroke="none" opacity="0.6"/>
    <ellipse cx="11" cy="28" rx="1" ry="1.8" fill="url(#bl-slime)" stroke="none" opacity="0.5"/>
    <ellipse cx="25" cy="26" rx="1.2" ry="2" fill="url(#bl-slime)" stroke="none" opacity="0.65"/>
    <!-- Hand drip trails -->
    <path d="M3,29 Q2.5,31 3,33" fill="none" stroke="#76ff03" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <path d="M31,29 Q31.5,31 31,33" fill="none" stroke="#76ff03" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

    <!-- Back leg shifted forward 2px -->
    <path d="M12,26 Q9,30 8,35" stroke="#558b2f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="8" cy="35" rx="4.5" ry="1" fill="#3e2723" stroke-width="0.8"/>

    <!-- Body (1px down for shamble bob) -->
    <ellipse cx="18" cy="21" rx="11" ry="10" fill="url(#bl-body)" stroke-width="1.2"/>
    <ellipse cx="16" cy="17" rx="5" ry="3.5" fill="#aed581" opacity="0.2" stroke="none"/>
    <path d="M12,19 Q15,17 18,19 Q21,21 24,19" fill="none" stroke="#4a148c" stroke-width="0.7" opacity="0.6"/>
    <path d="M13,23 Q16,22 19,23 Q22,24 25,22" fill="none" stroke="#4a148c" stroke-width="0.6" opacity="0.5"/>
    <!-- Boils -->
    <circle cx="12" cy="20" r="2" fill="#aed581" stroke-width="0.6"/>
    <circle cx="12" cy="20" r="0.8" fill="#76ff03" stroke="none"/>
    <circle cx="24" cy="18" r="1.8" fill="#aed581" stroke-width="0.6"/>
    <circle cx="24" cy="18" r="0.7" fill="#76ff03" stroke="none"/>
    <circle cx="20" cy="24" r="1.5" fill="#aed581" stroke-width="0.5"/>
    <circle cx="20" cy="24" r="0.6" fill="#76ff03" stroke="none"/>

    <!-- Mushroom growths (same positions) -->
    <ellipse cx="8" cy="16" rx="4" ry="2.5" fill="url(#bl-shroom-cap)" stroke-width="0.8"/>
    <ellipse cx="8" cy="16" rx="2.5" ry="1.5" fill="#bcaaa4" opacity="0.4" stroke="none"/>
    <path d="M8,16 L8,20" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="28" cy="15" rx="3.5" ry="2" fill="url(#bl-shroom-cap)" stroke-width="0.8"/>
    <ellipse cx="28" cy="15" rx="2" ry="1.2" fill="#bcaaa4" opacity="0.4" stroke="none"/>
    <path d="M28,15 L28,19" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Left arm swayed forward 2px -->
    <path d="M8,19 Q4,22 3,27" stroke="url(#bl-arm)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="3" cy="28" r="3" fill="#558b2f" stroke-width="0.8"/>
    <path d="M1,27 L1,29 M3,28 L2,31 M5,27 L6,30" fill="none" stroke="#1a1a2e" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Right arm swayed back 2px -->
    <path d="M28,19 Q32,23 31,28" stroke="url(#bl-arm)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="31" cy="29" r="3" fill="#558b2f" stroke-width="0.8"/>
    <path d="M29,28 L28,30 M31,29 L30,32 M33,28 L34,31" fill="none" stroke="#1a1a2e" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Front leg shifted back 2px -->
    <path d="M24,26 Q27,30 28,35" stroke="#558b2f" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="28" cy="35" rx="4.5" ry="1" fill="#3e2723" stroke-width="0.8"/>

    <!-- Neck -->
    <ellipse cx="18" cy="11.5" rx="5" ry="3.5" fill="#7cb342" stroke-width="0.8"/>

    <!-- Head (same position) -->
    <ellipse cx="18" cy="6.5" rx="9" ry="6" fill="url(#bl-head)" stroke-width="1.2"/>
    <ellipse cx="15" cy="4" rx="4" ry="2.5" fill="#ccff90" opacity="0.3" stroke="none"/>
    <ellipse cx="22" cy="3.5" rx="2.5" ry="2" fill="#e0e0ce" opacity="0.6" stroke-width="0.4"/>
    <path d="M12,6 Q15,5 18,6 Q21,7 24,6" fill="none" stroke="#4a148c" stroke-width="0.6" opacity="0.5"/>

    <!-- Eyes -->
    <ellipse cx="13.5" cy="6.5" rx="2.5" ry="2.5" fill="#1a1a2e" stroke-width="0.6"/>
    <ellipse cx="13.5" cy="6.5" rx="1.8" ry="1.8" fill="url(#bl-eye)" stroke="none"/>
    <ellipse cx="13.5" cy="6.5" rx="0.8" ry="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="13" cy="6" r="0.5" fill="#b9f6ca" stroke="none" opacity="0.8"/>

    <ellipse cx="22" cy="6.5" rx="2.2" ry="2.5" fill="#1a1a2e" stroke-width="0.6"/>
    <ellipse cx="22" cy="6.5" rx="1.6" ry="1.8" fill="url(#bl-eye)" stroke="none"/>
    <ellipse cx="22" cy="6.5" rx="0.7" ry="0.8" fill="#1a1a2e" stroke="none"/>
    <circle cx="21.5" cy="6" r="0.45" fill="#b9f6ca" stroke="none" opacity="0.8"/>

    <!-- Nose -->
    <path d="M17,9 Q18,10 19,9" fill="none" stroke="#1a1a2e" stroke-width="0.7"/>
    <circle cx="17.5" cy="9.2" r="0.5" fill="#4a148c" stroke="none"/>
    <circle cx="18.5" cy="9.2" r="0.5" fill="#4a148c" stroke="none"/>

    <!-- Mouth (drooling slime) -->
    <path d="M13.5,10.5 Q18,13.5 22.5,10.5" fill="#1a1a2e" stroke-width="0.8"/>
    <path d="M14,11 Q18,13.5 22,11" fill="#2e7d32" stroke="none"/>
    <path d="M17,13 Q17,15 16.5,17" fill="none" stroke="url(#bl-slime)" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="16.5" cy="17.5" rx="1" ry="1.5" fill="url(#bl-slime)" stroke="none" opacity="0.8"/>
    <!-- Teeth -->
    <line x1="15.5" y1="11" x2="15.5" y2="12.5" stroke="#c8c8a0" stroke-width="0.9"/>
    <line x1="18" y1="11.5" x2="18" y2="13" stroke="#c8c8a0" stroke-width="0.9"/>
    <line x1="20.5" y1="11" x2="20.5" y2="12.5" stroke="#c8c8a0" stroke-width="0.9"/>
  </g>
</svg>
