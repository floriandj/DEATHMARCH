    <path d="M16,40 Q8,46 4,36" stroke="#ff6f00" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M14,44 Q10,42 8,38" stroke="#ffeb3b" stroke-width="0.8" fill="none"/>
    <path d="M0,34 Q-2,30 2,32 Q4,36 6,34 Q4,30 8,32 Q8,36 10,34" fill="url(#inferno-body-dark)" stroke="#ff6f00" stroke-width="0.8"/>

    <path d="M72,40 Q80,46 84,36" stroke="#212121" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M72,40 Q80,46 84,36" stroke="#ff6f00" stroke-width="5" fill="none" stroke-linecap="round"/>
