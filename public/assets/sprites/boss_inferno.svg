<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 88" width="176" height="88" shape-rendering="geometricPrecision">
  <defs>
    <!-- Fire demon lava body -->
    <linearGradient id="inferno-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a50"/>
      <stop offset="50%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#bf360c"/>
    </linearGradient>
    <linearGradient id="inferno-body-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="inferno-body-hi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6f00" stop-opacity="0"/>
    </linearGradient>
    <!-- Flame wings -->
    <linearGradient id="inferno-wing" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d84315"/>
      <stop offset="40%" stop-color="#ff6f00"/>
      <stop offset="80%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ffeb3b"/>
    </linearGradient>
    <linearGradient id="inferno-wing2" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#bf360c" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#fff176" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Lava veins -->
    <linearGradient id="inferno-vein" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="50%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#d84315"/>
    </linearGradient>
    <!-- Eyes -->
    <radialGradient id="inferno-eye" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <!-- Fire crown -->
    <radialGradient id="inferno-flame-core" cx="0.5" cy="1" r="0.8">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="50%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#bf360c" stop-opacity="0"/>
    </radialGradient>
    <!-- Fire aura -->
    <radialGradient id="inferno-aura" cx="0.5" cy="0.8" r="0.6">
      <stop offset="0%" stop-color="#ff6f00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#bf360c" stop-opacity="0"/>
    </radialGradient>
  </defs>

