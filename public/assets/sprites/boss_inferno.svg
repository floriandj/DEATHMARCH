    <path d="M4,66 L0,62 M8,64 L6,60 M12,64 L11,60 M16,66 L18,62" stroke="#ff6f00" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Right arm -->
    <path d="M72,40 Q78,54 80,66" stroke="#212121" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M72,40 Q78,54 80,66" stroke="#ff6f00" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M74,44 Q76,50 76,58" stroke="#ffeb3b" stroke-width="0.8" fill="none"/>
    <path d="M84,64 Q86,68 84,72 Q80,76 74,74 Q70,70 72,66 Q76,62 80,64Z" fill="url(#inferno-body-dark)"/>
    <path d="M84,66 L88,62 M80,64 L82,60 M76,64 L77,60 M72,66 L70,62" stroke="#ff6f00" stroke-width="1.2" stroke-linecap="round" fill="none"/>

