    <path d="M70,36 Q84,24 86,14" stroke="#ffeb3b" stroke-width="0.6" fill="none" opacity="0.7"/>
    <path d="M74,22 Q80,14 78,8 Q74,14 72,10 Q70,16 74,22Z" fill="url(#inferno-wing2)" stroke="none" opacity="0.8"/>

