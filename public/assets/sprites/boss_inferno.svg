    <path d="M60,66 Q64,72 66,82 Q60,86 54,82 Q52,74 52,68Z" fill="url(#inferno-body-dark)"/>
    <!-- Lava vein on legs -->
    <path d="M26,68 Q28,72 26,78" stroke="url(#inferno-vein)" stroke-width="1" fill="none"/>
    <path d="M62,68 Q60,72 62,78" stroke="url(#inferno-vein)" stroke-width="1" fill="none"/>
