    <!-- Foot flames -->
    <path d="M20,82 Q22,78 24,82 Q26,78 28,82" stroke="#ff6f00" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M58,82 Q60,78 62,82 Q64,78 66,82" stroke="#ff6f00" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- Arms (at sides) -->
    <path d="M16,40 Q10,54 8,66" stroke="#212121" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M16,40 Q10,54 8,66" stroke="#ff6f00" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Lava veins on left arm -->
