    <path d="M18,36 Q4,24 2,14" stroke="#ffeb3b" stroke-width="0.6" fill="none" opacity="0.7"/>
    <!-- Left wing secondary flames -->
    <path d="M14,22 Q8,14 10,8 Q14,14 16,10 Q18,16 14,22Z" fill="url(#inferno-wing2)" stroke="none" opacity="0.8"/>
    <!-- Right wing -->
