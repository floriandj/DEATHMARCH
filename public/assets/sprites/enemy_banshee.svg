<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 26" width="208" height="104" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="banshee-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="banshee-robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e5fc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#29b6f6" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="banshee-eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ea80fc"/>
      <stop offset="50%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </radialGradient>
    <radialGradient id="banshee-eye-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="banshee-hair" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#81d4fa" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Frame 0: Floating serenely -->
  <g stroke="#1a1a2e" stroke-width="1" stroke-linejoin="round">
    <!-- No shadow — ghostly, not touching ground -->
    <!-- Flowing robe (tapers to nothing — no legs) -->
    <path d="M8,16 Q5,20 7,25 Q13,26 13,24 Q11,22 12,20Z" fill="url(#banshee-robe)" opacity="0.8"/>
    <path d="M18,16 Q21,20 19,25 Q13,26 13,24 Q15,22 14,20Z" fill="url(#banshee-robe)" opacity="0.8"/>
    <!-- Wispy hair (flowing path curves, left side) -->
    <path d="M5,6 Q2,2 4,0" stroke="url(#banshee-hair)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M6,5 Q3,3 5,1" stroke="url(#banshee-hair)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Wispy hair (right side) -->
    <path d="M21,6 Q24,2 22,0" stroke="url(#banshee-hair)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M20,5 Q23,3 21,1" stroke="url(#banshee-hair)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Arms (ghostly, flowing outward slightly) -->
    <path d="M8,13 Q4,14 3,17" stroke="#81d4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M18,13 Q22,14 23,17" stroke="#81d4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Finger wisps left -->
    <path d="M3,17 Q1.5,18.5 1,19.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M3,17 Q2,19 2.5,20.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Finger wisps right -->
    <path d="M23,17 Q24.5,18.5 25,19.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M23,17 Q24,19 23.5,20.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Body (translucent) -->
    <ellipse cx="13" cy="14" rx="6" ry="6" fill="url(#banshee-body)" opacity="0.8"/>
    <!-- Body highlight -->
    <ellipse cx="11" cy="11.5" rx="3" ry="2.5" fill="#e1f5fe" opacity="0.4" stroke="none"/>
    <!-- Neck -->
    <rect x="10.5" y="6" width="5" height="5" rx="2" fill="url(#banshee-body)" opacity="0.85"/>
    <!-- Head -->
    <ellipse cx="13" cy="6" rx="8" ry="6.5" fill="url(#banshee-body)" opacity="0.85"/>
    <!-- Head shine -->
    <ellipse cx="10.5" cy="3.5" rx="3.5" ry="2.5" fill="#e1f5fe" opacity="0.4" stroke="none"/>
    <!-- Left eye glow halo -->
    <ellipse cx="10" cy="5.5" rx="3" ry="2.5" fill="url(#banshee-eye-glow)" stroke="none"/>
    <!-- Right eye glow halo -->
    <ellipse cx="16" cy="5.5" rx="3" ry="2.5" fill="url(#banshee-eye-glow)" stroke="none"/>
    <!-- Left eye (hollow, purple glow) -->
    <ellipse cx="10" cy="5.5" rx="2" ry="1.8" fill="#111"/>
    <ellipse cx="10" cy="5.5" rx="1.3" ry="1.2" fill="url(#banshee-eye)"/>
    <circle cx="10.5" cy="5" r="0.4" fill="#f8bff8" stroke="none"/>
    <!-- Right eye (hollow, purple glow) -->
    <ellipse cx="16" cy="5.5" rx="2" ry="1.8" fill="#111"/>
    <ellipse cx="16" cy="5.5" rx="1.3" ry="1.2" fill="url(#banshee-eye)"/>
    <circle cx="16.5" cy="5" r="0.4" fill="#f8bff8" stroke="none"/>
    <!-- Mouth (slightly open — serene) -->
    <path d="M10,8.5 Q13,10 16,8.5" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.7"/>
  </g>

  <!-- Frame 1: Subtle floating variant — slight arm shift and body bob -->
  <g transform="translate(26,0)" stroke="#1a1a2e" stroke-width="1" stroke-linejoin="round">
    <!-- Flowing robe (slightly different sway) -->
    <path d="M9,16 Q6,20 8,25 Q13,26 13,24 Q11,22 12,20Z" fill="url(#banshee-robe)" opacity="0.8"/>
    <path d="M17,16 Q20,20 18,25 Q13,26 13,24 Q15,22 14,20Z" fill="url(#banshee-robe)" opacity="0.8"/>
    <!-- Wispy hair (flowing, same positions — within bounds) -->
    <path d="M5,6 Q2,3 4,1" stroke="url(#banshee-hair)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M6,5 Q3,3 5,1" stroke="url(#banshee-hair)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Wispy hair (right side) -->
    <path d="M21,6 Q24,3 22,1" stroke="url(#banshee-hair)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M20,5 Q23,3 21,1" stroke="url(#banshee-hair)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Arms (shifted 2px — left forward, right back) -->
    <path d="M8,13 Q3,13 2,16" stroke="#81d4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M18,13 Q23,15 24,18" stroke="#81d4fa" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Finger wisps left (within bounds, min x=1) -->
    <path d="M2,16 Q1,17.5 1,18.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M2,16 Q1.5,18 2,19.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Finger wisps right -->
    <path d="M24,18 Q25,19.5 25,20.5" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M24,18 Q24.5,20 24,21" stroke="#b3e5fc" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Body (translucent — 1px bob up) -->
    <ellipse cx="13" cy="13" rx="6" ry="6" fill="url(#banshee-body)" opacity="0.8"/>
    <!-- Body highlight -->
    <ellipse cx="11" cy="10.5" rx="3" ry="2.5" fill="#e1f5fe" opacity="0.4" stroke="none"/>
    <!-- Neck -->
    <rect x="10.5" y="5" width="5" height="5" rx="2" fill="url(#banshee-body)" opacity="0.85"/>
    <!-- Head (1px bob up) -->
    <ellipse cx="13" cy="5" rx="8" ry="5.5" fill="url(#banshee-body)" opacity="0.85"/>
    <!-- Head shine -->
    <ellipse cx="10.5" cy="2.5" rx="3.5" ry="2.5" fill="#e1f5fe" opacity="0.4" stroke="none"/>
    <!-- Left eye glow halo -->
    <ellipse cx="10" cy="4.5" rx="3" ry="2.5" fill="url(#banshee-eye-glow)" stroke="none"/>
    <!-- Right eye glow halo -->
    <ellipse cx="16" cy="4.5" rx="3" ry="2.5" fill="url(#banshee-eye-glow)" stroke="none"/>
    <!-- Left eye (hollow, purple glow) -->
    <ellipse cx="10" cy="4.5" rx="2" ry="1.8" fill="#111"/>
    <ellipse cx="10" cy="4.5" rx="1.3" ry="1.2" fill="url(#banshee-eye)"/>
    <circle cx="10.5" cy="4" r="0.4" fill="#f8bff8" stroke="none"/>
    <!-- Right eye (hollow, purple glow) -->
    <ellipse cx="16" cy="4.5" rx="2" ry="1.8" fill="#111"/>
    <ellipse cx="16" cy="4.5" rx="1.3" ry="1.2" fill="url(#banshee-eye)"/>
    <circle cx="16.5" cy="4" r="0.4" fill="#f8bff8" stroke="none"/>
    <!-- Mouth (slightly open — serene) -->
    <path d="M10,7.5 Q13,9 16,7.5" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.7"/>
  </g>
</svg>
