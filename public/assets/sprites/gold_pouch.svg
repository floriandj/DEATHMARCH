  <!-- Gold coins peeking out -->
  <circle cx="8" cy="7" r="2" fill="#ffd43b" stroke="#c8960c" stroke-width="0.4"/>
  <circle cx="12" cy="6.5" r="1.8" fill="#ffee66" stroke="#c8960c" stroke-width="0.4"/>
  <!-- Coin detail -->
  <text x="8" y="8.2" font-size="2.5" fill="#c8960c" text-anchor="middle" font-weight="bold">G</text>
  <!-- Sparkle -->
  <circle cx="14" cy="4" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="5" cy="6" r="0.5" fill="#ffffff" opacity="0.6"/>
