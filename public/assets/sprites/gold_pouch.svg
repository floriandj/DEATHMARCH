  <ellipse cx="10" cy="13" rx="7" ry="6" fill="#c8960c"/>
  <ellipse cx="10" cy="12" rx="6.5" ry="5.5" fill="#e8b20e"/>
  <!-- Pouch shine -->
  <ellipse cx="8" cy="11" rx="3" ry="2.5" fill="#ffd43b" opacity="0.6"/>
