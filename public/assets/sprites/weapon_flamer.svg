<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="flamer_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="flamer_tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="flamer_grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="flamer_energy" cx="10%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="40%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#bf360c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flamer_flame" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ffcc02"/>
      <stop offset="60%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#bf360c" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Wide flared nozzle -->
    <path d="M1 8 L9 10 L9 16 L1 18 Z" fill="url(#flamer_body)"/>
    <!-- Flame energy emanating from nozzle -->
    <path d="M1 8 L9 10 L9 16 L1 18 Z" fill="url(#flamer_energy)" stroke="none"/>
    <!-- Flame tip shapes -->
    <path d="M1 8 Q0 9 0 10 Q0 12 1 13 Q0 13 0 14 Q0 16 1 17" fill="url(#flamer_flame)" stroke="#ff6f00" stroke-width="1" stroke-linejoin="round"/>
    <!-- Nozzle pipe connector -->
    <rect x="8" y="11" width="4" height="4" rx="0.5" fill="url(#flamer_body)"/>
    <!-- Main stocky body with fuel tank -->
    <rect x="10" y="7" width="14" height="13" rx="1" fill="url(#flamer_body)"/>
    <!-- Fuel tank cylinder (rounded) -->
    <rect x="11" y="8" width="10" height="9" rx="2" fill="url(#flamer_tank)"/>
    <!-- Tank highlight / fuel level window -->
    <rect x="13" y="9" width="4" height="5" rx="1" fill="#4e342e" stroke-width="1"/>
    <rect x="14" y="10" width="2" height="3" rx="0.5" fill="#ff6f00" stroke="none"/>
    <!-- Warning stripe -->
    <line x1="11" y1="14" x2="21" y2="14" stroke="#ff6f00" stroke-width="1" stroke-opacity="0.6"/>
    <!-- Pressure gauge -->
    <circle cx="20" cy="11" r="2" fill="#3e2723" stroke-width="1"/>
    <circle cx="20" cy="11" r="1" fill="#ff6f00" stroke-width="0.8"/>
    <!-- Rear connector / stock -->
    <rect x="22" y="9" width="9" height="8" rx="1" fill="url(#flamer_body)"/>
    <rect x="27" y="10" width="4" height="6" rx="0.5" fill="#616161" stroke-width="1"/>
    <!-- Fuel hose connector -->
    <rect x="10" y="19" width="3" height="5" rx="0.5" fill="#424242" stroke-width="1"/>
    <rect x="14" y="19" width="3" height="5" rx="0.5" fill="#424242" stroke-width="1"/>
    <!-- Grip -->
    <rect x="19" y="20" width="6" height="9" rx="1" fill="url(#flamer_grip)"/>
    <line x1="20.5" y1="22" x2="23" y2="22" stroke="#424242" stroke-width="0.8"/>
    <line x1="20.5" y1="24" x2="23" y2="24" stroke="#424242" stroke-width="0.8"/>
    <line x1="20.5" y1="26" x2="23" y2="26" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M12 20 L12 25 Q12 27 14 27 L19 27" fill="url(#flamer_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="13.5" y1="20" x2="13" y2="24" stroke="#9e9e9e" stroke-width="1.2"/>
  </g>
</svg>
