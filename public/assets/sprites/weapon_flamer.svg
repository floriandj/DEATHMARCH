<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Flamethrower icon -->
  <!-- Nozzle (wide) -->
  <rect x="0" y="6" width="10" height="8" fill="#ff6348"/>
  <rect x="2" y="7" width="6" height="6" fill="#ee5a3a"/>
  <!-- Flame tip -->
  <rect x="0" y="8" width="2" height="4" fill="#ffaa00"/>
  <rect x="0" y="6" width="2" height="2" fill="#ff6600"/>
  <rect x="0" y="12" width="2" height="2" fill="#ff6600"/>
  <!-- Body/tank -->
  <rect x="8" y="4" width="16" height="14" fill="#ee5a3a"/>
  <rect x="10" y="5" width="12" height="12" fill="#cc4830"/>
  <!-- Fuel tank -->
  <rect x="12" y="6" width="8" height="8" fill="#ff6348"/>
  <rect x="13" y="7" width="6" height="6" fill="#ff8866"/>
  <rect x="14" y="8" width="4" height="4" fill="#ffaa88"/>
  <!-- Pressure pipes -->
  <rect x="10" y="16" width="2" height="4" fill="#cc4830"/>
  <rect x="14" y="16" width="2" height="4" fill="#cc4830"/>
  <!-- Stock -->
  <rect x="22" y="5" width="10" height="6" fill="#cc4830"/>
  <rect x="24" y="6" width="6" height="4" fill="#aa3820"/>
  <!-- Grip -->
  <rect x="22" y="14" width="6" height="10" fill="#aa3820"/>
  <rect x="24" y="15" width="2" height="8" fill="#882818"/>
</svg>
