<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="void_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="void_dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="void_energy" cx="8%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#e1bee7"/>
      <stop offset="40%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#4a148c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="void_core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e1bee7"/>
      <stop offset="60%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Thin elegant barrel -->
    <rect x="1" y="12.5" width="14" height="2.5" rx="0.5" fill="url(#void_body)"/>
    <!-- Void energy channel along barrel -->
    <rect x="1" y="13" width="14" height="1.5" rx="0" fill="url(#void_energy)" stroke="none"/>
    <!-- Emitter tip (slightly flared) -->
    <path d="M1 12 L3 12.5 L3 14.5 L1 15" fill="#7b1fa2" stroke-width="1"/>
    <!-- Energy node rings on barrel -->
    <rect x="3" y="12" width="1.5" height="3.5" rx="0.5" fill="#6a1b9a" stroke-width="1"/>
    <rect x="6" y="12" width="1.5" height="3.5" rx="0.5" fill="#6a1b9a" stroke-width="1"/>
    <rect x="9" y="12" width="1.5" height="3.5" rx="0.5" fill="#6a1b9a" stroke-width="1"/>
    <rect x="12" y="12" width="1.5" height="3.5" rx="0.5" fill="#6a1b9a" stroke-width="1"/>
    <!-- Slim receiver (elegant shape) -->
    <path d="M14 10 L23 9 L23 19 L14 18 Z" fill="url(#void_body)"/>
    <!-- Void crystal chamber (unique feature) -->
    <ellipse cx="18.5" cy="14" rx="3.5" ry="4" fill="url(#void_core)" stroke="#7b1fa2" stroke-width="1"/>
    <ellipse cx="18.5" cy="14" rx="1.8" ry="2" fill="#e1bee7" stroke="none"/>
    <ellipse cx="18" cy="13" rx="0.7" ry="0.6" fill="#ffffff" stroke="none"/>
    <!-- Top fin (alien aesthetic) -->
    <path d="M15 10 L17 7 L21 8 L23 9" fill="url(#void_body)" stroke-width="1.2"/>
    <!-- Bottom fin -->
    <path d="M15 18 L17 21 L21 20 L23 19" fill="url(#void_body)" stroke-width="1.2"/>
    <!-- Slim stock (tapers) -->
    <path d="M23 10 L31 11 L31 17 L23 18 Z" fill="url(#void_body)"/>
    <line x1="25" y1="11" x2="25" y2="17" stroke="#616161" stroke-width="0.8"/>
    <line x1="27" y1="11" x2="27" y2="17" stroke="#616161" stroke-width="0.8"/>
    <line x1="29" y1="11" x2="29" y2="17" stroke="#616161" stroke-width="0.8"/>
    <!-- Slim grip -->
    <rect x="21" y="19" width="5" height="9" rx="1" fill="url(#void_dark)"/>
    <line x1="22.5" y1="21" x2="24.5" y2="21" stroke="#424242" stroke-width="0.8"/>
    <line x1="22.5" y1="23" x2="24.5" y2="23" stroke="#424242" stroke-width="0.8"/>
    <line x1="22.5" y1="25" x2="24.5" y2="25" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M16 18 L16 23 Q16 25 18 25 L21 25" fill="url(#void_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="17.5" y1="18" x2="17" y2="22" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Power conduit (bottom) -->
    <rect x="17" y="28" width="6" height="3" rx="0.5" fill="#4a148c" stroke-width="1"/>
    <rect x="18" y="28.5" width="4" height="2" rx="0.3" fill="#7b1fa2" stroke-width="0.8"/>
  </g>
</svg>
