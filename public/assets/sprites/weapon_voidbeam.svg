<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Void Beam icon -->
  <!-- Emitter (wide, glowing) -->
  <rect x="0" y="6" width="10" height="10" fill="#a855f7"/>
  <rect x="2" y="7" width="6" height="8" fill="#9333ea"/>
  <rect x="3" y="8" width="4" height="6" fill="#c084fc"/>
  <rect x="4" y="9" width="2" height="4" fill="#e9d5ff"/>
  <!-- Void core glow -->
  <rect x="0" y="9" width="2" height="4" fill="#e9d5ff"/>
  <!-- Body (sleek, alien) -->
  <rect x="8" y="5" width="16" height="12" fill="#9333ea"/>
  <rect x="10" y="6" width="12" height="10" fill="#7e22ce"/>
  <!-- Central void crystal -->
  <rect x="12" y="7" width="8" height="8" fill="#a855f7"/>
  <rect x="13" y="8" width="6" height="6" fill="#c084fc"/>
  <rect x="14" y="9" width="4" height="4" fill="#e9d5ff"/>
  <rect x="15" y="10" width="2" height="2" fill="#fff"/>
  <!-- Fins -->
  <rect x="10" y="3" width="3" height="3" fill="#7e22ce"/>
  <rect x="10" y="16" width="3" height="3" fill="#7e22ce"/>
  <!-- Stock -->
  <rect x="22" y="6" width="10" height="5" fill="#7e22ce"/>
  <rect x="24" y="7" width="6" height="3" fill="#6b21a8"/>
  <!-- Grip -->
  <rect x="22" y="14" width="6" height="10" fill="#6b21a8"/>
  <rect x="24" y="15" width="2" height="8" fill="#581c87"/>
</svg>
