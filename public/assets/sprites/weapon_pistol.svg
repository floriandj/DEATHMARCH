<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="pistol_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="pistol_grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="pistol_energy" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#9e9e9e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Barrel -->
    <rect x="3" y="10" width="10" height="4" rx="0.5" fill="url(#pistol_body)"/>
    <!-- Muzzle energy glow -->
    <rect x="3" y="10" width="4" height="4" rx="0.5" fill="url(#pistol_energy)"/>
    <!-- Slide/receiver -->
    <rect x="11" y="8" width="11" height="7" rx="1" fill="url(#pistol_body)"/>
    <!-- Ejection port -->
    <rect x="13" y="9" width="5" height="3" rx="0.5" fill="#212121" stroke-width="1"/>
    <!-- Sight -->
    <rect x="17" y="7" width="2" height="2" rx="0.3" fill="#616161"/>
    <!-- Grip -->
    <rect x="17" y="15" width="7" height="10" rx="1" fill="url(#pistol_grip)"/>
    <!-- Grip texture lines -->
    <line x1="19" y1="17" x2="22" y2="17" stroke="#424242" stroke-width="0.8"/>
    <line x1="19" y1="19" x2="22" y2="19" stroke="#424242" stroke-width="0.8"/>
    <line x1="19" y1="21" x2="22" y2="21" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M14 15 L14 20 Q14 22 16 22 L17 22" fill="url(#pistol_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="15.5" y1="15" x2="15" y2="19" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Magazine base -->
    <rect x="18" y="24" width="5" height="2" rx="0.5" fill="#616161"/>
  </g>
</svg>
