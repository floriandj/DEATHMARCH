<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 26" width="208" height="104" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="hh-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="hh-belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="hh-flame-a" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="60%" stop-color="#ff5722"/>
      <stop offset="100%" stop-color="#ffeb3b" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="hh-flame-b" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffcc02"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="hh-eye" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff5722"/>
      <stop offset="50%" stop-color="#dd2c00"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </radialGradient>
    <radialGradient id="hh-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame 0: Stalking — body low, predatory -->
  <g stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="13" cy="25" rx="10" ry="1.5" fill="url(#hh-shadow)" stroke="none"/>

    <!-- Tail (curled up with flame tip) -->
    <path d="M3,14 Q1,10 2,7 Q4,5 5,8" fill="none" stroke="#6d4c41" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tail flame -->
    <path d="M4,6 Q2,3 4,2 Q5,4 5,6" fill="url(#hh-flame-a)" stroke="none"/>
    <path d="M4.5,5 Q3,2.5 4.5,1.5 Q5.5,3.5 5,5" fill="url(#hh-flame-b)" stroke="none"/>

    <!-- Back legs -->
    <path d="M18,16 Q17,20 16,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="15.5" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>
    <path d="M21,16 Q22,20 22,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="22" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>

    <!-- Main body (long, low, quadruped) -->
    <ellipse cx="13" cy="16" rx="12" ry="6" fill="url(#hh-body)" stroke-width="1"/>
    <!-- Belly (lighter underside) -->
    <ellipse cx="13" cy="18" rx="9" ry="3.5" fill="url(#hh-belly)" stroke-width="0.6"/>

    <!-- Spiky fur along spine -->
    <path d="M5,11 Q6,9 7,11" fill="#3e2723" stroke-width="0.5"/>
    <path d="M8,10 Q9,8 10,10" fill="#3e2723" stroke-width="0.5"/>
    <path d="M11,9.5 Q12,7.5 13,9.5" fill="#3e2723" stroke-width="0.5"/>
    <path d="M14,10 Q15,8 16,10" fill="#3e2723" stroke-width="0.5"/>
    <path d="M17,10.5 Q18,8.5 19,10.5" fill="#3e2723" stroke-width="0.5"/>

    <!-- Flame wisps on back -->
    <path d="M9,11 Q7,7 9,5 Q10,8 10,11" fill="url(#hh-flame-a)" stroke="none" opacity="0.85"/>
    <path d="M13,10 Q11,6 13,4 Q14,7 14,10" fill="url(#hh-flame-a)" stroke="none" opacity="0.9"/>
    <path d="M17,11 Q15,7 17,5 Q18,8 18,11" fill="url(#hh-flame-a)" stroke="none" opacity="0.8"/>
    <!-- Inner flame highlights -->
    <path d="M9.5,11 Q8,8 9.5,6.5 Q10.5,8.5 10,11" fill="url(#hh-flame-b)" stroke="none" opacity="0.6"/>
    <path d="M13.5,10 Q12,7 13.5,5.5 Q14.5,7.5 14,10" fill="url(#hh-flame-b)" stroke="none" opacity="0.6"/>

    <!-- Front legs (low stance) -->
    <path d="M6,16 Q5,20 5,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="5" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>
    <path d="M9,16 Q9,20 10,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="10" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>

    <!-- Neck (short, thick) -->
    <ellipse cx="23" cy="13" rx="4" ry="5" fill="#bf360c" stroke-width="0.8"/>

    <!-- Head (large, wolf-like) -->
    <ellipse cx="23" cy="9" rx="5.5" ry="5" fill="url(#hh-body)" stroke-width="1"/>
    <!-- Snout/muzzle -->
    <ellipse cx="26" cy="11" rx="4" ry="3" fill="#6d4c41" stroke-width="0.8"/>
    <!-- Muzzle highlight -->
    <ellipse cx="25" cy="10" rx="2" ry="1.5" fill="#8d6e63" opacity="0.5" stroke="none"/>

    <!-- Ears (pointy, upright) -->
    <path d="M19,6 Q18,2 21,4 Q20,6 19,6" fill="#4e342e" stroke-width="0.7"/>
    <path d="M19.5,5.5 Q19,3 21,4.5" fill="#bf360c" stroke="none"/>
    <path d="M25,5 Q26,1 28,4 Q27,6 25,5" fill="#4e342e" stroke-width="0.7"/>
    <path d="M25.5,4.5 Q26,2 27.5,4" fill="#bf360c" stroke="none"/>

    <!-- Eyes (glowing red) -->
    <ellipse cx="20.5" cy="8.5" rx="1.8" ry="1.8" fill="url(#hh-eye)" stroke-width="0.5"/>
    <ellipse cx="20.5" cy="8.5" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="20" cy="8" r="0.45" fill="white" stroke="none"/>

    <ellipse cx="24.5" cy="8.5" rx="1.8" ry="1.8" fill="url(#hh-eye)" stroke-width="0.5"/>
    <ellipse cx="24.5" cy="8.5" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="24" cy="8" r="0.45" fill="white" stroke="none"/>

    <!-- Nose -->
    <ellipse cx="27.5" cy="10.5" rx="1.5" ry="1" fill="#1a1a2e" stroke-width="0.5"/>
    <circle cx="27" cy="10.3" r="0.4" fill="#4e342e" stroke="none"/>

    <!-- Teeth (sharp, visible) -->
    <path d="M23.5,12 Q25,13.5 27.5,12.5" fill="none" stroke="#1a1a2e" stroke-width="0.7"/>
    <path d="M24,12.2 L23.5,13.5 M25.5,12.5 L25.5,14 M27,12.3 L27.2,13.5" fill="none" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Frame 1: Subtle walk variant — front legs forward 2px, rear legs back 2px -->
  <g transform="translate(26,0)" stroke="#1a1a2e" stroke-linejoin="round">
    <!-- Shadow -->
    <ellipse cx="13" cy="25" rx="10" ry="1.5" fill="url(#hh-shadow)" stroke="none"/>

    <!-- Tail (same, slight sway) -->
    <path d="M3,14 Q1,10 3,7 Q5,5 5,8" fill="none" stroke="#6d4c41" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tail flame -->
    <path d="M4.5,6 Q3,3 5,2 Q5.5,4 5,6" fill="url(#hh-flame-a)" stroke="none"/>
    <path d="M5,5 Q3.5,2.5 5,1.5 Q6,3.5 5.5,5" fill="url(#hh-flame-b)" stroke="none"/>

    <!-- Back legs shifted back 2px -->
    <path d="M20,16 Q19,20 18,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="17.5" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>
    <path d="M23,16 Q24,20 24,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="24" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>

    <!-- Main body (same) -->
    <ellipse cx="13" cy="16" rx="12" ry="6" fill="url(#hh-body)" stroke-width="1"/>
    <ellipse cx="13" cy="18" rx="9" ry="3.5" fill="url(#hh-belly)" stroke-width="0.6"/>

    <!-- Spiky fur along spine -->
    <path d="M5,11 Q6,9 7,11" fill="#3e2723" stroke-width="0.5"/>
    <path d="M8,10 Q9,8 10,10" fill="#3e2723" stroke-width="0.5"/>
    <path d="M11,9.5 Q12,7.5 13,9.5" fill="#3e2723" stroke-width="0.5"/>
    <path d="M14,10 Q15,8 16,10" fill="#3e2723" stroke-width="0.5"/>
    <path d="M17,10.5 Q18,8.5 19,10.5" fill="#3e2723" stroke-width="0.5"/>

    <!-- Flame wisps (shifted slightly) -->
    <path d="M9,11 Q7.5,7 9.5,5 Q10.5,8 10,11" fill="url(#hh-flame-a)" stroke="none" opacity="0.85"/>
    <path d="M13,10 Q11.5,6 13.5,4 Q14.5,7 14,10" fill="url(#hh-flame-a)" stroke="none" opacity="0.9"/>
    <path d="M17,11 Q15.5,7 17.5,5 Q18.5,8 18,11" fill="url(#hh-flame-a)" stroke="none" opacity="0.8"/>
    <path d="M9.5,11 Q8.5,8 10,6.5 Q10.5,8.5 10,11" fill="url(#hh-flame-b)" stroke="none" opacity="0.6"/>
    <path d="M13.5,10 Q12.5,7 14,5.5 Q14.5,7.5 14,10" fill="url(#hh-flame-b)" stroke="none" opacity="0.6"/>

    <!-- Front legs shifted forward 2px -->
    <path d="M4,16 Q3,20 3,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="3" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>
    <path d="M7,16 Q7,20 8,24" stroke="#4e342e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="8" cy="24" rx="3" ry="1.3" fill="#3e2723" stroke-width="0.6"/>

    <!-- Neck -->
    <ellipse cx="23" cy="13" rx="4" ry="5" fill="#bf360c" stroke-width="0.8"/>

    <!-- Head (same position) -->
    <ellipse cx="23" cy="9" rx="5.5" ry="5" fill="url(#hh-body)" stroke-width="1"/>
    <ellipse cx="26" cy="11" rx="4" ry="3" fill="#6d4c41" stroke-width="0.8"/>
    <ellipse cx="25" cy="10" rx="2" ry="1.5" fill="#8d6e63" opacity="0.5" stroke="none"/>

    <!-- Ears -->
    <path d="M19,6 Q18,2 21,4 Q20,6 19,6" fill="#4e342e" stroke-width="0.7"/>
    <path d="M19.5,5.5 Q19,3 21,4.5" fill="#bf360c" stroke="none"/>
    <path d="M25,5 Q26,1 28,4 Q27,6 25,5" fill="#4e342e" stroke-width="0.7"/>
    <path d="M25.5,4.5 Q26,2 27.5,4" fill="#bf360c" stroke="none"/>

    <!-- Eyes -->
    <ellipse cx="20.5" cy="8.5" rx="1.8" ry="1.8" fill="url(#hh-eye)" stroke-width="0.5"/>
    <ellipse cx="20.5" cy="8.5" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="20" cy="8" r="0.45" fill="white" stroke="none"/>

    <ellipse cx="24.5" cy="8.5" rx="1.8" ry="1.8" fill="url(#hh-eye)" stroke-width="0.5"/>
    <ellipse cx="24.5" cy="8.5" rx="0.9" ry="0.9" fill="#1a1a2e" stroke="none"/>
    <circle cx="24" cy="8" r="0.45" fill="white" stroke="none"/>

    <!-- Nose -->
    <ellipse cx="27.5" cy="10.5" rx="1.5" ry="1" fill="#1a1a2e" stroke-width="0.5"/>
    <circle cx="27" cy="10.3" r="0.4" fill="#4e342e" stroke="none"/>

    <!-- Teeth -->
    <path d="M23.5,12 Q25,13.5 27.5,12.5" fill="none" stroke="#1a1a2e" stroke-width="0.7"/>
    <path d="M24,12.2 L23.5,13.5 M25.5,12.5 L25.5,14 M27,12.3 L27.2,13.5" fill="none" stroke="white" stroke-width="0.8"/>
  </g>
</svg>
