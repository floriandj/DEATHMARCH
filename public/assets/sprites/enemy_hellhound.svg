<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 26" width="52" height="26" shape-rendering="crispEdges">
  <!-- Frame 0: Hellhound - fiery wolf, low and fast -->
  <g>
    <!-- Ears -->
    <rect x="3" y="1" width="3" height="4" fill="#cc4400"/>
    <rect x="10" y="0" width="3" height="4" fill="#cc4400"/>
    <!-- Head -->
    <rect x="2" y="4" width="13" height="8" fill="#ff8c00"/>
    <rect x="3" y="5" width="11" height="6" fill="#cc6600"/>
    <!-- Eyes (ember) -->
    <rect x="4" y="6" width="3" height="2" fill="#ff0000"/>
    <rect x="9" y="6" width="3" height="2" fill="#ff0000"/>
    <rect x="5" y="6" width="1" height="1" fill="#ffcc00"/>
    <rect x="10" y="6" width="1" height="1" fill="#ffcc00"/>
    <!-- Snout -->
    <rect x="0" y="8" width="4" height="3" fill="#cc6600"/>
    <rect x="0" y="9" width="2" height="2" fill="#440000"/>
    <!-- Jaw/teeth -->
    <rect x="1" y="10" width="3" height="2" fill="#660000"/>
    <rect x="1" y="10" width="1" height="1" fill="#eee"/>
    <rect x="3" y="10" width="1" height="1" fill="#eee"/>
    <!-- Body (muscular, low) -->
    <rect x="10" y="6" width="14" height="10" fill="#ff8c00"/>
    <rect x="11" y="7" width="12" height="8" fill="#cc6600"/>
    <!-- Flame mane -->
    <rect x="12" y="4" width="2" height="3" fill="#ff4400"/>
    <rect x="15" y="3" width="2" height="4" fill="#ff6600"/>
    <rect x="18" y="4" width="2" height="3" fill="#ff4400"/>
    <!-- Front legs -->
    <rect x="11" y="16" width="3" height="7" fill="#cc6600"/>
    <rect x="16" y="16" width="3" height="7" fill="#cc6600"/>
    <!-- Back legs -->
    <rect x="20" y="15" width="3" height="8" fill="#cc6600"/>
    <!-- Paws -->
    <rect x="10" y="22" width="4" height="4" fill="#883300"/>
    <rect x="15" y="22" width="4" height="4" fill="#883300"/>
    <rect x="19" y="22" width="4" height="4" fill="#883300"/>
    <!-- Tail (flame) -->
    <rect x="23" y="7" width="3" height="2" fill="#ff6600"/>
    <rect x="25" y="6" width="2" height="2" fill="#ff4400"/>
  </g>
  <!-- Frame 1: Running -->
  <g transform="translate(26,0)">
    <rect x="3" y="0" width="3" height="4" fill="#cc4400"/>
    <rect x="10" y="0" width="3" height="3" fill="#cc4400"/>
    <rect x="2" y="3" width="13" height="8" fill="#ff8c00"/>
    <rect x="3" y="4" width="11" height="6" fill="#cc6600"/>
    <rect x="4" y="5" width="3" height="2" fill="#ff0000"/>
    <rect x="9" y="5" width="3" height="2" fill="#ff0000"/>
    <rect x="5" y="5" width="1" height="1" fill="#ffcc00"/>
    <rect x="10" y="5" width="1" height="1" fill="#ffcc00"/>
    <rect x="0" y="7" width="4" height="3" fill="#cc6600"/>
    <rect x="0" y="8" width="2" height="2" fill="#440000"/>
    <rect x="1" y="9" width="3" height="2" fill="#660000"/>
    <rect x="1" y="9" width="1" height="1" fill="#eee"/>
    <rect x="3" y="9" width="1" height="1" fill="#eee"/>
    <rect x="10" y="5" width="14" height="10" fill="#ff8c00"/>
    <rect x="11" y="6" width="12" height="8" fill="#cc6600"/>
    <!-- Mane flicker -->
    <rect x="12" y="3" width="2" height="4" fill="#ff6600"/>
    <rect x="15" y="2" width="2" height="5" fill="#ff4400"/>
    <rect x="18" y="3" width="2" height="4" fill="#ffaa00"/>
    <!-- Legs (gallop) -->
    <rect x="9" y="15" width="3" height="6" fill="#cc6600"/>
    <rect x="17" y="16" width="3" height="7" fill="#cc6600"/>
    <rect x="21" y="14" width="3" height="7" fill="#cc6600"/>
    <rect x="8" y="20" width="4" height="4" fill="#883300"/>
    <rect x="16" y="22" width="4" height="4" fill="#883300"/>
    <rect x="20" y="20" width="4" height="4" fill="#883300"/>
    <!-- Tail (flicker) -->
    <rect x="23" y="6" width="3" height="2" fill="#ff4400"/>
    <rect x="25" y="5" width="2" height="3" fill="#ffaa00"/>
  </g>
</svg>
