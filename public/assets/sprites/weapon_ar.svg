<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="ar_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="ar_stock" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="ar_grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="ar_energy" cx="12%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="50%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Barrel (long) -->
    <rect x="1" y="11" width="12" height="3" rx="0.5" fill="url(#ar_body)"/>
    <!-- Muzzle brake -->
    <rect x="1" y="10.5" width="2.5" height="4" rx="0.3" fill="#616161" stroke-width="1"/>
    <!-- Muzzle energy -->
    <rect x="1" y="11" width="5" height="3" rx="0.5" fill="url(#ar_energy)"/>
    <!-- Handguard (longer, with rail lines) -->
    <rect x="7" y="10" width="7" height="5" rx="0.5" fill="url(#ar_body)"/>
    <!-- Rail notches on handguard -->
    <line x1="9" y1="10" x2="9" y2="11" stroke="#616161" stroke-width="0.8"/>
    <line x1="11" y1="10" x2="11" y2="11" stroke="#616161" stroke-width="0.8"/>
    <line x1="13" y1="10" x2="13" y2="11" stroke="#616161" stroke-width="0.8"/>
    <!-- Gas block -->
    <rect x="8" y="9" width="2" height="2" rx="0.2" fill="#757575" stroke-width="1"/>
    <!-- Receiver -->
    <rect x="13" y="8" width="10" height="7" rx="1" fill="url(#ar_body)"/>
    <!-- Ejection port -->
    <rect x="15" y="9" width="5" height="3" rx="0.3" fill="#212121" stroke-width="1"/>
    <!-- Carry handle/rear sight -->
    <rect x="18" y="6" width="4" height="3" rx="0.3" fill="#757575" stroke-width="1"/>
    <rect x="19" y="6.5" width="2" height="1.5" rx="0.2" fill="#212121" stroke-width="0.8"/>
    <!-- Front sight post -->
    <rect x="7.5" y="8" width="1.5" height="2.5" rx="0.2" fill="#757575" stroke-width="1"/>
    <!-- Stock (with buffer tube) -->
    <rect x="22" y="9" width="9" height="5" rx="1" fill="url(#ar_stock)"/>
    <rect x="28" y="10" width="3" height="3" rx="0.5" fill="#616161" stroke-width="1"/>
    <!-- Pistol grip -->
    <rect x="19" y="15" width="5" height="9" rx="1" fill="url(#ar_grip)"/>
    <line x1="20.5" y1="17" x2="22.5" y2="17" stroke="#424242" stroke-width="0.8"/>
    <line x1="20.5" y1="19" x2="22.5" y2="19" stroke="#424242" stroke-width="0.8"/>
    <line x1="20.5" y1="21" x2="22.5" y2="21" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M15 15 L15 20 Q15 22 17 22 L19 22" fill="url(#ar_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="16.5" y1="15" x2="16" y2="19" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Magazine (curved) -->
    <path d="M16 23 Q15 28 15.5 30 L20 30 Q20.5 28 20 23 Z" fill="url(#ar_grip)"/>
    <rect x="16.5" y="24" width="3" height="5" rx="0.3" fill="#424242" stroke-width="0.8"/>
  </g>
</svg>
