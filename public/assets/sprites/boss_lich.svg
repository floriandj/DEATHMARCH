<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 88" width="176" height="88" shape-rendering="crispEdges">
  <!-- Frame 0: Lich King - skeletal sorcerer with crown and robes -->
  <g>
    <!-- Crown (dark iron with gems) -->
    <rect x="22" y="0" width="6" height="10" fill="#555"/>
    <rect x="24" y="0" width="2" height="4" fill="#9b59b6"/>
    <rect x="34" y="0" width="8" height="14" fill="#555"/>
    <rect x="36" y="0" width="4" height="6" fill="#9b59b6"/>
    <rect x="37" y="2" width="2" height="2" fill="#d6a0ff"/>
    <rect x="48" y="0" width="8" height="12" fill="#555"/>
    <rect x="50" y="0" width="4" height="6" fill="#9b59b6"/>
    <rect x="60" y="0" width="6" height="10" fill="#555"/>
    <rect x="62" y="0" width="2" height="4" fill="#9b59b6"/>
    <!-- Crown base -->
    <rect x="20" y="8" width="48" height="6" fill="#444"/>
    <rect x="22" y="9" width="44" height="4" fill="#555"/>

    <!-- Skull head -->
    <rect x="20" y="12" width="48" height="22" fill="#e8e0d0"/>
    <rect x="22" y="14" width="44" height="18" fill="#f0e8d8"/>
    <!-- Brow ridges -->
    <rect x="24" y="14" width="14" height="3" fill="#d0c8b8"/>
    <rect x="50" y="14" width="14" height="3" fill="#d0c8b8"/>
    <!-- Eye sockets (deep, glowing purple) -->
    <rect x="24" y="18" width="12" height="10" fill="#222"/>
    <rect x="52" y="18" width="12" height="10" fill="#222"/>
    <rect x="26" y="20" width="8" height="6" fill="#9b59b6"/>
    <rect x="54" y="20" width="8" height="6" fill="#9b59b6"/>
    <rect x="28" y="21" width="4" height="4" fill="#d6a0ff"/>
    <rect x="56" y="21" width="4" height="4" fill="#d6a0ff"/>
    <rect x="29" y="22" width="2" height="2" fill="#fff"/>
    <rect x="57" y="22" width="2" height="2" fill="#fff"/>
    <!-- Nose hole -->
    <rect x="40" y="26" width="4" height="4" fill="#c0b8a8"/>
    <rect x="41" y="27" width="2" height="3" fill="#888"/>
    <!-- Jaw -->
    <rect x="26" y="30" width="36" height="6" fill="#d0c8b8"/>
    <rect x="28" y="30" width="32" height="4" fill="#444"/>
    <!-- Teeth -->
    <rect x="30" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="35" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="40" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="45" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="50" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="55" y="30" width="3" height="3" fill="#f0e8d8"/>

    <!-- Robes (dark purple flowing) -->
    <rect x="8" y="34" width="72" height="40" fill="#2c1654"/>
    <rect x="12" y="36" width="64" height="36" fill="#3a1d6e"/>
    <!-- Robe trim -->
    <rect x="10" y="34" width="68" height="3" fill="#555"/>
    <rect x="12" y="35" width="64" height="1" fill="#9b59b6"/>
    <!-- Soul orb (center) -->
    <rect x="32" y="42" width="24" height="20" fill="#1a0a3a"/>
    <rect x="34" y="44" width="20" height="16" fill="#2c1654"/>
    <rect x="36" y="46" width="16" height="12" fill="#9b59b6"/>
    <rect x="38" y="48" width="12" height="8" fill="#be7bf0"/>
    <rect x="40" y="50" width="8" height="4" fill="#d6a0ff"/>
    <rect x="42" y="51" width="4" height="2" fill="#fff"/>
    <!-- Robe folds -->
    <rect x="14" y="42" width="2" height="24" fill="#241050"/>
    <rect x="26" y="44" width="2" height="20" fill="#241050"/>
    <rect x="60" y="42" width="2" height="24" fill="#241050"/>
    <rect x="72" y="44" width="2" height="20" fill="#241050"/>

    <!-- Skeletal arms (holding staff implied) -->
    <rect x="2" y="38" width="10" height="4" fill="#e8e0d0"/>
    <rect x="0" y="40" width="8" height="18" fill="#3a1d6e"/>
    <rect x="2" y="42" width="4" height="14" fill="#2c1654"/>
    <rect x="0" y="56" width="8" height="6" fill="#e8e0d0"/>
    <rect x="2" y="58" width="4" height="3" fill="#d0c8b8"/>
    <rect x="76" y="38" width="10" height="4" fill="#e8e0d0"/>
    <rect x="80" y="40" width="8" height="18" fill="#3a1d6e"/>
    <rect x="82" y="42" width="4" height="14" fill="#2c1654"/>
    <rect x="80" y="56" width="8" height="6" fill="#e8e0d0"/>
    <rect x="82" y="58" width="4" height="3" fill="#d0c8b8"/>

    <!-- Robe bottom (flowing, wider) -->
    <rect x="4" y="70" width="80" height="14" fill="#2c1654"/>
    <rect x="8" y="72" width="72" height="10" fill="#3a1d6e"/>
    <!-- Bottom trim -->
    <rect x="6" y="80" width="76" height="3" fill="#9b59b6"/>
    <rect x="8" y="81" width="72" height="1" fill="#d6a0ff"/>
    <!-- Shadow/hover effect -->
    <rect x="12" y="84" width="64" height="4" fill="#1a0a3a" opacity="0.4"/>
  </g>

  <!-- Frame 1 (arms raised, soul orb pulsing) -->
  <g transform="translate(88,0)">
    <!-- Crown -->
    <rect x="22" y="0" width="6" height="10" fill="#555"/>
    <rect x="24" y="0" width="2" height="4" fill="#be7bf0"/>
    <rect x="34" y="0" width="8" height="14" fill="#555"/>
    <rect x="36" y="0" width="4" height="6" fill="#be7bf0"/>
    <rect x="37" y="2" width="2" height="2" fill="#fff"/>
    <rect x="48" y="0" width="8" height="12" fill="#555"/>
    <rect x="50" y="0" width="4" height="6" fill="#be7bf0"/>
    <rect x="60" y="0" width="6" height="10" fill="#555"/>
    <rect x="62" y="0" width="2" height="4" fill="#be7bf0"/>
    <rect x="20" y="8" width="48" height="6" fill="#444"/>

    <!-- Skull -->
    <rect x="20" y="12" width="48" height="22" fill="#e8e0d0"/>
    <rect x="22" y="14" width="44" height="18" fill="#f0e8d8"/>
    <rect x="24" y="14" width="14" height="3" fill="#d0c8b8"/>
    <rect x="50" y="14" width="14" height="3" fill="#d0c8b8"/>
    <!-- Eyes (brighter) -->
    <rect x="24" y="18" width="12" height="10" fill="#222"/>
    <rect x="52" y="18" width="12" height="10" fill="#222"/>
    <rect x="26" y="20" width="8" height="6" fill="#be7bf0"/>
    <rect x="54" y="20" width="8" height="6" fill="#be7bf0"/>
    <rect x="28" y="21" width="4" height="4" fill="#eeccff"/>
    <rect x="56" y="21" width="4" height="4" fill="#eeccff"/>
    <rect x="40" y="26" width="4" height="4" fill="#c0b8a8"/>
    <!-- Jaw open wider -->
    <rect x="24" y="30" width="40" height="8" fill="#d0c8b8"/>
    <rect x="26" y="30" width="36" height="6" fill="#444"/>
    <rect x="28" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="34" y="30" width="3" height="4" fill="#f0e8d8"/>
    <rect x="40" y="30" width="3" height="3" fill="#f0e8d8"/>
    <rect x="46" y="30" width="3" height="4" fill="#f0e8d8"/>
    <rect x="52" y="30" width="3" height="3" fill="#f0e8d8"/>

    <!-- Robes -->
    <rect x="8" y="36" width="72" height="38" fill="#2c1654"/>
    <rect x="12" y="38" width="64" height="34" fill="#3a1d6e"/>
    <rect x="10" y="36" width="68" height="3" fill="#555"/>
    <rect x="12" y="37" width="64" height="1" fill="#9b59b6"/>
    <!-- Soul orb (brighter pulse) -->
    <rect x="30" y="42" width="28" height="22" fill="#1a0a3a"/>
    <rect x="32" y="44" width="24" height="18" fill="#2c1654"/>
    <rect x="34" y="46" width="20" height="14" fill="#be7bf0"/>
    <rect x="36" y="48" width="16" height="10" fill="#d6a0ff"/>
    <rect x="38" y="50" width="12" height="6" fill="#eeccff"/>
    <rect x="40" y="52" width="8" height="2" fill="#fff"/>

    <!-- Arms (raised, casting) -->
    <rect x="0" y="34" width="10" height="4" fill="#e8e0d0"/>
    <rect x="0" y="36" width="6" height="14" fill="#3a1d6e"/>
    <rect x="0" y="48" width="8" height="6" fill="#e8e0d0"/>
    <rect x="78" y="34" width="10" height="4" fill="#e8e0d0"/>
    <rect x="82" y="36" width="6" height="14" fill="#3a1d6e"/>
    <rect x="80" y="48" width="8" height="6" fill="#e8e0d8"/>

    <!-- Robe bottom -->
    <rect x="4" y="70" width="80" height="14" fill="#2c1654"/>
    <rect x="8" y="72" width="72" height="10" fill="#3a1d6e"/>
    <rect x="6" y="80" width="76" height="3" fill="#be7bf0"/>
    <rect x="8" y="81" width="72" height="1" fill="#eeccff"/>
    <rect x="10" y="84" width="68" height="4" fill="#1a0a3a" opacity="0.5"/>
  </g>
</svg>
