<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="lmg_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="lmg_heavy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <radialGradient id="lmg_energy" cx="10%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="50%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round" fill="none">
    <!-- Heavy barrel with heat shroud -->
    <rect x="1" y="10" width="11" height="5" rx="0.5" fill="url(#lmg_body)"/>
    <!-- Muzzle energy -->
    <rect x="1" y="10" width="4" height="5" rx="0.5" fill="url(#lmg_energy)"/>
    <!-- Barrel cooling vents -->
    <line x1="4" y1="10" x2="4" y2="15" stroke="#616161" stroke-width="0.8"/>
    <line x1="6" y1="10" x2="6" y2="15" stroke="#616161" stroke-width="0.8"/>
    <line x1="8" y1="10" x2="8" y2="15" stroke="#616161" stroke-width="0.8"/>
    <!-- Bipod legs -->
    <line x1="3" y1="15" x2="1" y2="22" stroke="#757575" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="15" x2="10" y2="22" stroke="#757575" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0.5" y1="21" x2="3" y2="21" stroke="#757575" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9.5" y1="21" x2="11.5" y2="21" stroke="#757575" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Chunky receiver body -->
    <rect x="10" y="7" width="13" height="10" rx="1" fill="url(#lmg_body)"/>
    <!-- Top rail -->
    <rect x="10" y="7" width="13" height="2" rx="0.5" fill="#757575" stroke-width="1"/>
    <!-- Ejection port -->
    <rect x="12" y="9" width="7" height="3" rx="0.3" fill="#212121" stroke-width="1"/>
    <!-- Heavy stock -->
    <rect x="22" y="8" width="9" height="7" rx="1" fill="url(#lmg_body)"/>
    <rect x="27" y="9" width="4" height="5" rx="0.5" fill="#616161" stroke-width="1"/>
    <!-- Carry handle -->
    <path d="M13 7 Q16 4 19 7" fill="none" stroke="#757575" stroke-width="1.5"/>
    <!-- Pistol grip (chunky) -->
    <rect x="20" y="17" width="6" height="9" rx="1" fill="url(#lmg_heavy)"/>
    <line x1="21.5" y1="19" x2="24" y2="19" stroke="#424242" stroke-width="0.8"/>
    <line x1="21.5" y1="21" x2="24" y2="21" stroke="#424242" stroke-width="0.8"/>
    <line x1="21.5" y1="23" x2="24" y2="23" stroke="#424242" stroke-width="0.8"/>
    <!-- Trigger guard -->
    <path d="M13 17 L13 22 Q13 24 15 24 L20 24" fill="url(#lmg_body)" stroke-width="1.2"/>
    <!-- Trigger -->
    <line x1="14.5" y1="17" x2="14" y2="21" stroke="#9e9e9e" stroke-width="1.2"/>
    <!-- Ammo box / drum -->
    <rect x="12" y="26" width="9" height="5" rx="1" fill="url(#lmg_heavy)"/>
    <rect x="13" y="27" width="7" height="3" rx="0.3" fill="#424242" stroke-width="0.8"/>
    <!-- Belt feed hint -->
    <path d="M12 23 L12 26" stroke="#ffd54f" stroke-width="2" stroke-linecap="round"/>
    <path d="M14 23 L14 26" stroke="#ffd54f" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>
