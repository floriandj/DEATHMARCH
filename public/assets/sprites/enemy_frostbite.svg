<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 22" width="44" height="22" shape-rendering="crispEdges">
  <!-- Frame 0: Frostbite - small icy imp, crystalline -->
  <g>
    <!-- Ice crystal horns -->
    <rect x="3" y="0" width="2" height="3" fill="#b0e0ff"/>
    <rect x="17" y="0" width="2" height="3" fill="#b0e0ff"/>
    <!-- Head -->
    <rect x="4" y="2" width="14" height="7" fill="#74c0fc"/>
    <rect x="5" y="3" width="12" height="5" fill="#4dabf7"/>
    <!-- Eyes (icy white) -->
    <rect x="6" y="4" width="3" height="2" fill="#e8f4ff"/>
    <rect x="13" y="4" width="3" height="2" fill="#e8f4ff"/>
    <rect x="7" y="4" width="1" height="1" fill="#1971c2"/>
    <rect x="14" y="4" width="1" height="1" fill="#1971c2"/>
    <!-- Mouth -->
    <rect x="9" y="7" width="4" height="1" fill="#1864ab"/>
    <!-- Body -->
    <rect x="5" y="9" width="12" height="6" fill="#74c0fc"/>
    <rect x="6" y="10" width="10" height="4" fill="#4dabf7"/>
    <!-- Ice crystal chest -->
    <rect x="9" y="10" width="4" height="3" fill="#d0ebff"/>
    <rect x="10" y="11" width="2" height="1" fill="#e8f4ff"/>
    <!-- Arms (thin, icy) -->
    <rect x="2" y="9" width="3" height="5" fill="#4dabf7"/>
    <rect x="17" y="9" width="3" height="5" fill="#4dabf7"/>
    <!-- Claws -->
    <rect x="1" y="13" width="2" height="2" fill="#b0e0ff"/>
    <rect x="19" y="13" width="2" height="2" fill="#b0e0ff"/>
    <!-- Legs -->
    <rect x="6" y="15" width="4" height="5" fill="#4dabf7"/>
    <rect x="12" y="15" width="4" height="5" fill="#4dabf7"/>
    <!-- Feet -->
    <rect x="5" y="19" width="5" height="3" fill="#1971c2"/>
    <rect x="12" y="19" width="5" height="3" fill="#1971c2"/>
  </g>
  <!-- Frame 1 -->
  <g transform="translate(22,0)">
    <rect x="3" y="0" width="2" height="4" fill="#d0ebff"/>
    <rect x="17" y="0" width="2" height="2" fill="#b0e0ff"/>
    <rect x="4" y="2" width="14" height="7" fill="#74c0fc"/>
    <rect x="5" y="3" width="12" height="5" fill="#4dabf7"/>
    <rect x="6" y="4" width="3" height="2" fill="#e8f4ff"/>
    <rect x="13" y="4" width="3" height="2" fill="#e8f4ff"/>
    <rect x="7" y="4" width="1" height="1" fill="#1971c2"/>
    <rect x="14" y="4" width="1" height="1" fill="#1971c2"/>
    <rect x="9" y="7" width="4" height="1" fill="#1864ab"/>
    <rect x="5" y="9" width="12" height="6" fill="#74c0fc"/>
    <rect x="6" y="10" width="10" height="4" fill="#4dabf7"/>
    <rect x="9" y="10" width="4" height="3" fill="#d0ebff"/>
    <rect x="10" y="11" width="2" height="1" fill="#e8f4ff"/>
    <!-- Arms swinging -->
    <rect x="1" y="10" width="4" height="4" fill="#4dabf7"/>
    <rect x="17" y="8" width="4" height="5" fill="#4dabf7"/>
    <rect x="0" y="13" width="2" height="2" fill="#b0e0ff"/>
    <rect x="20" y="12" width="2" height="2" fill="#b0e0ff"/>
    <!-- Legs stride -->
    <rect x="5" y="15" width="4" height="4" fill="#4dabf7"/>
    <rect x="13" y="16" width="4" height="5" fill="#4dabf7"/>
    <rect x="4" y="18" width="5" height="3" fill="#1971c2"/>
    <rect x="13" y="20" width="5" height="2" fill="#1971c2"/>
  </g>
</svg>
