<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 22" width="176" height="88" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="frost-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="frost-torso" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <radialGradient id="frost-eye" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </radialGradient>
    <radialGradient id="frost-crystal" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#81d4fa"/>
    </radialGradient>
    <radialGradient id="frost-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </radialGradient>
  </defs>
  <!-- Frame 0: Floating idle -->
  <g>
    <g stroke="#1a1a2e" stroke-width="0.9" stroke-linejoin="round">
      <!-- Soft shadow (floating, faint) -->
      <ellipse cx="11" cy="21" rx="6" ry="1" fill="#0288d1" opacity="0.15" stroke="none"/>
      <!-- Wispy tail (bottom tapers — no legs) -->
      <path d="M7,17 Q6,19 7,21 Q9,21 11,21 Q13,21 15,21 Q16,19 15,17" fill="url(#frost-torso)" stroke="#0277bd"/>
      <!-- Wisp shimmer lines -->
      <path d="M9,18 Q11,20 13,18" stroke="#e1f5fe" stroke-width="0.5" fill="none" stroke-opacity="0.6"/>
      <!-- Main body (rounded, faceted feel) -->
      <path d="M5,10 Q4,8 6,7 Q8,5 11,5 Q14,5 16,7 Q18,8 17,10 Q18,13 16,16 Q13,18 11,18 Q9,18 6,16 Q4,13 5,10 Z" fill="url(#frost-torso)"/>
      <!-- Body facet lines (angular crystal feel) -->
      <path d="M8,8 L11,10 L14,8" stroke="#e1f5fe" stroke-width="0.5" fill="none" stroke-opacity="0.7"/>
      <path d="M7,12 L11,13 L15,12" stroke="#e1f5fe" stroke-width="0.5" fill="none" stroke-opacity="0.6"/>
      <path d="M11,10 L11,16" stroke="#e1f5fe" stroke-width="0.4" fill="none" stroke-opacity="0.5"/>
      <!-- Body highlight -->
      <ellipse cx="9.5" cy="9.5" rx="2.5" ry="2" fill="#e1f5fe" opacity="0.4" stroke="none"/>
      <!-- Arms (thin, wispy) -->
      <path d="M5,10 Q2,9 1,11" stroke-width="2.5" stroke="url(#frost-body)" fill="none" stroke-linecap="round"/>
      <path d="M17,10 Q20,9 21,11" stroke-width="2.5" stroke="url(#frost-body)" fill="none" stroke-linecap="round"/>
      <!-- Ice shard claws (angular paths) -->
      <path d="M1,11 L1,10 L1.5,12 L2,11.5 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <path d="M21,11 L21,10 L20.5,12 L20,11.5 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <!-- Head (round, icy) -->
      <ellipse cx="11" cy="5.5" rx="6.5" ry="5" fill="url(#frost-body)"/>
      <!-- Ice crown crystals (angular) -->
      <path d="M7,2 L7,1 L8,2 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <path d="M11,1.5 L11,1 L12,2 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <path d="M15,2 L15,1 L14,2 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <!-- Head highlight -->
      <ellipse cx="9" cy="4" rx="2.5" ry="1.8" fill="#e1f5fe" opacity="0.35" stroke="none"/>
      <!-- Eyes (cold blue, white glow center) -->
      <ellipse cx="8.5" cy="5.5" rx="2" ry="1.8" fill="url(#frost-eye)"/>
      <ellipse cx="13.5" cy="5.5" rx="2" ry="1.8" fill="url(#frost-eye)"/>
      <!-- Eye shine -->
      <circle cx="8.5" cy="5.5" r="0.9" fill="#ffffff" opacity="0.85" stroke="none"/>
      <circle cx="13.5" cy="5.5" r="0.9" fill="#ffffff" opacity="0.85" stroke="none"/>
      <circle cx="8.8" cy="5.2" r="0.35" fill="#b3e5fc" stroke="none"/>
      <circle cx="13.8" cy="5.2" r="0.35" fill="#b3e5fc" stroke="none"/>
      <!-- Frost particles -->
      <circle cx="3" cy="7" r="0.7" fill="url(#frost-glow)" stroke="none" opacity="0.8"/>
      <circle cx="19" cy="6" r="0.6" fill="url(#frost-glow)" stroke="none" opacity="0.75"/>
      <circle cx="5" cy="3" r="0.5" fill="url(#frost-glow)" stroke="none" opacity="0.7"/>
      <circle cx="17" cy="3" r="0.5" fill="url(#frost-glow)" stroke="none" opacity="0.7"/>
    </g>
  </g>
  <!-- Frame 1: Subtle float — body shifted 1px right, 1px down, slight arm sway -->
  <g transform="translate(22,0)">
    <g stroke="#1a1a2e" stroke-width="0.9" stroke-linejoin="round">
      <!-- Shadow (shifted 1px right) -->
      <ellipse cx="12" cy="21" rx="6" ry="1" fill="#0288d1" opacity="0.15" stroke="none"/>
      <!-- Wispy tail (shifted 1px right, 1px down) -->
      <path d="M8,18 Q7,20 8,21 Q10,21 12,21 Q14,21 16,21 Q17,20 16,18" fill="url(#frost-torso)" stroke="#0277bd"/>
      <path d="M10,19 Q12,21 14,19" stroke="#e1f5fe" stroke-width="0.5" fill="none" stroke-opacity="0.6"/>
      <!-- Main body (shifted 1px right, 1px down) -->
      <path d="M6,11 Q5,9 7,8 Q9,6 12,6 Q15,6 17,8 Q19,9 18,11 Q19,14 17,17 Q14,19 12,19 Q10,19 7,17 Q5,14 6,11 Z" fill="url(#frost-torso)"/>
      <!-- Body facet lines -->
      <path d="M9,9 L12,11 L15,9" stroke="#e1f5fe" stroke-width="0.5" fill="none" stroke-opacity="0.7"/>
      <path d="M8,13 L12,14 L16,13" stroke="#e1f5fe" stroke-width="0.5" fill="none" stroke-opacity="0.6"/>
      <path d="M12,11 L12,17" stroke="#e1f5fe" stroke-width="0.4" fill="none" stroke-opacity="0.5"/>
      <!-- Body highlight -->
      <ellipse cx="10.5" cy="10.5" rx="2.5" ry="2" fill="#e1f5fe" opacity="0.4" stroke="none"/>
      <!-- Left arm swayed down 2px -->
      <path d="M6,11 Q3,11 2,13" stroke-width="2.5" stroke="url(#frost-body)" fill="none" stroke-linecap="round"/>
      <!-- Right arm swayed up 2px -->
      <path d="M18,11 Q21,9 21,10" stroke-width="2.5" stroke="url(#frost-body)" fill="none" stroke-linecap="round"/>
      <!-- Ice shard claws -->
      <path d="M2,13 L2,12 L2.5,14 L3,13.5 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <path d="M21,10 L21,9 L20.5,11 L20,10.5 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <!-- Head (shifted 1px right) -->
      <ellipse cx="12" cy="5.5" rx="6.5" ry="5" fill="url(#frost-body)"/>
      <!-- Ice crown crystals -->
      <path d="M8,2 L8,1 L9,2 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <path d="M12,1.5 L12,1 L13,2 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <path d="M16,2 L16,1 L15,2 Z" fill="url(#frost-crystal)" stroke="#0277bd" stroke-width="0.5"/>
      <!-- Head highlight -->
      <ellipse cx="10" cy="4" rx="2.5" ry="1.8" fill="#e1f5fe" opacity="0.35" stroke="none"/>
      <!-- Eyes -->
      <ellipse cx="9.5" cy="5.5" rx="2" ry="1.8" fill="url(#frost-eye)"/>
      <ellipse cx="14.5" cy="5.5" rx="2" ry="1.8" fill="url(#frost-eye)"/>
      <!-- Eye shine -->
      <circle cx="9.5" cy="5.5" r="0.9" fill="#ffffff" opacity="0.85" stroke="none"/>
      <circle cx="14.5" cy="5.5" r="0.9" fill="#ffffff" opacity="0.85" stroke="none"/>
      <circle cx="9.8" cy="5.2" r="0.35" fill="#b3e5fc" stroke="none"/>
      <circle cx="14.8" cy="5.2" r="0.35" fill="#b3e5fc" stroke="none"/>
      <!-- Frost particles (shifted) -->
      <circle cx="4" cy="8" r="0.7" fill="url(#frost-glow)" stroke="none" opacity="0.8"/>
      <circle cx="20" cy="7" r="0.6" fill="url(#frost-glow)" stroke="none" opacity="0.75"/>
      <circle cx="6" cy="3" r="0.5" fill="url(#frost-glow)" stroke="none" opacity="0.7"/>
      <circle cx="18" cy="4" r="0.5" fill="url(#frost-glow)" stroke="none" opacity="0.7"/>
    </g>
  </g>
</svg>
